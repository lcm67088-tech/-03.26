<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nplace.io — 플레이스 현황</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
/* ── 현황 그리드 ── */
.status-grid {
  display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:20px;
}
@media(max-width:1100px){.status-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:600px) {.status-grid{grid-template-columns:1fr;}}

/* ── 플레이스 카드 ── */
.ps-card {
  background:var(--bg2); border:1px solid var(--border); border-radius:14px;
  padding:16px; cursor:pointer; transition:all .2s;
}
.ps-card:hover, .ps-card.selected {
  border-color:var(--cyan); box-shadow:0 0 0 1px rgba(var(--cyan-rgb),.15);
}
.ps-card.selected { background:rgba(var(--cyan-rgb),.04); }
.ps-card-name { font-size:14px; font-weight:800; color:var(--text-title); margin-bottom:4px; }
.ps-card-cat  { font-size:11px; color:var(--text3); margin-bottom:10px; }
.ps-stat-row  { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
.ps-stat-label{ font-size:11px; color:var(--text3); }
.ps-stat-val  { font-size:13px; font-weight:700; color:var(--text); }
.ps-stat-val.up   { color:var(--green); }
.ps-stat-val.down { color:var(--red); }

/* ── 상세 패널 ── */
.detail-panel {
  background:var(--bg2); border:1px solid var(--border); border-radius:14px;
  padding:20px; margin-bottom:20px;
}
.detail-tabs {
  display:flex; gap:0; border-bottom:1px solid var(--border); margin-bottom:20px;
}
.detail-tab {
  padding:8px 16px; font-size:13px; font-weight:600; color:var(--text3);
  border:none; background:none; cursor:pointer; border-bottom:2px solid transparent;
  margin-bottom:-1px; transition:all .15s; font-family:inherit;
}
.detail-tab.active { color:var(--cyan); border-bottom-color:var(--cyan); }
.detail-tab:hover  { color:var(--text); }

/* ── 순위 키워드 테이블 ── */
.kw-table { width:100%; border-collapse:collapse; }
.kw-table th {
  padding:9px 12px; font-size:11px; font-weight:700; color:var(--text3);
  background:var(--bg-table-head); border-bottom:1px solid var(--border);
  text-transform:uppercase; letter-spacing:.4px; text-align:left;
}
.kw-table td {
  padding:10px 12px; font-size:12px; color:var(--text);
  border-bottom:1px solid var(--border); vertical-align:middle;
}
.kw-table tr:last-child td { border-bottom:none; }
.kw-table tr:hover td { background:var(--bg-row-hover); }

/* ── 통계 그리드 ── */
.stats-grid {
  display:grid; grid-template-columns:repeat(3,1fr); gap:14px;
}
@media(max-width:800px){.stats-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:500px){.stats-grid{grid-template-columns:1fr;}}
.stat-box {
  background:var(--bg-hover2); border:1px solid var(--border); border-radius:10px; padding:14px;
}
.stat-box-label { font-size:11px; color:var(--text3); margin-bottom:6px; }
.stat-box-val   { font-size:22px; font-weight:800; color:var(--text-title); line-height:1; }
.stat-box-change{ font-size:11px; margin-top:5px; }
.stat-box-change.up   { color:var(--green); }
.stat-box-change.down { color:var(--red); }
.stat-box-change.flat { color:var(--text3); }

/* ── 추이 차트 ── */
.trend-chart-wrap { height:180px; position:relative; margin-top:12px; }

/* ── 크롤링 상태 ── */
.crawl-status-badge {
  display:inline-flex; align-items:center; gap:5px;
  padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700;
}
.crawl-ok   { background:rgba(34,197,94,.12); color:var(--green); border:1px solid rgba(34,197,94,.25); }
.crawl-warn { background:rgba(250,204,21,.12); color:#facc15;      border:1px solid rgba(250,204,21,.25); }
.crawl-error{ background:rgba(239,68,68,.12);  color:var(--red);   border:1px solid rgba(239,68,68,.25); }

.crawl-log-row {
  display:flex; align-items:flex-start; gap:12px; padding:10px 0;
  border-bottom:1px solid var(--border);
}
.crawl-log-row:last-child { border-bottom:none; }
.crawl-log-dot {
  width:8px; height:8px; border-radius:50%; flex-shrink:0; margin-top:5px;
}
.dot-ok   { background:var(--green); }
.dot-warn { background:#facc15; }
.dot-error{ background:var(--red); }

/* ── 리뷰 카드 ── */
.rev-card {
  background:var(--bg-hover2); border:1px solid var(--border); border-radius:10px;
  padding:12px; margin-bottom:10px;
}
.rev-card:last-child { margin-bottom:0; }
.rev-meta { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.rev-stars { color:#fbbf24; font-size:12px; }
.rev-author { font-size:12px; font-weight:600; color:var(--text2); }
.rev-date   { font-size:11px; color:var(--text3); margin-left:auto; }
.rev-text   { font-size:12px; color:var(--text); line-height:1.6; }

/* ── 광고 섹션 ── */
.ad-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 0; border-bottom:1px solid var(--border);
}
.ad-row:last-child { border-bottom:none; }

/* ── 메뉴 그리드 ── */
.menu-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:10px; }
.menu-item {
  background:var(--bg-hover2); border:1px solid var(--border); border-radius:10px; padding:12px;
}
.menu-item.highlight { border-color:rgba(var(--cyan-rgb),.4); background:rgba(var(--cyan-rgb),.04); }
.menu-name  { font-size:13px; font-weight:700; color:var(--text-title); margin-bottom:4px; }
.menu-price { font-size:12px; color:var(--cyan); font-weight:600; }

/* ── 크롤링 아이템 체크리스트 ── */
.crawl-items { display:flex; flex-wrap:wrap; gap:6px; margin-top:4px; }
.crawl-item-badge {
  display:inline-flex; align-items:center; gap:3px; padding:2px 8px;
  border-radius:4px; font-size:10px; font-weight:600;
}
.ci-ok   { background:rgba(34,197,94,.1); color:var(--green); }
.ci-fail { background:rgba(239,68,68,.1); color:var(--red); }

/* ── 미니 스파크라인 ── */
.sparkline { display:flex; align-items:flex-end; gap:2px; height:28px; margin-top:4px; }
.spark-bar { width:4px; border-radius:1px; background:var(--cyan); opacity:.7; }
</style>

  </div>

  <!-- 서브탭 -->

      ['stats',    '📊 통계 지표'],

/* ── 전체 KPI 요약 ── */
function buildSummaryKPI() {
  const totalReview   = PLACES.reduce((a,p) => a+p.reviewCount, 0);

  const allRankKws    = PLACES.flatMap(p => p.keywords.filter(k => k.isRankKw));
  const top5RankKws   = allRankKws.filter(k => k.rank && k.rank <= 5);

  return `
  <div class="kpi-card">
    <div class="kpi-label">📍 관리 플레이스</div>
    <div class="kpi-value">${PLACES.length}</div>
    <div class="kpi-change ${warnPlaces>0?'down':'flat'}">${warnPlaces>0 ? `⚠️ ${warnPlaces}개 수집 이슈` : '✅ 전체 정상'}</div>
  </div>
  <div class="kpi-card">
    <div class="kpi-label">🏆 순위키 TOP5 달성</div>
    <div class="kpi-value text-yellow">${top5RankKws.length}<span style="font-size:14px;font-weight:500;color:var(--text3)">/${allRankKws.length}</span></div>
    <div class="kpi-change up">▲ 1위 ${allRankKws.filter(k=>k.rank===1).length}개</div>
  </div>
  <div class="kpi-card">
    <div class="kpi-label">💬 전체 영수증 리뷰</div>
    <div class="kpi-value">${totalReview.toLocaleString()}</div>
    <div class="kpi-change up">▲ ${(totalReview - PLACES.reduce((a,p)=>a+p.reviewCountPrev,0)).toLocaleString()} 지난달 대비</div>
  </div>
  <div class="kpi-card">
    <div class="kpi-label">🔖 전체 저장 수</div>
    <div class="kpi-value">${totalSaved.toLocaleString()}</div>
    <div class="kpi-change up">▲ ${(totalSaved - PLACES.reduce((a,p)=>a+p.savedCountPrev,0)).toLocaleString()} 지난달 대비</div>
  </div>`;
}

/* ── 플레이스 카드 ── */
function buildPlaceCard(p) {
  const rankKw = p.keywords.find(k => k.isRankKw);
  const rvDiff = p.reviewCount - p.reviewCountPrev;
  const svDiff = p.savedCount  - p.savedCountPrev;
  const spark  = rankKw ? sparkline(rankKw.rankHistory.slice(-7).filter(v=>v!==null)) : '';

  return `
  <div class="ps-card${p.id===_selId?' selected':''}" style="flex:1;min-width:220px;max-width:300px"
    onclick="selectPlace(${p.id})">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px">
      <div>
        <div class="ps-card-name">${p.name}</div>
        <div class="ps-card-cat">${p.category}</div>
      </div>
      ${crawlBadge(p.crawlStatus)}
    </div>
    ${rankKw ? `
      <div style="background:rgba(var(--cyan-rgb),.06);border:1px solid rgba(var(--cyan-rgb),.2);border-radius:8px;padding:8px 10px;margin-bottom:10px">
        <div style="font-size:11px;color:var(--text3);margin-bottom:3px">📌 순위키</div>
        <div style="display:flex;align-items:center;justify-content:space-between">
          <span style="font-size:13px;font-weight:700;color:var(--text-title)">${rankKw.kw}</span>
          ${rankBadge(rankKw.rank)}
        </div>
        ${spark}
      </div>` : `<div style="font-size:11px;color:var(--text3);padding:6px 0">순위키 미등록</div>`}
    <div class="ps-stat-row">
      <span class="ps-stat-label">영수증 리뷰</span>
      <span class="ps-stat-val ${rvDiff>0?'up':'flat'}">${p.reviewCount} ${rvDiff>0?'▲'+rvDiff:''}</span>
    </div>
    <div class="ps-stat-row" style="margin-bottom:0">
      <span class="ps-stat-label">저장 수</span>
      <span class="ps-stat-val ${svDiff>0?'up':'flat'}">${p.savedCount.toLocaleString()} ${svDiff>0?'▲'+svDiff:''}</span>
    </div>
  </div>`;
}

/* ── 서브탭 콘텐츠 ── */
function buildSubTab(p) {
  if (_subTab === 'stats')    return buildStats(p);
  if (_subTab === 'keywords') return buildKeywords(p);
  if (_subTab === 'reviews')  return buildReviews(p);
  if (_subTab === 'menu')     return buildMenu(p);
  if (_subTab === 'crawl')    return buildCrawlLog(p);
  if (_subTab === 'orders')   return buildOrders(p);
  return '';
}

/* ── 통계 지표 탭 ── */
function buildStats(p) {
  // 파서로 직접 확인 가능한 수치만 표시 (추정치 제거)
  const stats = [
    { label:'영수증 리뷰', val:p.reviewCount,     prev:p.reviewCountPrev,  icon:'💬', color:'var(--cyan)' },
    { label:'평균 별점',   val:p.avgRating,       prev:null,               icon:'⭐', color:'#fbbf24' },
    { label:'블로그 리뷰', val:p.blogReviewCount, prev:p.blogReviewPrev,   icon:'📝', color:'#a78bfa' },
    { label:'저장 수',     val:p.savedCount,      prev:p.savedCountPrev,   icon:'🔖', color:'var(--green)' },
  ];

  const statBoxes = stats.map(s => {
    const diff = s.prev ? s.val - s.prev : null;
    const pct  = s.prev ? ((s.val-s.prev)/s.prev*100).toFixed(1) : null;
    return `
    <div class="stat-box">
      <div class="stat-box-label">${s.icon} ${s.label}</div>
      <div class="stat-box-val" style="color:${s.color}">${typeof s.val==='number'&&s.val>999?s.val.toLocaleString():s.val}</div>
      ${diff !== null ? `<div class="stat-box-change ${diff>0?'up':diff<0?'down':'flat'}">${diff>0?'▲':'▼'} ${Math.abs(diff).toLocaleString()} (${pct}%) 지난달 대비</div>` : ''}
    </div>`;
  }).join('');

  return `
  <div class="stats-grid" style="margin-bottom:20px">${statBoxes}</div>

  <!-- 추이 차트 -->
  <div class="card" style="padding:16px;border:1px solid var(--border);border-radius:12px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <div style="font-size:13px;font-weight:700;color:var(--text)">📈 수집 추이 (영수증리뷰 / 블로그 / 저장)</div>
      <div style="font-size:11px;color:var(--text3)">${p.trendDates.length ? `최근 ${p.trendDates.length}개 구간 · 크롤링 수집 기준` : '크롤링 수집 후 표시됩니다'}</div>
    </div>
    <div class="trend-chart-wrap"><canvas id="trendChart"></canvas></div>
  </div>

  <!-- 대표키워드 -->
  <div style="margin-top:16px">
    <div style="font-size:12px;font-weight:700;color:var(--text3);margin-bottom:8px;text-transform:uppercase;letter-spacing:.4px">📌 네이버 대표 키워드 (플레이스 등록)</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">
      ${p.repKeywords.map(k => `
        <span style="padding:4px 10px;background:rgba(var(--cyan-rgb),.08);border:1px solid rgba(var(--cyan-rgb),.2);border-radius:20px;font-size:12px;font-weight:600;color:var(--cyan)">${k}</span>
      `).join('')}
    </div>
    <div style="background:rgba(250,204,21,.06);border:1px solid rgba(250,204,21,.2);border-radius:8px;padding:10px 14px;font-size:11px;color:var(--text2);line-height:1.8">
      <strong style="color:#facc15">⚠️ 대표키워드란?</strong>
      네이버 플레이스에 사업주가 직접 등록한 <strong>공식 업종·서비스 키워드</strong>입니다.
      nplace.io에서는 수정 불가 — 변경하려면 네이버 플레이스 관리 콘솔을 이용하세요.<br>
      <span style="color:var(--text3)">
        📌 <strong>순위키</strong>: 상위 노출을 목표로 추적하는 키워드 (최대 3개) &nbsp;|&nbsp;
        ⚡ <strong>작업키</strong>: SEO 롱테일 작업 투입 키워드 &nbsp;—&nbsp;
        두 유형 모두 대표키워드와 별개로 관리됩니다.
        <a href="places.html" style="color:var(--cyan);margin-left:4px">플레이스 관리에서 확인 →</a>
      </span>
    </div>
  </div>`;
}

/* ── 키워드 현황 탭 ── */
function buildKeywords(p) {

  const kwRow = (k, type) => {
    const chg = (k.rank && k.prev) ? k.prev - k.rank : null;
    const hist = k.rankHistory.filter(v=>v!==null);

    return `
    <tr>
      <td>
        <div style="display:flex;align-items:center;gap:6px">
          ${type==='rank' ? '<span style="font-size:10px;padding:1px 6px;border-radius:4px;background:rgba(var(--cyan-rgb),.12);color:var(--cyan);font-weight:700;border:1px solid rgba(var(--cyan-rgb),.25)">📌 순위키</span>' :
                           '<span style="font-size:10px;padding:1px 6px;border-radius:4px;background:rgba(34,197,94,.1);color:var(--green);font-weight:700;border:1px solid rgba(34,197,94,.25)">⚡ 작업키</span>'}
          <span style="font-size:13px;font-weight:700;color:var(--text-title)">${k.kw}</span>
          ${k.failReason ? `<span style="font-size:10px;color:var(--red)">⚠️ ${k.failReason}</span>` : ''}
        </div>
      </td>
      <td>${rankBadge(k.rank)}</td>
      <td>
        ${chg !== null
          ? `<span style="font-weight:700;font-size:13px;color:${chg>0?'var(--green)':chg<0?'var(--red)':'var(--text3)'}">${chg>0?'▲':'▼'} ${Math.abs(chg)}</span>`
          : '<span style="color:var(--text3);font-size:12px">—</span>'}
      </td>
      <td>${sp}</td>
      <td>
        ${k.isTopSection ? '<span style="font-size:10px;padding:1px 6px;border-radius:4px;background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.2)">✅ 플레이스 최상단</span>' : '<span style="font-size:11px;color:var(--text3)">—</span>'}
      </td>
      <td>
        ${k.cpcCount > 0 ? `<span style="font-size:10px;padding:1px 6px;border-radius:4px;background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2)">CPC ${k.cpcCount}개</span>` : '<span style="font-size:11px;color:var(--text3)">없음</span>'}
      </td>
      <td><span style="font-size:11px;color:var(--text3)">${k.lastChecked || '—'}</span></td>
    </tr>`;
  };

  return `
  <!-- 순위 키워드 -->
  <div style="margin-bottom:20px">
    <div style="font-size:12px;font-weight:700;color:var(--text3);margin-bottom:10px;text-transform:uppercase;letter-spacing:.4px">
      📌 순위 키워드 ${rankKws.length}/3 <span style="font-size:11px;font-weight:400;color:var(--text3)">— 순위를 올리고 싶은 목표 키워드</span>
    </div>
    <div style="overflow-x:auto">
      <table class="kw-table">
        <thead><tr>
          <th>키워드</th><th>현재순위</th><th>변동</th><th>추이 (15일)</th><th>플레이스 최상단</th><th>CPC 경쟁</th><th>마지막 조회</th>
        </tr></thead>
        <tbody>${rankKws.map(k => kwRow(k,'rank')).join('') || '<tr><td colspan="7" style="text-align:center;color:var(--text3);padding:16px">등록된 순위 키워드가 없습니다</td></tr>'}</tbody>
      </table>
    </div>
  </div>

  <!-- 작업 키워드 -->
  <div>
    <div style="font-size:12px;font-weight:700;color:var(--text3);margin-bottom:10px;text-transform:uppercase;letter-spacing:.4px">
      ⚡ 작업 키워드 ${workKws.length}개 <span style="font-size:11px;font-weight:400;color:var(--text3)">— SEO 작업 투입 롱테일 키워드</span>
    </div>
    <div style="overflow-x:auto">
      <table class="kw-table">
        <thead><tr>
          <th>키워드</th><th>현재순위</th><th>변동</th><th>추이 (15일)</th><th>플레이스 최상단</th><th>CPC 경쟁</th><th>마지막 조회</th>
        </tr></thead>
        <tbody>${workKws.map(k => kwRow(k,'work')).join('') || '<tr><td colspan="7" style="text-align:center;color:var(--text3);padding:16px">등록된 작업 키워드가 없습니다</td></tr>'}</tbody>

}

/* ── 주문 현황 탭 ── */
function buildOrders(p) {
  const orders = p.orders || [];
  if (!orders.length) return `<div style="padding:32px;text-align:center;color:var(--text3);font-size:13px">등록된 주문이 없습니다.</div>`;

  const STATUS_BADGE = {
    active:  `<span style="padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.25);color:var(--green)">진행중</span>`,
    pending: `<span style="padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;background:rgba(250,204,21,.1);border:1px solid rgba(250,204,21,.25);color:#facc15">대기중</span>`,
    done:    `<span style="padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;background:rgba(100,116,139,.12);border:1px solid rgba(100,116,139,.2);color:var(--text3)">완료</span>`,
    cancel:  `<span style="padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:var(--red)">취소</span>`,
  };
  const STATUS_COLOR = { active:'#22c55e', pending:'#facc15', done:'#64748b', cancel:'#ef4444' };
  const TYPE_ICON = { reward:'🎯', save:'🔖', blog:'📝', rank:'📌', etc:'📦' };

  /* ── 간트차트 캘린더 ── */
  // 전체 주문에서 날짜 범위 산출
  const allDates = orders.flatMap(o => [new Date(o.startDate), new Date(o.endDate)]);
  const minDate  = new Date(Math.min(...allDates));
  const maxDate  = new Date(Math.max(...allDates));
  // 월 단위 컬럼: minDate 달 첫날 ~ maxDate 달 마지막날
  const startMonth = new Date(minDate.getFullYear(), minDate.getMonth(), 1);
  const endMonth   = new Date(maxDate.getFullYear(), maxDate.getMonth() + 1, 0);
  const totalDays  = Math.ceil((endMonth - startMonth) / 86400000) + 1;

  // 월 헤더 생성
  const months = [];
  let cur = new Date(startMonth);
  while (cur <= endMonth) {
    const y = cur.getFullYear(), m = cur.getMonth();
    const mStart  = new Date(y, m, 1);
    const mEnd    = new Date(y, m + 1, 0);
    const colFrom = Math.max(0, Math.ceil((mStart - startMonth) / 86400000));
    const colDays = Math.min(mEnd, endMonth) - Math.max(mStart, startMonth);
    const colSpan = Math.ceil(colDays / 86400000) + 1;
    months.push({ label: `${y}.${String(m+1).padStart(2,'0')}`, colFrom, colSpan });
    cur = new Date(y, m + 1, 1);
  }

  // 오늘 위치 (0~totalDays)
  const today     = new Date(); today.setHours(0,0,0,0);
  const todayOff  = Math.floor((today - startMonth) / 86400000);
  const todayPct  = Math.max(0, Math.min(100, (todayOff / totalDays) * 100)).toFixed(2);
  const showToday = todayOff >= 0 && todayOff <= totalDays;

  // 월 헤더 HTML
  const monthHeaders = months.map(m =>
    `<div style="flex:${m.colSpan};min-width:0;text-align:center;font-size:11px;font-weight:700;
      color:var(--text3);padding:4px 0;border-right:1px solid var(--border)">${m.label}</div>`
  ).join('');

  // 간트 바 행 HTML
  const ganttRows = orders.map(o => {
    const s    = new Date(o.startDate); s.setHours(0,0,0,0);
    const e    = new Date(o.endDate);   e.setHours(0,0,0,0);
    const off  = Math.floor((s - startMonth) / 86400000);
    const dur  = Math.floor((e - s) / 86400000) + 1;
    const left = ((off / totalDays) * 100).toFixed(2);
    const wid  = ((dur / totalDays) * 100).toFixed(2);
    const col  = STATUS_COLOR[o.status] || '#64748b';
    const icon = TYPE_ICON[o.type] || '📦';

    const kwTip = o.rewardKeywords?.length
      ? ` · ${o.rewardKeywords.join(', ')}`
      : '';

    return `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
      <div style="width:160px;flex-shrink:0;font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis"
           title="${o.product}${kwTip}">
        ${icon} ${o.product}
      </div>
      <div style="flex:1;position:relative;height:22px">
        <!-- 배경 그리드 -->
        <div style="position:absolute;inset:0;display:flex">
          ${months.map(m=>`<div style="flex:${m.colSpan};border-right:1px solid var(--border);opacity:.4"></div>`).join('')}
        </div>
        <!-- 간트 바 -->
        <div style="position:absolute;top:2px;height:18px;border-radius:4px;
          left:${left}%;width:${wid}%;
          background:${o.status==='done'?'rgba(100,116,139,.35)':`${col}22`};
          border:1px solid ${col}55;
          display:flex;align-items:center;justify-content:center;overflow:hidden"
          title="${o.startDate} ~ ${o.endDate}${kwTip}">
          <span style="font-size:10px;font-weight:700;color:${col};white-space:nowrap;padding:0 4px">${o.daysLeft > 0 ? `잔여 ${o.daysLeft}일` : ''}</span>
        </div>
      </div>
      <div style="width:44px;flex-shrink:0;text-align:right">${STATUS_BADGE[o.status]||''}</div>
    </div>`;
  }).join('');

  const ganttChart = `
  <div style="margin-bottom:18px;padding:14px 16px;border:1px solid var(--border);border-radius:12px;background:var(--bg-card)">
    <div style="font-size:12px;font-weight:700;color:var(--text);margin-bottom:10px">📅 주문 일정 현황</div>
    <!-- 월 헤더 -->
    <div style="display:flex;margin-left:170px;margin-bottom:4px;border-bottom:1px solid var(--border)">
      ${monthHeaders}
    </div>
    <!-- 간트 행 -->
    <div style="position:relative">
      ${ganttRows}
      <!-- 오늘 선 -->
      ${showToday ? `<div style="position:absolute;top:0;bottom:0;left:calc(170px + ${todayPct}%);width:1.5px;background:rgba(251,191,36,.7);pointer-events:none">
        <span style="position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:9px;color:#fbbf24;white-space:nowrap;font-weight:700">TODAY</span>
      </div>` : ''}
    </div>
  </div>`;

  /* ── 주문 카드 목록 ── */
  const orderCards = orders.map(o => {
    const icon = TYPE_ICON[o.type] || '📦';
    const kwSection = o.type === 'reward' && o.rewardKeywords?.length
      ? `<div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:5px;align-items:center">
           <span style="font-size:11px;color:var(--text3)">작업 키워드</span>
           ${o.rewardKeywords.map(kw =>
             `<span style="padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;
               background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.25);color:var(--cyan)">${kw}</span>`
           ).join('')}
         </div>`
      : '';

    return `
    <div style="padding:12px 14px;border:1px solid var(--border);border-radius:10px;margin-bottom:8px;background:var(--bg-card)">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px">
        <span style="font-size:13px;font-weight:700;color:var(--text)">${icon} ${o.product}</span>
        ${STATUS_BADGE[o.status] || ''}
        <span style="font-size:11px;color:var(--text3);margin-left:auto">${o.id}</span>
      </div>
      <div style="font-size:11px;color:var(--text3)">
        ${o.startDate} ~ ${o.endDate}
        ${o.status === 'active' && o.daysLeft > 0 ? `<span style="color:var(--cyan);margin-left:8px">잔여 ${o.daysLeft}일</span>` : ''}
      </div>
      ${kwSection}
    </div>`;
  }).join('');

  return ganttChart + orderCards;
}

/* ══════ 헬퍼 ══════ */
function crawlBadge(status) {
  if (status === 'ok')    return `<span class="crawl-status-badge crawl-ok">✅ 정상</span>`;
  if (status === 'warn')  return `<span class="crawl-status-badge crawl-warn">⚠️ 일부실패</span>`;
  return `<span class="crawl-status-badge crawl-error">❌ 오류</span>`;
}

function rankBadge(rank) {
  if (!rank) return `<span style="font-size:11px;color:var(--text3)">미조회</span>`;
  const color = rank<=3?'#fcd34d':rank<=5?'var(--cyan)':rank<=10?'var(--green)':rank<=30?'#60a5fa':'var(--text3)';
  return `<span style="font-size:13px;font-weight:800;color:${color}">${rank}위</span>`;
}

function sparkline(data) {
  if (!data || data.length === 0) return '';
  const max = Math.max(...data), min = Math.min(...data);
  const bars = data.map(v => {
    const h = max === min ? 50 : Math.max(20, 100 - ((v - min) / (max - min)) * 70);
    const color = v <= 5 ? 'var(--cyan)' : v <= 10 ? 'var(--green)' : v <= 30 ? '#60a5fa' : 'var(--text3)';
    return `<div class="spark-bar" style="height:${Math.round(h)}%;background:${color}"></div>`;
  }).join('');
  return `<div class="sparkline">${bars}</div>`;
}

/* ══════ 이벤트 ══════ */
function bindEvents() {}

function selectPlace(id) {
  _selId  = id;
  _subTab = 'stats';
  renderPage();
}

function switchSubTab(tab) {
  _subTab = tab;
  const p = PLACES.find(pl => pl.id === _selId);
  // 탭 버튼 active 클래스 갱신
  document.querySelectorAll('.detail-tab').forEach(btn => {
    const key = btn.getAttribute('onclick').match(/'(\w+)'/)?.[1];
    btn.classList.toggle('active', key === tab);
  });
  document.getElementById('subtab-content').innerHTML = buildSubTab(p);
  if (tab === 'stats') drawCharts();
}

/* ══════ 차트 ══════ */
let _trendChart = null;

function drawCharts() {
  const p = PLACES.find(pl => pl.id === _selId);
  if (!p) return;
  setTimeout(() => {
    const el = document.getElementById('trendChart');
    if (!el) return;
    if (_trendChart) { _trendChart.destroy(); _trendChart = null; }
    const cc = (typeof chartColors === 'function') ? chartColors() : {
      ticks:'#94a3b8', grid:'rgba(255,255,255,.05)',
      tooltip:{ bg:'#1a1a24', border:'rgba(255,255,255,.1)', title:'#fff', body:'rgba(226,232,240,.7)' }
    };
    _trendChart = new Chart(el, {
      type: 'line',
      data: {
        labels: p.trendDates,
        datasets: [
          { label:'영수증리뷰', data:p.trendReview, borderColor:'#00d4ff', backgroundColor:'rgba(0,212,255,.08)', tension:.4, pointRadius:2, fill:false },
          { label:'블로그리뷰', data:p.trendBlog,   borderColor:'#a78bfa', backgroundColor:'rgba(167,139,250,.08)', tension:.4, pointRadius:2, fill:false },
          { label:'저장수(÷10)', data:p.trendSaved.map(v=>Math.round(v/10)), borderColor:'#22c55e', backgroundColor:'rgba(34,197,94,.08)', tension:.4, pointRadius:2, fill:false },
        ]
      },
      options: {
        responsive:true, maintainAspectRatio:false,
        plugins:{
          legend:{ labels:{ color:cc.ticks, font:{size:11} } },
          tooltip:{ backgroundColor:cc.tooltip.bg, borderColor:cc.tooltip.border, borderWidth:1, titleColor:cc.tooltip.title, bodyColor:cc.tooltip.body }
        },
        scales:{
          x:{ ticks:{ color:cc.ticks, font:{size:10}, maxTicksLimit:8 }, grid:{ color:cc.grid } },
          y:{ ticks:{ color:cc.ticks, font:{size:10} }, grid:{ color:cc.grid } }
        }
      }
    });
  }, 80);
}

/* ══════ 파서 API 동적 연결 ══════ */
function resolveParserApi() {
  const h = location.hostname;
  if (h.match(/^\d+-/)) return location.protocol + '//' + h.replace(/^(\d+)-/, '8000-');
  if (h === 'localhost' || h === '127.0.0.1') return 'http://localhost:8000';
  return 'http://localhost:8000';
}
const PARSER_API = resolveParserApi();

/* 파서 연결 상태 표시 배지 */
async function checkParserStatus() {
  try {
    const res = await fetch(`${PARSER_API}/`, { signal: AbortSignal.timeout(3000) });
    const data = await res.json();
    return data.parser_available === true;
  } catch { return false; }
}

/* 지금 수집 버튼 → 파서 API 호출 */
async function runParseCrawl(placeId) {
  const p = PLACES.find(pl => pl.id === placeId);
  if (!p) return;

  const statusEl = document.getElementById('crawl-run-status');
  const btn      = document.getElementById('btn-run-crawl');
  if (!statusEl || !btn) return;

  // 버튼 비활성화
  btn.disabled = true;
  btn.textContent = '⏳ 수집 중...';
  btn.style.opacity = '0.6';
  statusEl.style.display = 'block';
  statusEl.innerHTML = '🔄 파서 API 연결 중...';

  try {
    const naverUrl = p.naverUrl || `https://m.place.naver.com/restaurant/${p.naverPlaceId || p.id}`;
    statusEl.innerHTML = `🔄 파서 API 호출 중...<br><span style="color:var(--text3);font-size:11px">${naverUrl}</span>`;

    const res = await fetch(`${PARSER_API}/api/parse`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url: naverUrl, include_reviews: true, include_menu: true, include_photos: false }),
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    // 파서 응답으로 데이터 갱신
    const now = new Date().toISOString().slice(0,16).replace('T',' ');
    const parsed_id = data.place_id || data.id;

    if (data.name)             p.name             = data.name;
    if (data.category)         p.category         = data.category;
    if (data.address)          p.address          = data.address;
    if (data.road_address)     p.roadAddress      = data.road_address;
    if (data.phone)            p.phone            = data.phone;
    if (data.keyword_list)     p.repKeywords      = data.keyword_list;
    if (data.visitor_review_count !== undefined) p.reviewCount = data.visitor_review_count;
    if (data.blog_review_total !== undefined)    p.blogReviewCount = data.blog_review_total;
    if (data.avg_rating !== undefined)           p.avgRating = data.avg_rating;
    if (parsed_id) p.naverUrl = `https://map.naver.com/v5/entry/place/${parsed_id}`;

    // 크롤링 로그 추가
    p.crawlStatus = 'ok';
    p.crawledAt   = now;
    p.crawlLogs.unshift({
      ts: now, status: 'ok',
      items: { basic: true, hours: !!data.hours, menu: !!(data.menus?.length), review: !!(data.visitor_review_count), photos: false, keywords: !!(data.keyword_list?.length) },
      note: '수동 수집 완료'
    });

    statusEl.innerHTML = `✅ 수집 완료 — ${data.name || '업체명 미확인'} / 리뷰 ${data.visitor_review_count ?? '–'}건`;
    statusEl.style.background = 'rgba(34,197,94,.08)';
    statusEl.style.borderColor = 'rgba(34,197,94,.25)';
    statusEl.style.color = 'var(--green)';

    // 화면 갱신
    setTimeout(() => renderPage(), 1200);

  } catch (e) {
    console.error('[runParseCrawl]', e);
    statusEl.innerHTML = `❌ 파서 연결 실패: ${e.message}<br><span style="font-size:11px;color:var(--text3)">파서 서버가 실행 중인지 확인해 주세요 (포트 8000)</span>`;
    statusEl.style.background = 'rgba(239,68,68,.08)';
    statusEl.style.borderColor = 'rgba(239,68,68,.25)';
    statusEl.style.color = '#f87171';

    p.crawlStatus = 'error';
    p.crawlLogs.unshift({
      ts: new Date().toISOString().slice(0,16).replace('T',' '),
      status: 'error',
      items: { basic:false, hours:false, menu:false, review:false, photos:false, keywords:false },
      note: `파서 오류: ${e.message}`
    });
  } finally {
    btn.disabled  = false;
    btn.textContent = '🔄 지금 수집';
    btn.style.opacity = '1';
  }
}

/* ══════ 시작 ══════ */
renderPage();
</script>
