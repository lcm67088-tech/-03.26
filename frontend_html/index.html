<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nplace.io — 로그인</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="toast-container"></div>

<div class="login-page">
  <div style="width:100%;max-width:420px">

    <div style="text-align:center;margin-bottom:32px">
      <div class="login-logo">
        <div class="logo-mark" style="width:44px;height:44px;font-size:18px">N</div>
        <span class="login-logo-text" style="font-size:24px">nplace.io</span>
      </div>
      <p style="font-size:13px;color:var(--text2);line-height:1.7">
        네이버 플레이스 마케팅 최적화 플랫폼
      </p>
    </div>

    <div class="login-card">
      <!-- 데모 안내 -->
      <div class="demo-notice" id="demo-notice">
        <span style="font-size:16px;flex-shrink:0">ℹ️</span>
        <div>
          <strong>일반 계정</strong> — admin@nplace.io / password123<br>
          <strong>어드민 계정</strong> — superadmin@nplace.io / admin1234!
        </div>
      </div>

      <!-- 계정 유형 탭 -->
      <div class="login-role-tabs">
        <button class="login-role-tab active" id="tab-user" onclick="switchRole('user')">👤 일반 계정</button>
        <button class="login-role-tab" id="tab-admin" onclick="switchRole('admin')">🛡️ 어드민</button>
      </div>

      <h2 class="login-title" style="font-size:18px;margin-bottom:4px" id="form-title">로그인</h2>
      <p class="login-sub" style="margin-bottom:20px;font-size:12px" id="form-sub">계속하려면 로그인하세요</p>

      <!-- 소셜 로그인 -->
      <button class="social-btn" onclick="toast('소셜 로그인은 데모에서 지원하지 않습니다','info')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="#FEE500"><path d="M12 3C6.477 3 2 6.477 2 10.5c0 2.61 1.535 4.9 3.875 6.3-.17.62-.617 2.24-.707 2.59-.11.43.16.42.33.31.14-.09 1.77-1.2 2.49-1.69.65.09 1.33.14 2.01.14 5.523 0 10-3.477 10-7.5S17.523 3 12 3z"/></svg>
        카카오로 로그인
      </button>
      <button class="social-btn" onclick="toast('소셜 로그인은 데모에서 지원하지 않습니다','info')">
        <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Google로 로그인
      </button>

      <div class="or-divider"><span>또는 이메일로 로그인</span></div>

      <!-- 이메일/비밀번호 폼 -->
      <div class="input-group">
        <label class="input-label">이메일</label>
        <input class="input" type="email" id="login-email" placeholder="이메일 주소"
          autocomplete="email" onkeydown="if(event.key==='Enter')doLoginForm()">
      </div>
      <div class="input-group" style="margin-bottom:20px">
        <label class="input-label">비밀번호</label>
        <div class="input-wrap">
          <input class="input" type="password" id="login-pw" placeholder="비밀번호"
            autocomplete="current-password" onkeydown="if(event.key==='Enter')doLoginForm()">
          <button class="pw-toggle" type="button" onclick="togglePw(this)">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <button class="btn btn-primary btn-full btn-lg" id="login-btn" onclick="doLoginForm()">
        🚀 로그인
      </button>

      <div class="login-footer">
        계정이 없으신가요? <a href="#" onclick="toast('회원가입은 준비 중입니다','info')">무료로 시작하기</a>
      </div>
    </div>

    <!-- 테마 토글 -->
    <div style="text-align:center;margin-top:16px">
      <button class="btn btn-ghost btn-sm" id="theme-toggle-btn" onclick="toggleTheme()" style="color:var(--text3)">
        <span id="theme-icon">☀️</span> 라이트 모드
      </button>
    </div>

  </div>
</div>

<script src="js/app.js"></script>
<script>
// 테마 토글 버튼 초기화
(function() {
  const isLight = document.body.classList.contains('light');
  const btn = document.getElementById('theme-toggle-btn');
  if (btn) btn.innerHTML = isLight ? '🌙 다크 모드' : '☀️ 라이트 모드';
})();

// 이미 로그인된 경우 리다이렉트
if (CURRENT_USER) {
  location.href = CURRENT_USER.isAdmin ? 'admin.html' : 'dashboard.html';
}

let currentRole = 'user';
const PRESETS = {
  user:  { email: 'admin@nplace.io',       pw: 'password123',  title: '로그인',       sub: '계속하려면 로그인하세요' },
  admin: { email: 'superadmin@nplace.io',  pw: 'admin1234!',   title: '어드민 로그인', sub: '어드민 계정으로 로그인하세요' },
};

function switchRole(role) {
  currentRole = role;
  document.getElementById('tab-user').classList.toggle('active', role === 'user');
  document.getElementById('tab-admin').classList.toggle('active', role === 'admin');
  const p = PRESETS[role];
  document.getElementById('form-title').textContent = p.title;
  document.getElementById('form-sub').textContent = p.sub;
  document.getElementById('login-email').value = p.email;
  document.getElementById('login-pw').value = p.pw;
}

// 기본값 세팅
switchRole('user');

function togglePw(btn) {
  const input = btn.previousElementSibling;
  const isText = input.type === 'text';
  input.type = isText ? 'password' : 'text';
  btn.innerHTML = isText
    ? '<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>'
    : '<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
}

function doLoginForm() {
  const email = document.getElementById('login-email').value.trim();
  const pw    = document.getElementById('login-pw').value;
  const btn   = document.getElementById('login-btn');

  if (!email) return toast('이메일을 입력해 주세요', 'error');
  if (!pw)    return toast('비밀번호를 입력해 주세요', 'error');

  btn.textContent = '로그인 중...';
  btn.disabled = true;

  setTimeout(() => {
    const user = doLogin(email, pw);
    if (!user) {
      btn.innerHTML = '🚀 로그인';
      btn.disabled = false;
      return toast('이메일 또는 비밀번호가 올바르지 않습니다', 'error');
    }
    toast(`${user.name}님, 환영합니다! 🎉`, 'success');
    setTimeout(() => {
      location.href = user.isAdmin ? 'admin.html' : 'dashboard.html';
    }, 700);
  }, 500);
}

// 테마 토글 오버라이드 (로그인 페이지용)
const _origToggleTheme = toggleTheme;
window.toggleTheme = function() {
  _origToggleTheme();
  const isLight = document.body.classList.contains('light');
  const btn = document.getElementById('theme-toggle-btn');
  if (btn) btn.innerHTML = isLight ? '🌙 다크 모드' : '☀️ 라이트 모드';
};
</script>
</body>
</html>
