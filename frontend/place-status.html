<style>
/* ── 현황 그리드 ── */
.status-grid {
  display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:20px;
}
@media(max-width:1100px){.status-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:600px) {.status-grid{grid-template-columns:1fr;}}

/* ── 플레이스 카드 ── */
.ps-card {
  background:var(--bg2); border:1px solid var(--border); border-radius:14px;
  padding:16px; cursor:pointer; transition:all .2s;
}
.ps-card:hover, .ps-card.selected {
  border-color:var(--cyan); box-shadow:0 0 0 1px rgba(var(--cyan-rgb),.15);
}
.ps-card.selected { background:rgba(var(--cyan-rgb),.04); }
.ps-card-name { font-size:14px; font-weight:800; color:var(--text-title); margin-bottom:4px; }
.ps-card-cat  { font-size:11px; color:var(--text3); margin-bottom:10px; }
.ps-stat-row  { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
.ps-stat-label{ font-size:11px; color:var(--text3); }
.ps-stat-val  { font-size:13px; font-weight:700; color:var(--text); }
.ps-stat-val.up   { color:var(--green); }
.ps-stat-val.down { color:var(--red); }

/* ── 상세 패널 ── */
.detail-panel {
  background:var(--bg2); border:1px solid var(--border); border-radius:14px;
  padding:20px; margin-bottom:20px;
}
.detail-tabs {
  display:flex; gap:0; border-bottom:1px solid var(--border); margin-bottom:20px;
}
.detail-tab {
  padding:8px 16px; font-size:13px; font-weight:600; color:var(--text3);
  border:none; background:none; cursor:pointer; border-bottom:2px solid transparent;
  margin-bottom:-1px; transition:all .15s; font-family:inherit;
}
.detail-tab.active { color:var(--cyan); border-bottom-color:var(--cyan); }
.detail-tab:hover  { color:var(--text); }

/* ── 순위 키워드 테이블 ── */
.kw-table { width:100%; border-collapse:collapse; }
.kw-table th {
  padding:9px 12px; font-size:11px; font-weight:700; color:var(--text3);
  background:var(--bg-table-head); border-bottom:1px solid var(--border);
  text-transform:uppercase; letter-spacing:.4px; text-align:left;
}
.kw-table td {
  padding:10px 12px; font-size:12px; color:var(--text);
  border-bottom:1px solid var(--border); vertical-align:middle;
}
.kw-table tr:last-child td { border-bottom:none; }
.kw-table tr:hover td { background:var(--bg-row-hover); }

/* ── 통계 그리드 ── */
.stats-grid {
  display:grid; grid-template-columns:repeat(3,1fr); gap:14px;
}
@media(max-width:800px){.stats-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:500px){.stats-grid{grid-template-columns:1fr;}}
.stat-box {
  background:var(--bg-hover2); border:1px solid var(--border); border-radius:10px; padding:14px;
}
.stat-box-label { font-size:11px; color:var(--text3); margin-bottom:6px; }
.stat-box-val   { font-size:22px; font-weight:800; color:var(--text-title); line-height:1; }
.stat-box-change{ font-size:11px; margin-top:5px; }
.stat-box-change.up   { color:var(--green); }
.stat-box-change.down { color:var(--red); }
.stat-box-change.flat { color:var(--text3); }

/* ── 추이 차트 ── */
.trend-chart-wrap { height:180px; position:relative; margin-top:12px; }

/* ── 크롤링 상태 ── */
.crawl-status-badge {
  display:inline-flex; align-items:center; gap:5px;
  padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700;
}
.crawl-ok   { background:rgba(34,197,94,.12); color:var(--green); border:1px solid rgba(34,197,94,.25); }
.crawl-warn { background:rgba(250,204,21,.12); color:#facc15;      border:1px solid rgba(250,204,21,.25); }
.crawl-error{ background:rgba(239,68,68,.12);  color:var(--red);   border:1px solid rgba(239,68,68,.25); }

.crawl-log-row {
  display:flex; align-items:flex-start; gap:12px; padding:10px 0;
  border-bottom:1px solid var(--border);
}
.crawl-log-row:last-child { border-bottom:none; }
.crawl-log-dot {
  width:8px; height:8px; border-radius:50%; flex-shrink:0; margin-top:5px;
}
.dot-ok   { background:var(--green); }
.dot-warn { background:#facc15; }
.dot-error{ background:var(--red); }

/* ── 리뷰 카드 ── */
.rev-card {
  background:var(--bg-hover2); border:1px solid var(--border); border-radius:10px;
  padding:12px; margin-bottom:10px;
}
.rev-card:last-child { margin-bottom:0; }
.rev-meta { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.rev-stars { color:#fbbf24; font-size:12px; }
.rev-author { font-size:12px; font-weight:600; color:var(--text2); }
.rev-date   { font-size:11px; color:var(--text3); margin-left:auto; }
.rev-text   { font-size:12px; color:var(--text); line-height:1.6; }

/* ── 광고 섹션 ── */
.ad-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 0; border-bottom:1px solid var(--border);
}
.ad-row:last-child { border-bottom:none; }

/* ── 메뉴 그리드 ── */
.menu-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:10px; }
.menu-item {
  background:var(--bg-hover2); border:1px solid var(--border); border-radius:10px; padding:12px;
}
.menu-item.highlight { border-color:rgba(var(--cyan-rgb),.4); background:rgba(var(--cyan-rgb),.04); }
.menu-name  { font-size:13px; font-weight:700; color:var(--text-title); margin-bottom:4px; }
.menu-price { font-size:12px; color:var(--cyan); font-weight:600; }

/* ── 크롤링 아이템 체크리스트 ── */
.crawl-items { display:flex; flex-wrap:wrap; gap:6px; margin-top:4px; }
.crawl-item-badge {
  display:inline-flex; align-items:center; gap:3px; padding:2px 8px;
  border-radius:4px; font-size:10px; font-weight:600;
}
.ci-ok   { background:rgba(34,197,94,.1); color:var(--green); }
.ci-fail { background:rgba(239,68,68,.1); color:var(--red); }

/* ── 미니 스파크라인 ── */
.sparkline { display:flex; align-items:flex-end; gap:2px; height:28px; margin-top:4px; }
.spark-bar { width:4px; border-radius:1px; background:var(--cyan); opacity:.7; }
</style>

/* ══════ 전역 상태 ══════ */
let _selId  = PLACES[0].id;
let _subTab = 'stats'; // stats | keywords | reviews | menu | crawl | orders | ranking

/* ══════════════════════════════════════
   렌더링
══════════════════════════════════════ */
function renderPage() {
  document.getElementById('page-content').innerHTML = buildHTML();
  bindEvents();
  drawCharts();
}

function buildHTML() {
  const p = PLACES.find(pl => pl.id === _selId) || PLACES[0];

  return `
<!-- ── 상단 요약 KPI ── -->
<div class="kpi-grid" style="margin-bottom:20px">
  ${buildSummaryKPI()}
</div>

<!-- ── 플레이스 카드 셀렉터 ── -->
<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px">
  ${PLACES.map(pl => buildPlaceCard(pl)).join('')}
</div>

<!-- ── 상세 패널 ── -->
<div class="detail-panel">
  <!-- 패널 헤더 -->

    </div>
    <div style="display:flex;align-items:center;gap:10px">
      ${crawlBadge(p.crawlStatus)}
      <span style="font-size:11px;color:var(--text3)">최근 수집 ${p.crawledAt}</span>

    </div>

  <!-- 서브탭 -->
  <div class="detail-tabs">
    ${[
      ['stats',    '📊 통계 지표'],
      ['ranking',  '📈 순위 현황'],
      ['keywords', '🔑 키워드 관리'],
      ['reviews',  '💬 리뷰'],
      ['menu',     '🍽️ 메뉴'],
      ['crawl',    '🤖 크롤링 이력'],
      ['orders',   '📦 주문 현황'],
    ].map(([key, label]) => `
      <button class="detail-tab${_subTab===key?' active':''}" onclick="switchSubTab('${key}')">${label}</button>

    ${buildSubTab(p)}

/* ── 전체 KPI 요약 ── */
function buildSummaryKPI() {
  const totalReview   = PLACES.reduce((a,p) => a+p.reviewCount, 0);
  const totalBlog     = PLACES.reduce((a,p) => a+p.blogReviewCount, 0);
  const warnPlaces    = PLACES.filter(p => p.crawlStatus !== 'ok').length;
  const allRankKws    = PLACES.flatMap(p => p.keywords.filter(k => k.isRankKw));
  const top5RankKws   = allRankKws.filter(k => k.rank && k.rank <= 5);
  const rank1Kws      = allRankKws.filter(k => k.rank === 1);

  // 전체 순위 상승/하락 집계
  const allTrackedKws = PLACES.flatMap(p => p.keywords.filter(k => k.rank !== null && k.prev !== null));
  const risingKws     = allTrackedKws.filter(k => k.rank < k.prev);
  const fallingKws    = allTrackedKws.filter(k => k.rank > k.prev);

  return `
  <div class="kpi-card">
    <div class="kpi-label">📍 관리 플레이스</div>
    <div class="kpi-value">${PLACES.length}</div>
    <div class="kpi-change ${warnPlaces>0?'down':'flat'}">${warnPlaces>0 ? `⚠️ ${warnPlaces}개 수집 이슈` : '✅ 전체 정상'}</div>
  </div>
  <div class="kpi-card">
    <div class="kpi-label">🏆 순위키 TOP5 달성</div>
    <div class="kpi-value text-yellow">${top5RankKws.length}<span style="font-size:14px;font-weight:500;color:var(--text3)">/${allRankKws.length}</span></div>
    <div class="kpi-change ${rank1Kws.length>0?'up':'flat'}">🥇 1위 ${rank1Kws.length}개</div>
  </div>
  <div class="kpi-card">
    <div class="kpi-label">📈 키워드 상승</div>
    <div class="kpi-value" style="color:var(--green)">${risingKws.length}</div>
    <div class="kpi-change up">전체 추적 키워드 대비</div>
  </div>
  <div class="kpi-card">
    <div class="kpi-label">📉 키워드 하락</div>
    <div class="kpi-value" style="color:var(--red)">${fallingKws.length}</div>
    <div class="kpi-change ${fallingKws.length>0?'down':'flat'}">${fallingKws.length>0?'⚠️ 조치 필요':'✅ 하락 없음'}</div>
  </div>
  <div class="kpi-card">
    <div class="kpi-label">💬 전체 영수증 리뷰</div>
    <div class="kpi-value">${totalReview.toLocaleString()}</div>
    <div class="kpi-change up">▲ ${(totalReview - PLACES.reduce((a,p)=>a+p.reviewCountPrev,0)).toLocaleString()} 지난달 대비</div>
  </div>
  <div class="kpi-card">
    <div class="kpi-label">📝 전체 블로그 리뷰</div>
    <div class="kpi-value">${totalBlog.toLocaleString()}</div>
    <div class="kpi-change up">▲ ${(totalBlog - PLACES.reduce((a,p)=>a+p.blogReviewPrev,0)).toLocaleString()} 지난달 대비</div>
  </div>`;
}

/* ── 플레이스 카드 ── */
function buildPlaceCard(p) {
  const rankKw = p.keywords.find(k => k.isRankKw);
  const rvDiff = p.reviewCount - p.reviewCountPrev;
  const blDiff = p.blogReviewCount - (p.blogReviewPrev||0);
  const spark  = rankKw ? sparkline(rankKw.rankHistory.slice(-7).filter(v=>v!==null)) : '';

  return `
  <div class="ps-card${p.id===_selId?' selected':''}" style="flex:1;min-width:220px;max-width:300px"
    onclick="selectPlace(${p.id})">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px">
      <div>
        <div class="ps-card-name">${p.name}</div>
        <div class="ps-card-cat">${p.category}</div>
      </div>
      ${crawlBadge(p.crawlStatus)}
    </div>
    ${rankKw ? `
      <div style="background:rgba(var(--cyan-rgb),.06);border:1px solid rgba(var(--cyan-rgb),.2);border-radius:8px;padding:8px 10px;margin-bottom:10px">
        <div style="font-size:11px;color:var(--text3);margin-bottom:3px">📌 순위키</div>
        <div style="display:flex;align-items:center;justify-content:space-between">
          <span style="font-size:13px;font-weight:700;color:var(--text-title)">${rankKw.kw}</span>
          ${rankBadge(rankKw.rank)}
        </div>
        ${spark}
      </div>` : `<div style="font-size:11px;color:var(--text3);padding:6px 0">순위키 미등록</div>`}
    <div class="ps-stat-row">
      <span class="ps-stat-label">영수증 리뷰</span>
      <span class="ps-stat-val ${rvDiff>0?'up':'flat'}">${p.reviewCount} ${rvDiff>0?'▲'+rvDiff:''}</span>
    </div>
    <div class="ps-stat-row" style="margin-bottom:0">
      <span class="ps-stat-label">블로그</span>
      <span class="ps-stat-val ${blDiff>0?'up':'flat'}">${p.blogReviewCount} ${blDiff>0?'▲'+blDiff:''}</span>
    </div>
  </div>`;
}

/* ── 서브탭 콘텐츠 ── */
function buildSubTab(p) {
  if (_subTab === 'stats')    return buildStats(p);
  if (_subTab === 'ranking')   return buildRanking(p);
  if (_subTab === 'keywords') return buildKeywords(p);
  if (_subTab === 'reviews')  return buildReviews(p);
  if (_subTab === 'menu')     return buildMenu(p);
  if (_subTab === 'crawl')    return buildCrawlLog(p);
  if (_subTab === 'orders')   return buildOrders(p);
  return '';
}

/* ── 통계 지표 탭 ── */
function buildStats(p) {
  // 파서로 직접 확인 가능한 수치만 표시 (추정치·저장수 제거)
  const stats = [
    { label:'영수증 리뷰', val:p.reviewCount,     prev:p.reviewCountPrev,  icon:'💬', color:'var(--cyan)' },
    { label:'평균 별점',   val:p.avgRating,       prev:null,               icon:'⭐', color:'#fbbf24' },
    { label:'블로그 리뷰', val:p.blogReviewCount, prev:p.blogReviewPrev,   icon:'📝', color:'#a78bfa' },
  ];

  const statBoxes = stats.map(s => {
    const diff = s.prev ? s.val - s.prev : null;
    const pct  = s.prev ? ((s.val-s.prev)/s.prev*100).toFixed(1) : null;
    return `
    <div class="stat-box">
      <div class="stat-box-label">${s.icon} ${s.label}</div>
      <div class="stat-box-val" style="color:${s.color}">${typeof s.val==='number'&&s.val>999?s.val.toLocaleString():s.val}</div>
      ${diff !== null ? `<div class="stat-box-change ${diff>0?'up':diff<0?'down':'flat'}">${diff>0?'▲':'▼'} ${Math.abs(diff).toLocaleString()} (${pct}%) 지난달 대비</div>` : ''}
    </div>`;
  }).join('');

  return `
  <div class="stats-grid" style="margin-bottom:20px">${statBoxes}</div>

  <!-- 추이 차트 -->
  <div class="card" style="padding:16px;border:1px solid var(--border);border-radius:12px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <div style="font-size:13px;font-weight:700;color:var(--text)">📈 수집 추이 (영수증리뷰 / 블로그)</div>
      <div style="font-size:11px;color:var(--text3)">${p.trendDates.length ? `최근 ${p.trendDates.length}개 구간 · 크롤링 수집 기준` : '크롤링 수집 후 표시됩니다'}</div>
    </div>
    <div class="trend-chart-wrap"><canvas id="trendChart"></canvas></div>
  </div>

  <!-- 대표키워드 -->
  <div style="margin-top:16px">
    <div style="font-size:12px;font-weight:700;color:var(--text3);margin-bottom:8px;text-transform:uppercase;letter-spacing:.4px">📌 네이버 대표 키워드 (플레이스 등록)</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">
      ${p.repKeywords.map(k => `
        <span style="padding:4px 10px;background:rgba(var(--cyan-rgb),.08);border:1px solid rgba(var(--cyan-rgb),.2);border-radius:20px;font-size:12px;font-weight:600;color:var(--cyan)">${k}</span>
      `).join('')}
    </div>
    <div style="background:rgba(250,204,21,.06);border:1px solid rgba(250,204,21,.2);border-radius:8px;padding:10px 14px;font-size:11px;color:var(--text2);line-height:1.8">
      <strong style="color:#facc15">⚠️ 대표키워드란?</strong>
      네이버 플레이스에 사업주가 직접 등록한 <strong>공식 업종·서비스 키워드</strong>입니다.
      nplace.io에서는 수정 불가 — 변경하려면 네이버 플레이스 관리 콘솔을 이용하세요.<br>
      <span style="color:var(--text3)">
        📌 <strong>순위키</strong>: 상위 노출을 목표로 추적하는 키워드 (최대 3개) &nbsp;|&nbsp;
        ⚡ <strong>작업키</strong>: SEO 롱테일 작업 투입 키워드 &nbsp;—&nbsp;
        두 유형 모두 대표키워드와 별개로 관리됩니다.
        <a href="places.html" style="color:var(--cyan);margin-left:4px">플레이스 관리에서 확인 →</a>
      </span>
    </div>
  </div>`;
}

/* ── 키워드 현황 탭 ── */
function buildKeywords(p) {
  const rankKws = p.keywords.filter(k => k.isRankKw);
  const workKws = p.keywords.filter(k => !k.isRankKw).sort((a,b) => a.sortOrder - b.sortOrder);

  const kwRow = (k, type) => {
    const chg = (k.rank && k.prev) ? k.prev - k.rank : null;
    const hist = k.rankHistory.filter(v=>v!==null);
    const sp = hist.length > 0 ? sparkline(hist.slice(-7)) : '<span style="font-size:11px;color:var(--text3)">데이터 없음</span>';
    return `
    <tr>
      <td>
        <div style="display:flex;align-items:center;gap:6px">
          ${type==='rank' ? '<span style="font-size:10px;padding:1px 6px;border-radius:4px;background:rgba(var(--cyan-rgb),.12);color:var(--cyan);font-weight:700;border:1px solid rgba(var(--cyan-rgb),.25)">📌 순위키</span>' :
                           '<span style="font-size:10px;padding:1px 6px;border-radius:4px;background:rgba(34,197,94,.1);color:var(--green);font-weight:700;border:1px solid rgba(34,197,94,.25)">⚡ 작업키</span>'}
          <span style="font-size:13px;font-weight:700;color:var(--text-title)">${k.kw}</span>
          ${k.failReason ? `<span style="font-size:10px;color:var(--red)">⚠️ ${k.failReason}</span>` : ''}
        </div>
      </td>
      <td>${rankBadge(k.rank)}</td>
      <td>
        ${chg !== null
          ? `<span style="font-weight:700;font-size:13px;color:${chg>0?'var(--green)':chg<0?'var(--red)':'var(--text3)'}">${chg>0?'▲':'▼'} ${Math.abs(chg)}</span>`
          : '<span style="color:var(--text3);font-size:12px">—</span>'}
      </td>
      <td>${sp}</td>
      <td>
        ${k.isTopSection ? '<span style="font-size:10px;padding:1px 6px;border-radius:4px;background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.2)">✅ 플레이스 최상단</span>' : '<span style="font-size:11px;color:var(--text3)">—</span>'}
      </td>
      <td>
        ${k.cpcCount > 0 ? `<span style="font-size:10px;padding:1px 6px;border-radius:4px;background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2)">CPC ${k.cpcCount}개</span>` : '<span style="font-size:11px;color:var(--text3)">없음</span>'}
      </td>
      <td><span style="font-size:11px;color:var(--text3)">${k.lastChecked || '—'}</span></td>
    </tr>`;
  };

  return `
  <!-- 순위 키워드 -->
  <div style="margin-bottom:20px">
    <div style="font-size:12px;font-weight:700;color:var(--text3);margin-bottom:10px;text-transform:uppercase;letter-spacing:.4px">
      📌 순위 키워드 ${rankKws.length}/3 <span style="font-size:11px;font-weight:400;color:var(--text3)">— 순위를 올리고 싶은 목표 키워드</span>
    </div>
    <div style="overflow-x:auto">
      <table class="kw-table">
        <thead><tr>
          <th>키워드</th><th>현재순위</th><th>변동</th><th>추이 (15일)</th><th>플레이스 최상단</th><th>CPC 경쟁</th><th>마지막 조회</th>
        </tr></thead>
        <tbody>${rankKws.map(k => kwRow(k,'rank')).join('') || '<tr><td colspan="7" style="text-align:center;color:var(--text3);padding:16px">등록된 순위 키워드가 없습니다</td></tr>'}</tbody>
      </table>
    </div>
  </div>

  <!-- 작업 키워드 -->
  <div>
    <div style="font-size:12px;font-weight:700;color:var(--text3);margin-bottom:10px;text-transform:uppercase;letter-spacing:.4px">
      ⚡ 작업 키워드 ${workKws.length}개 <span style="font-size:11px;font-weight:400;color:var(--text3)">— SEO 작업 투입 롱테일 키워드</span>
    </div>
    <div style="overflow-x:auto">
      <table class="kw-table">
        <thead><tr>
          <th>키워드</th><th>현재순위</th><th>변동</th><th>추이 (15일)</th><th>플레이스 최상단</th><th>CPC 경쟁</th><th>마지막 조회</th>
        </tr></thead>
        <tbody>${workKws.map(k => kwRow(k,'work')).join('') || '<tr><td colspan="7" style="text-align:center;color:var(--text3);padding:16px">등록된 작업 키워드가 없습니다</td></tr>'}</tbody>
      </table>
    </div>
    <div style="font-size:11px;color:var(--text3);margin-top:8px">
      💡 1~5위 키워드만 작업 가능 (✅ 작업가능 조건) · 키워드 관리는 <a href="places.html" style="color:var(--cyan)">플레이스 관리</a>에서
    </div>
  </div>`;
}

/* ── 리뷰 탭 ── */
function buildReviews(p) {
  const stars = n => '★'.repeat(n) + '☆'.repeat(5-n);
  return `
  <div style="display:flex;gap:20px;margin-bottom:16px;flex-wrap:wrap">
    <div style="text-align:center;padding:16px 24px;background:rgba(var(--cyan-rgb),.06);border:1px solid rgba(var(--cyan-rgb),.2);border-radius:12px;min-width:120px">
      <div style="font-size:32px;font-weight:800;color:var(--cyan)">${p.avgRating}</div>
      <div style="color:#fbbf24;font-size:16px;margin:4px 0">${'★'.repeat(Math.round(p.avgRating))}</div>
      <div style="font-size:11px;color:var(--text3)">평균 별점</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;justify-content:center">
      <div style="font-size:13px;color:var(--text2)">💬 영수증 리뷰 <strong style="color:var(--text-title)">${p.reviewCount}</strong>건</div>
      <div style="font-size:13px;color:var(--text2)">📝 블로그·카페 리뷰 <strong style="color:var(--text-title)">${p.blogReviewCount}</strong>건</div>
      <div style="font-size:11px;color:var(--text3)">상세 리뷰 내용은 플레이스 관리 → 리뷰 탭에서 확인</div>
    </div>
  </div>

  <div style="font-size:12px;font-weight:700;color:var(--text3);margin-bottom:10px;text-transform:uppercase;letter-spacing:.4px">최근 영수증 리뷰</div>
  ${p.recentReviews.map(r => `
    <div class="rev-card">

/* ══════════════════════════════════════════════
   📈 순위 현황 탭 — 전체 플레이스 상승/하락 + 경쟁사 + 업셀링 피드백
══════════════════════════════════════════════ */
function buildRanking(p) {
  const LEVEL_STYLE = {
    high: 'background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.25);',
    mid:  'background:rgba(250,204,21,.07);border-color:rgba(250,204,21,.25);',
    low:  'background:rgba(0,212,255,.06);border-color:rgba(0,212,255,.2);',
    ok:   'background:rgba(34,197,94,.07);border-color:rgba(34,197,94,.2);',
  };
  const LEVEL_COLOR = { high:'#f87171', mid:'#facc15', low:'var(--cyan)', ok:'var(--green)' };

  /* ── 업셀링 피드백 생성 ── */
  function genFeedback(pl) {
    const tips = [];
    const rkKws   = pl.keywords.filter(k => k.isRankKw && k.rank !== null && k.prev !== null);
    const anyDrop = rkKws.some(k => k.rank > k.prev);
    const anyLow  = rkKws.some(k => k.rank > 10);
    const reviewLow  = pl.reviewCount < 200;
    const blogLow    = pl.blogReviewCount < 80;
    const blogMid    = pl.blogReviewCount >= 80 && pl.blogReviewCount < 150;
    const hasReward  = (pl.orders||[]).some(o => o.type==='reward' && o.status==='active');
    const hasBlog    = (pl.orders||[]).some(o => o.type==='blog'   && o.status==='active');
    const topComp    = (pl.competitors||[])[0];
    const compRevGap = topComp ? topComp.reviewCount - pl.reviewCount : 0;
    const compBlgGap = topComp ? topComp.blogReviewCount - pl.blogReviewCount : 0;

    if (anyDrop || anyLow) {
      if (reviewLow && !hasReward) {
        tips.push({ level:'high', icon:'🎯', msg:'리워드 유입 추가 권장',
          detail:`영수증 리뷰 ${pl.reviewCount}건으로 부족합니다.${compRevGap>0?' 경쟁 1위보다 '+compRevGap+'건 적습니다.':''} 리워드 유입 상품으로 실방문 리뷰를 빠르게 늘리세요.` });
      }
      if (blogLow && !hasBlog) {
        tips.push({ level:'high', icon:'📝', msg:'블로그 리뷰 추가 필요',
          detail:`블로그 리뷰 ${pl.blogReviewCount}건${compBlgGap>0?' (경쟁사 대비 -'+compBlgGap+'건)':''} — 네이버 검색 SEO에서 블로그 노출이 순위에 직접 영향을 미칩니다. 블로그 리뷰 상품 등록을 권장합니다.` });
      }
      if (blogMid && hasBlog && anyDrop) {
        tips.push({ level:'mid', icon:'⬆️', msg:'블로그 고급 상품으로 업그레이드',
          detail:`블로그 리뷰가 있지만 순위가 하락 중입니다. 더 파워풀한 블로거 상품(프리미엄·파워블로거)으로 교체하면 경쟁력을 높일 수 있습니다.` });
      }
      if (!hasReward && compRevGap > 100) {
        tips.push({ level:'mid', icon:'🔥', msg:'리워드 유입 — 프리미엄 전환',
          detail:`경쟁 1위 업체와 영수증 리뷰 ${compRevGap}건 격차. 프리미엄 리워드 유입으로 빠르게 따라잡을 수 있습니다.` });
      }
    } else if (!anyDrop && !anyLow) {
      tips.push({ level:'ok', icon:'✅', msg:'현재 순위 안정적',
        detail:`모든 순위 키워드가 유지 또는 상승 중입니다. 현재 캠페인을 유지하면서 리뷰를 꾸준히 쌓아가세요.` });
    }
    return tips;
  }

  /* ── 전체 플레이스 순위 상승/하락 요약 ── */
  const allSummary = PLACES.map(pl => {
    const rkKws   = pl.keywords.filter(k => k.isRankKw && k.rank !== null && k.prev !== null);
    const rising  = rkKws.filter(k => k.rank < k.prev);
    const falling = rkKws.filter(k => k.rank > k.prev);
    const stable  = rkKws.filter(k => k.rank === k.prev);
    const bestRk  = [...rkKws].sort((a,b) => (a.rank||999)-(b.rank||999))[0];
    return { pl, rkKws, rising, falling, stable, bestRk };
  });

  const risingPlaces  = allSummary.filter(s => s.rising.length > 0 && s.rising.length >= s.falling.length);
  const fallingPlaces = allSummary.filter(s => s.falling.length > 0 && s.falling.length > s.rising.length);

  /* ── 현재 선택 플레이스 데이터 ── */
  const cur     = allSummary.find(s => s.pl.id === p.id) || allSummary[0];
  const rankKws = cur.rkKws;
  const competitors = p.competitors || [];

  /* ── 경쟁사 테이블 ── */
  const compRowsArr = competitors.map(c => ({
    rank: c.rank||999,
    html: `<tr>
      <td style="padding:7px 10px;font-size:12px;color:var(--text2)">${c.name}</td>
      <td style="padding:7px 10px;font-size:12px;text-align:center">${rankBadge(c.rank)}</td>
      <td style="padding:7px 10px;font-size:12px;text-align:center;color:var(--text)">${c.reviewCount.toLocaleString()}</td>
      <td style="padding:7px 10px;font-size:12px;text-align:center;color:var(--text)">${c.blogReviewCount.toLocaleString()}</td>
      <td style="padding:7px 10px;text-align:center">${sparkline(c.rankHistory.slice(-10))}</td>
    </tr>`
  }));
  const myRk  = p.keywords.find(k=>k.isRankKw);
  const myRowObj = {
    rank: myRk?.rank||999,
    html: `<tr style="background:rgba(var(--cyan-rgb),.05)">
      <td style="padding:7px 10px;font-size:12px;font-weight:700;color:var(--cyan)">▶ ${p.name} (나)</td>
      <td style="padding:7px 10px;font-size:12px;text-align:center">${myRk ? rankBadge(myRk.rank) : '–'}</td>
      <td style="padding:7px 10px;font-size:12px;text-align:center;color:var(--cyan)">${p.reviewCount.toLocaleString()}</td>
      <td style="padding:7px 10px;font-size:12px;text-align:center;color:var(--cyan)">${p.blogReviewCount.toLocaleString()}</td>
      <td style="padding:7px 10px;text-align:center">${myRk ? sparkline(myRk.rankHistory.slice(-10)) : ''}</td>
    </tr>`
  };
  const allCompRows = [...compRowsArr, myRowObj].sort((a,b)=>a.rank-b.rank).map(r=>r.html).join('');

  const feedback = genFeedback(p);

  return `
  <!-- ① 전체 플레이스 순위 현황 -->
  <div style="margin-bottom:20px">
    <div style="font-size:12px;font-weight:700;color:var(--text3);margin-bottom:10px;text-transform:uppercase;letter-spacing:.4px">🏠 전체 플레이스 순위 현황</div>

    ${risingPlaces.length ? `
    <div style="margin-bottom:10px">
      <div style="font-size:11px;font-weight:700;color:var(--green);margin-bottom:6px">
        <span style="padding:2px 8px;border-radius:20px;background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.25)">▲ 순위 상승 업체 ${risingPlaces.length}곳</span>
      </div>
      ${risingPlaces.map(s => {
        const topKw = s.rising[0];
        return `<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;margin-bottom:5px;
          border:1px solid rgba(34,197,94,.2);background:rgba(34,197,94,.04)">
          <span style="font-size:12px;font-weight:700;color:var(--text);flex:1">${s.pl.name}</span>
          ${s.bestRk ? rankBadge(s.bestRk.rank) : ''}
          <span style="font-size:11px;color:var(--green);font-weight:700">▲ ${s.rising.length}개 상승</span>
          <span style="font-size:11px;color:var(--text3)">${topKw ? topKw.kw+' '+topKw.prev+'위→'+topKw.rank+'위' : ''}</span>
          ${s.bestRk ? sparkline(s.bestRk.rankHistory.slice(-8)) : ''}
        </div>`;
      }).join('')}
    </div>` : ''}

    ${fallingPlaces.length ? `
    <div style="margin-bottom:10px">
      <div style="font-size:11px;font-weight:700;color:var(--red);margin-bottom:6px">
        <span style="padding:2px 8px;border-radius:20px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2)">▼ 순위 하락 업체 ${fallingPlaces.length}곳 — 조치 필요</span>
      </div>
      ${fallingPlaces.map(s => {
        const worstKw = [...s.falling].sort((a,b)=>(b.rank-b.prev)-(a.rank-a.prev))[0];
        const tips    = genFeedback(s.pl);
        const topTip  = tips.find(t=>t.level==='high') || tips[0];
        return `<div style="padding:10px 12px;border-radius:8px;margin-bottom:6px;
          border:1px solid rgba(239,68,68,.2);background:rgba(239,68,68,.04)">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
            <span style="font-size:12px;font-weight:700;color:var(--text);flex:1">${s.pl.name}</span>
            ${s.bestRk ? rankBadge(s.bestRk.rank) : ''}
            <span style="font-size:11px;color:var(--red);font-weight:700">▼ ${s.falling.length}개 하락</span>
            <span style="font-size:11px;color:var(--text3)">${worstKw ? worstKw.kw+' '+worstKw.prev+'위→'+worstKw.rank+'위' : ''}</span>
            ${s.bestRk ? sparkline(s.bestRk.rankHistory.slice(-8)) : ''}
          </div>
          ${topTip ? `<div style="font-size:11px;padding:5px 9px;border-radius:6px;border:1px solid;${LEVEL_STYLE[topTip.level]}color:${LEVEL_COLOR[topTip.level]}">
            ${topTip.icon} <strong>${topTip.msg}</strong> — ${topTip.detail}
          </div>` : ''}
        </div>`;
      }).join('')}
    </div>` : `<div style="padding:8px 12px;border-radius:8px;border:1px solid rgba(34,197,94,.2);background:rgba(34,197,94,.04);font-size:12px;color:var(--green);margin-bottom:10px">✅ 하락 업체 없음 — 모든 플레이스 순위 안정적</div>`}
  </div>

  <hr style="border:none;border-top:1px solid var(--border);margin-bottom:16px">

  <!-- ② 선택 플레이스 순위 키워드 상세 -->
  <div style="font-size:12px;font-weight:700;color:var(--text3);margin-bottom:10px;text-transform:uppercase;letter-spacing:.4px">
    📌 ${p.name} — 순위 키워드 변동
  </div>

  <div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap">
    <div style="flex:1;min-width:80px;padding:10px 12px;border-radius:10px;border:1px solid rgba(34,197,94,.25);background:rgba(34,197,94,.07);text-align:center">
      <div style="font-size:20px;font-weight:800;color:var(--green)">${cur.rising.length}</div>
      <div style="font-size:11px;color:var(--text3);margin-top:2px">▲ 상승</div>
    </div>
    <div style="flex:1;min-width:80px;padding:10px 12px;border-radius:10px;border:1px solid rgba(100,116,139,.2);background:rgba(100,116,139,.06);text-align:center">
      <div style="font-size:20px;font-weight:800;color:var(--text3)">${cur.stable.length}</div>
      <div style="font-size:11px;color:var(--text3);margin-top:2px">— 유지</div>
    </div>
    <div style="flex:1;min-width:80px;padding:10px 12px;border-radius:10px;border:1px solid rgba(239,68,68,.2);background:rgba(239,68,68,.07);text-align:center">
      <div style="font-size:20px;font-weight:800;color:var(--red)">${cur.falling.length}</div>
      <div style="font-size:11px;color:var(--text3);margin-top:2px">▼ 하락</div>
    </div>
  </div>

  ${rankKws.length ? `
  <div style="margin-bottom:16px">
    ${rankKws.map(k => {
      const delta = k.prev - k.rank;
      const isUp  = delta > 0, isDn = delta < 0;
      return `<div style="display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;margin-bottom:6px;
        border:1px solid ${isUp?'rgba(34,197,94,.2)':isDn?'rgba(239,68,68,.2)':'var(--border)'};
        background:${isUp?'rgba(34,197,94,.05)':isDn?'rgba(239,68,68,.05)':'var(--bg-hover2)'}">
        <span style="font-size:12px;font-weight:700;color:var(--text);flex:1">${k.kw}</span>
        ${rankBadge(k.rank)}
        <span style="font-size:11px;font-weight:700;min-width:44px;text-align:right;color:${isUp?'var(--green)':isDn?'var(--red)':'var(--text3)'}">
          ${delta===0?'—':(isUp?'▲':'▼')+' '+Math.abs(delta)}
        </span>
        ${sparkline(k.rankHistory.slice(-10))}
      </div>`;
    }).join('')}
  </div>` : `<div style="font-size:12px;color:var(--text3);margin-bottom:16px">순위 키워드 데이터 없음</div>`}

  <!-- ③ 경쟁사 비교 -->
  ${competitors.length ? `
  <div style="margin-bottom:16px">
    <div style="font-size:12px;font-weight:700;color:var(--text3);margin-bottom:8px;text-transform:uppercase;letter-spacing:.4px">🏁 경쟁사 순위 비교</div>
    <div style="overflow-x:auto;border:1px solid var(--border);border-radius:10px">
      <table style="width:100%;border-collapse:collapse">
        <thead><tr style="background:var(--bg-hover2)">

          <th style="padding:7px 10px;font-size:11px;text-align:center;color:var(--text3);font-weight:600">순위</th>
          <th style="padding:7px 10px;font-size:11px;text-align:center;color:var(--text3);font-weight:600">영수증리뷰</th>
          <th style="padding:7px 10px;font-size:11px;text-align:center;color:var(--text3);font-weight:600">블로그리뷰</th>

        </tr></thead>

  </div>` : ''}

  <!-- ④ 업셀링 피드백 -->

    <div style="font-size:12px;font-weight:700;color:var(--text3);margin-bottom:8px;text-transform:uppercase;letter-spacing:.4px">💡 ${p.name} 개선 제안</div>

    <div style="padding:11px 14px;border-radius:10px;border:1px solid;margin-bottom:8px;${LEVEL_STYLE[f.level]}">

}

function buildOrders(p) {
  const orders = p.orders || [];
  if (!orders.length) return `<div style="padding:40px;text-align:center;color:var(--text3);font-size:13px">등록된 주문이 없습니다.</div>`;

  const STATUS_COLOR = { active:'#22c55e', pending:'#facc15', done:'#94a3b8', cancel:'#ef4444' };
  const STATUS_LABEL = { active:'진행중', pending:'대기중', done:'완료', cancel:'취소' };
  const TYPE_ICON    = { reward:'🎯', save:'🔖', blog:'📝', rank:'📌' };
  const DAY_KO       = ['일','월','화','수','목','금','토'];

  /* ─ 상태 관리 ─ */
  if (!window._orderCalState) window._orderCalState = {};
  const stateKey = 'cal_' + p.id;
  if (!window._orderCalState[stateKey]) {
    const today = new Date();
    window._orderCalState[stateKey] = { year: today.getFullYear(), month: today.getMonth() };
  }
  let { year, month } = window._orderCalState[stateKey];

  const today = new Date(); today.setHours(0,0,0,0);

  /* ─ 해당 월의 1일~말일 ─ */
  const firstDay = new Date(year, month, 1);
  const lastDay  = new Date(year, month + 1, 0);

  /* ─ 달력 그리드용 날짜 배열 (앞 빈칸 + 해당월 전체 + 뒷 빈칸) ─ */
  const startPad = firstDay.getDay(); // 0=일
  const totalCells = Math.ceil((startPad + lastDay.getDate()) / 7) * 7;
  const cells = [];
  for (let i = 0; i < totalCells; i++) {
    const dayNum = i - startPad + 1;
    if (dayNum < 1 || dayNum > lastDay.getDate()) {
      cells.push(null);
    } else {
      cells.push(new Date(year, month, dayNum));
    }
  }

  /* ─ 셀에 해당하는 주문 바 구하기 ─ */
  function getOrdersForDate(date) {
    if (!date) return [];
    return orders.filter(o => {
      const s = new Date(o.startDate); s.setHours(0,0,0,0);
      const e = new Date(o.endDate);   e.setHours(0,0,0,0);
      return date >= s && date <= e;
    });
  }

  /* ─ 월 이동 콜백 ─ */
  const prevFn = `(function(){window._orderCalState['${stateKey}']={year:${month===0?year-1:year},month:${month===0?11:month-1}};renderPage();})()`;
  const nextFn = `(function(){window._orderCalState['${stateKey}']={year:${month===11?year+1:year},month:${month===11?0:month+1}};renderPage();})()`;

  /* ─ 달력 헤더 ─ */
  const calHeader = `
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
    <div style="font-size:13px;font-weight:700;color:var(--text-title)">📅 주문 일정 — ${year}년 ${month+1}월</div>
    <div style="display:flex;gap:6px;align-items:center">
      <button onclick="${prevFn}" style="padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg-input);color:var(--text);cursor:pointer;font-size:13px">◀</button>
      <button onclick="${nextFn}" style="padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg-input);color:var(--text);cursor:pointer;font-size:13px">▶</button>
    </div>
  </div>`;

  /* ─ 요일 헤더 행 ─ */
  const dowHeader = `
  <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:2px">
    ${DAY_KO.map((d,i)=>`<div style="text-align:center;font-size:11px;font-weight:700;padding:5px 0;
      color:${i===0?'#f87171':i===6?'#60a5fa':'var(--text3)'}">${d}</div>`).join('')}
  </div>`;

  /* ─ 달력 셀 그리드 ─ */
  const weeks = [];
  for (let w = 0; w < cells.length; w += 7) weeks.push(cells.slice(w, w+7));

  const gridRows = weeks.map(week => {
    const dateCells = week.map((date, di) => {
      if (!date) return `<div style="min-height:64px;background:var(--bg-hover2);border-radius:6px;opacity:.3"></div>`;

      const isToday = date.getTime() === today.getTime();
      const isPast  = date < today;
      const dayOrders = getOrdersForDate(date);
      const isWeekend = di === 0 || di === 6;

      const dateNum = `<div style="display:flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;
        font-size:12px;font-weight:700;margin-bottom:3px;
        background:${isToday?'var(--cyan)':'transparent'};
        color:${isToday?'#000':isWeekend?(di===0?'#f87171':'#60a5fa'):'var(--text)'}">${date.getDate()}</div>`;

      const bars = dayOrders.map(o => {
        const sDate = new Date(o.startDate); sDate.setHours(0,0,0,0);
        const eDate = new Date(o.endDate);   eDate.setHours(0,0,0,0);
        const isFirst = date.getTime() === sDate.getTime();
        const isLast  = date.getTime() === eDate.getTime();
        const col = STATUS_COLOR[o.status] || '#94a3b8';
        const icon = isFirst ? (TYPE_ICON[o.type]||'📦')+' ' : '';
        return `<div style="
          font-size:10px;font-weight:600;padding:2px 4px;margin-bottom:2px;
          background:${col}22;border:1px solid ${col}55;color:${col};
          border-radius:${isFirst?'4px 0 0 4px':isLast?'0 4px 4px 0':'0'};
          white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
          border-left:${isFirst?`2px solid ${col}`:'none'};
          " title="${o.product||''} (${STATUS_LABEL[o.status]||o.status})">${icon}${isFirst?(o.product||'').slice(0,8):''}</div>`;
      }).join('');

      return `<div style="min-height:64px;padding:4px;background:${isToday?'rgba(0,212,255,.04)':isPast?'var(--bg-hover2)':'var(--bg2)'};
        border:1px solid ${isToday?'rgba(0,212,255,.3)':'var(--border)'};border-radius:6px;overflow:hidden">
        ${dateNum}${bars}
      </div>`;
    }).join('');

    return `<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:2px">${dateCells}</div>`;
  }).join('');

  /* ─ 주문 카드 목록 ─ */
  const orderCards = orders.map(o => {
    const s    = new Date(o.startDate);
    const e    = new Date(o.endDate);
    const diff = Math.round((e - today) / 86400000);
    const col  = STATUS_COLOR[o.status] || '#94a3b8';
    const lbl  = STATUS_LABEL[o.status] || o.status;
    return `
    <div style="padding:12px 14px;border-radius:10px;border:1px solid ${col}33;background:${col}0a;margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <span style="font-size:16px">${TYPE_ICON[o.type]||'📦'}</span>
        <span style="font-size:13px;font-weight:700;color:var(--text-title);flex:1">${o.product||'상품명 없음'}</span>
        <span style="font-size:11px;padding:2px 8px;border-radius:20px;background:${col}22;color:${col};border:1px solid ${col}44;font-weight:600">${lbl}</span>
      </div>
      <div style="font-size:11px;color:var(--text3);display:flex;gap:12px;flex-wrap:wrap">
        <span>📅 ${o.startDate} ~ ${o.endDate}</span>
        ${o.status==='active'
          ? `<span style="color:${diff<=3?'#f87171':'var(--cyan)'};font-weight:600">${diff>=0?`D-${diff}`:'종료'}</span>`
          : ''}
        ${o.keywords?.length ? `<span>🔑 ${o.keywords.join(', ')}</span>` : ''}
      </div>
    </div>`;
  }).join('');

  return `
  ${calHeader}
  ${dowHeader}
  <div style="margin-bottom:20px">${gridRows}</div>
  <div style="font-size:12px;font-weight:700;color:var(--text3);margin-bottom:10px;text-transform:uppercase;letter-spacing:.4px">📋 주문 상세</div>
  ${orderCards}`;
}

function crawlBadge(status) {
  if (status === 'ok')    return `<span class="crawl-status-badge crawl-ok">✅ 정상</span>`;
  if (status === 'warn')  return `<span class="crawl-status-badge crawl-warn">⚠️ 일부실패</span>`;
  return `<span class="crawl-status-badge crawl-error">❌ 오류</span>`;
}

function rankBadge(rank) {
  if (!rank) return `<span style="font-size:11px;color:var(--text3)">미조회</span>`;
  const color = rank<=3?'#fcd34d':rank<=5?'var(--cyan)':rank<=10?'var(--green)':rank<=30?'#60a5fa':'var(--text3)';
  return `<span style="font-size:13px;font-weight:800;color:${color}">${rank}위</span>`;
}

function sparkline(data) {
  if (!data || data.length === 0) return '';
  const max = Math.max(...data), min = Math.min(...data);
  const bars = data.map(v => {
    const h = max === min ? 50 : Math.max(20, 100 - ((v - min) / (max - min)) * 70);
    const color = v <= 5 ? 'var(--cyan)' : v <= 10 ? 'var(--green)' : v <= 30 ? '#60a5fa' : 'var(--text3)';
    return `<div class="spark-bar" style="height:${Math.round(h)}%;background:${color}"></div>`;
  }).join('');
  return `<div class="sparkline">${bars}</div>`;
}

/* ══════ 이벤트 ══════ */
function bindEvents() {}

function selectPlace(id) {
  _selId  = id;
  _subTab = 'stats';
  renderPage();
}

function switchSubTab(tab) {
  _subTab = tab;
  const p = PLACES.find(pl => pl.id === _selId);
  // 탭 버튼 active 클래스 갱신
  document.querySelectorAll('.detail-tab').forEach(btn => {
    const key = btn.getAttribute('onclick').match(/'(\w+)'/)?.[1];
    btn.classList.toggle('active', key === tab);
  });
  document.getElementById('subtab-content').innerHTML = buildSubTab(p);
  if (tab === 'stats') drawCharts();
}

/* ══════ 차트 ══════ */
let _trendChart = null;

function drawCharts() {
  const p = PLACES.find(pl => pl.id === _selId);
  if (!p) return;
  setTimeout(() => {
    const el = document.getElementById('trendChart');
    if (!el) return;
    if (_trendChart) { _trendChart.destroy(); _trendChart = null; }
    const cc = (typeof chartColors === 'function') ? chartColors() : {
      ticks:'#94a3b8', grid:'rgba(255,255,255,.05)',
      tooltip:{ bg:'#1a1a24', border:'rgba(255,255,255,.1)', title:'#fff', body:'rgba(226,232,240,.7)' }
    };
    _trendChart = new Chart(el, {
      type: 'line',
      data: {
        labels: p.trendDates,
        datasets: [
          { label:'영수증리뷰', data:p.trendReview, borderColor:'#00d4ff', backgroundColor:'rgba(0,212,255,.08)', tension:.4, pointRadius:2, fill:false },
          { label:'블로그리뷰', data:p.trendBlog,   borderColor:'#a78bfa', backgroundColor:'rgba(167,139,250,.08)', tension:.4, pointRadius:2, fill:false },
        ]
      },
      options: {
        responsive:true, maintainAspectRatio:false,
        plugins:{
          legend:{ labels:{ color:cc.ticks, font:{size:11} } },
          tooltip:{ backgroundColor:cc.tooltip.bg, borderColor:cc.tooltip.border, borderWidth:1, titleColor:cc.tooltip.title, bodyColor:cc.tooltip.body }
        },
        scales:{
          x:{ ticks:{ color:cc.ticks, font:{size:10}, maxTicksLimit:8 }, grid:{ color:cc.grid } },
          y:{ ticks:{ color:cc.ticks, font:{size:10} }, grid:{ color:cc.grid } }
        }
      }
    });
  }, 80);
}

/* ══════ 파서 API 동적 연결 ══════ */
function resolveParserApi() {
  const h = location.hostname;
  if (h.match(/^\d+-/)) return location.protocol + '//' + h.replace(/^(\d+)-/, '8000-');
  if (h === 'localhost' || h === '127.0.0.1') return 'http://localhost:8000';
  return 'http://localhost:8000';
}
const PARSER_API = resolveParserApi();

/* 파서 연결 상태 표시 배지 */
async function checkParserStatus() {
  try {
    const res = await fetch(`${PARSER_API}/`, { signal: AbortSignal.timeout(3000) });
    const data = await res.json();
    return data.parser_available === true;
  } catch { return false; }
}

/* 지금 수집 버튼 → 파서 API 호출 */
async function runParseCrawl(placeId) {
  const p = PLACES.find(pl => pl.id === placeId);
  if (!p) return;

  const statusEl = document.getElementById('crawl-run-status');
  const btn      = document.getElementById('btn-run-crawl');
  if (!statusEl || !btn) return;

  // 버튼 비활성화
  btn.disabled = true;
  btn.textContent = '⏳ 수집 중...';
  btn.style.opacity = '0.6';
  statusEl.style.display = 'block';
  statusEl.innerHTML = '🔄 파서 API 연결 중...';

  try {
    const naverUrl = p.naverUrl || `https://m.place.naver.com/restaurant/${p.naverPlaceId || p.id}`;
    statusEl.innerHTML = `🔄 파서 API 호출 중...<br><span style="color:var(--text3);font-size:11px">${naverUrl}</span>`;

    const res = await fetch(`${PARSER_API}/api/parse`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url: naverUrl, include_reviews: true, include_menu: true, include_photos: false }),
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    // 파서 응답으로 데이터 갱신
    const now = new Date().toISOString().slice(0,16).replace('T',' ');
    const parsed_id = data.place_id || data.id;

    if (data.name)             p.name             = data.name;
    if (data.category)         p.category         = data.category;
    if (data.address)          p.address          = data.address;
    if (data.road_address)     p.roadAddress      = data.road_address;
    if (data.phone)            p.phone            = data.phone;
    if (data.keyword_list)     p.repKeywords      = data.keyword_list;
    if (data.visitor_review_count !== undefined) p.reviewCount = data.visitor_review_count;
    if (data.blog_review_total !== undefined)    p.blogReviewCount = data.blog_review_total;
    if (data.avg_rating !== undefined)           p.avgRating = data.avg_rating;
    if (parsed_id) p.naverUrl = `https://map.naver.com/v5/entry/place/${parsed_id}`;

    // 크롤링 로그 추가
    p.crawlStatus = 'ok';
    p.crawledAt   = now;
    p.crawlLogs.unshift({
      ts: now, status: 'ok',
      items: { basic: true, hours: !!data.hours, menu: !!(data.menus?.length), review: !!(data.visitor_review_count), photos: false, keywords: !!(data.keyword_list?.length) },
      note: '수동 수집 완료'
    });

    statusEl.innerHTML = `✅ 수집 완료 — ${data.name || '업체명 미확인'} / 리뷰 ${data.visitor_review_count ?? '–'}건`;
    statusEl.style.background = 'rgba(34,197,94,.08)';
    statusEl.style.borderColor = 'rgba(34,197,94,.25)';
    statusEl.style.color = 'var(--green)';

    // 화면 갱신
    setTimeout(() => renderPage(), 1200);

  } catch (e) {
    console.error('[runParseCrawl]', e);
    statusEl.innerHTML = `❌ 파서 연결 실패: ${e.message}<br><span style="font-size:11px;color:var(--text3)">파서 서버가 실행 중인지 확인해 주세요 (포트 8000)</span>`;
    statusEl.style.background = 'rgba(239,68,68,.08)';
    statusEl.style.borderColor = 'rgba(239,68,68,.25)';
    statusEl.style.color = '#f87171';

    p.crawlStatus = 'error';
    p.crawlLogs.unshift({
      ts: new Date().toISOString().slice(0,16).replace('T',' '),
      status: 'error',
      items: { basic:false, hours:false, menu:false, review:false, photos:false, keywords:false },
      note: `파서 오류: ${e.message}`
    });
  } finally {
    btn.disabled  = false;
    btn.textContent = '🔄 지금 수집';
    btn.style.opacity = '1';
  }
}

/* ══════ 시작 ══════ */
renderPage();
</script>
