<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nplace.io — 팀원 관리</title>
<link rel="icon" href="favicon.ico">
    <link rel="stylesheet" href="css/style.css">
<style>
.member-card {
  display:flex; align-items:center; gap:14px; padding:14px 16px;
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:var(--radius); transition:border-color 0.15s;
}
.member-card:hover { border-color:rgba(var(--cyan-rgb),0.3); }
.member-avatar {
  width:44px; height:44px; border-radius:50%; background:linear-gradient(135deg,var(--cyan),var(--purple));
  display:flex; align-items:center; justify-content:center;
  font-size:16px; font-weight:700; color:#fff; flex-shrink:0;
}
.member-info { flex:1; min-width:0; }
.member-name { font-size:14px; font-weight:600; color:var(--text-title); margin-bottom:2px; }
.member-email { font-size:12px; color:var(--text3); }
.member-actions { display:flex; gap:8px; align-items:center; }
.role-badge {
  padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600;
}
.role-owner  { background:rgba(var(--yellow-rgb),0.15); color:var(--yellow); }
.role-admin  { background:rgba(var(--purple-rgb),0.15); color:var(--purple); }
.role-member { background:rgba(var(--cyan-rgb),0.12); color:var(--cyan); }
.invite-box {
  background:var(--bg2); border:2px dashed var(--border); border-radius:var(--radius-lg);
  padding:32px; text-align:center; transition:border-color 0.2s;
}
.invite-box:hover { border-color:rgba(var(--cyan-rgb),0.4); }
.invite-icon { font-size:36px; margin-bottom:12px; }
.plan-limit-bar { height:6px; background:var(--bg-hover2); border-radius:3px; margin-top:6px; overflow:hidden; }
.plan-limit-fill { height:100%; border-radius:3px; background:linear-gradient(90deg,var(--cyan),var(--purple)); }
</style>
</head>
<body>
<div id="app"></div>
<div id="toast-container"></div>
<div id="modal-invite" class="modal-overlay"></div>

<script src="js/app.js?v=20260326"></script>
<script>
renderLayout({ title: '팀원 관리', activePage: 'team.html' });

/* ── Mock 데이터 ── */
const MEMBERS = [
  { id:1, name:'김대표', email:'admin@nplace.io', role:'owner', joined:'2025-12-01', lastActive:'방금 전' },
  { id:2, name:'이매니저', email:'manager@nplace.io', role:'admin', joined:'2026-01-05', lastActive:'1시간 전' },
  { id:3, name:'박직원', email:'staff@nplace.io', role:'member', joined:'2026-02-10', lastActive:'어제' },
];

const PLAN_LIMIT = 5;

/* ── 모달 빌드 ── */
document.getElementById('modal-invite').innerHTML = `
<div class="modal" style="max-width:440px">
  <div class="modal-header">
    <span class="modal-title">팀원 초대</span>
    <button class="modal-close" onclick="closeModal('modal-invite')">${iconClose()}</button>
  </div>
  <div class="modal-body">
    <div class="input-group">
      <label class="form-label">이메일 주소</label>
      <input class="input" type="email" id="invite-email" placeholder="초대할 이메일을 입력하세요">
    </div>
    <div class="input-group">
      <label class="form-label">역할 설정</label>
      <select class="form-select" id="invite-role">
        <option value="member">멤버 — 기본 기능만 사용</option>
        <option value="admin">관리자 — 설정·결제 포함</option>
      </select>
    </div>
    <p style="font-size:12px;color:var(--text3);margin-top:4px">
      초대 링크가 이메일로 발송됩니다 (데모에서는 실제 발송 안 됨)
    </p>
  </div>
  <div class="modal-footer">
    <button class="btn btn-secondary" onclick="closeModal('modal-invite')">취소</button>
    <button class="btn btn-primary" onclick="sendInvite()">초대 발송</button>
  </div>
</div>`;

/* ── 페이지 렌더링 ── */
function renderPage() {
  document.getElementById('page-content').innerHTML = `
  <!-- 상단 정보 -->
  <div class="page-header">
    <div>
      <h1 class="page-title">팀원 관리</h1>
      <p class="page-subtitle">워크스페이스 팀원을 초대하고 권한을 관리합니다</p>
    </div>
    <button class="btn btn-primary" onclick="openModal('modal-invite')">
      ${iconPlus()} 팀원 초대
    </button>
  </div>

  <!-- 플랜 한도 -->
  <div class="card" style="margin-bottom:20px">
    <div class="flex-between" style="margin-bottom:8px">
      <span style="font-size:13px;font-weight:600;color:var(--text-title)">팀원 현황</span>
      <span style="font-size:12px;color:var(--text3)">${MEMBERS.length} / ${PLAN_LIMIT}명 (Pro 플랜)</span>
    </div>
    <div class="plan-limit-bar">
      <div class="plan-limit-fill" style="width:${(MEMBERS.length/PLAN_LIMIT)*100}%"></div>
    </div>
    <p style="font-size:11px;color:var(--text3);margin-top:6px">팀원을 더 추가하려면 Enterprise 플랜으로 업그레이드하세요</p>
  </div>

  <!-- 팀원 목록 -->
  <div class="card">
    <div class="card-header" style="margin-bottom:16px">
      <div class="card-title">👥 팀원 목록</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px" id="member-list">
      ${MEMBERS.map(m => renderMember(m)).join('')}
    </div>
  </div>

  <!-- 초대 박스 -->
  <div class="invite-box" style="margin-top:20px" onclick="openModal('modal-invite')" style="cursor:pointer">
    <div class="invite-icon">📨</div>
    <div style="font-size:14px;font-weight:600;color:var(--text-title);margin-bottom:6px">새 팀원 초대하기</div>
    <div style="font-size:12px;color:var(--text3)">이메일로 초대장을 발송합니다</div>
    <button class="btn btn-secondary" style="margin-top:12px" onclick="openModal('modal-invite')">
      ${iconPlus()} 초대 보내기
    </button>
  </div>
  `;
}

function renderMember(m) {
  const roleLabels = { owner:'오너', admin:'관리자', member:'멤버' };
  const isMe = m.email === (CURRENT_USER ? CURRENT_USER.email : '');
  return `
  <div class="member-card" id="member-${m.id}">
    <div class="member-avatar">${m.name[0]}</div>
    <div class="member-info">
      <div class="member-name">${m.name} ${isMe ? '<span style="font-size:10px;color:var(--cyan)">(나)</span>' : ''}</div>
      <div class="member-email">${m.email} · 마지막 활동: ${m.lastActive}</div>
    </div>
    <div class="member-actions">
      <span class="role-badge role-${m.role}">${roleLabels[m.role]}</span>
      ${m.role !== 'owner' ? `
        <button class="btn btn-ghost btn-sm" onclick="changeRole(${m.id})" title="역할 변경">${iconEdit()}</button>
        <button class="btn btn-ghost btn-sm" style="color:var(--red)" onclick="removeMember(${m.id})" title="멤버 제거">${iconTrash()}</button>
      ` : ''}
    </div>
  </div>`;
}

function sendInvite() {
  const email = document.getElementById('invite-email').value.trim();
  const role  = document.getElementById('invite-role').value;
  if (!email) return toast('이메일을 입력해 주세요', 'error');
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return toast('올바른 이메일 형식이 아닙니다', 'error');
  closeModal('modal-invite');
  toast(`${email}로 초대장을 발송했습니다 (데모)`, 'success');
}

function changeRole(id) {
  toast('역할 변경은 데모에서 지원하지 않습니다', 'info');
}

function removeMember(id) {
  if (!confirm('이 팀원을 제거하시겠습니까?')) return;
  const el = document.getElementById('member-' + id);
  if (el) el.remove();
  toast('팀원이 제거되었습니다', 'success');
}

renderPage();
</script>
</body>
</html>
