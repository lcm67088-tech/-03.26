/* ── 주문 전용 추가 스타일 ─────────────────────── */
.category-tabs { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:18px; }
.cat-tab { padding:7px 16px; border-radius:20px; border:1px solid var(--border); background:transparent;
  color:var(--text2); font-size:12px; font-weight:600; cursor:pointer; transition:all 0.2s; white-space:nowrap; }
.cat-tab.active { background:var(--cyan); border-color:var(--cyan); color:#000; }

.brand-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:10px; margin-bottom:16px; }
.brand-card { padding:14px 16px; border-radius:12px; border:2px solid var(--border); background:var(--bg-hover2);
  cursor:pointer; transition:all 0.2s; }
.brand-card:hover { border-color:rgba(0,212,255,0.4); background:rgba(0,212,255,0.03); }
.brand-card.selected { border-color:var(--cyan); background:rgba(0,212,255,0.07); }
.brand-card-name { font-size:13px; font-weight:700; color:var(--text-title); margin-bottom:3px; }
.brand-card-sub { font-size:11px; color:var(--text3); margin-bottom:8px; }
.brand-card-price { font-size:14px; font-weight:800; color:var(--cyan); }

/* 카트 아이템 */
.cart-table { width:100%; border-collapse:collapse; }
.cart-table th { font-size:11px; color:var(--text3); font-weight:600; padding:8px 12px; border-bottom:1px solid var(--border); text-align:left; background:var(--bg-table-head); }
.cart-table td { padding:10px 12px; border-bottom:1px solid var(--border); font-size:13px; vertical-align:middle; color:var(--text); }
.cart-table tr:last-child td { border-bottom:none; }
.cart-qty-input { width:70px; padding:4px 8px; border-radius:6px; border:1px solid var(--border-input); background:var(--bg-input); color:var(--text); text-align:center; font-size:13px; font-family:inherit; }
.cart-date-input { width:130px; padding:4px 8px; border-radius:6px; border:1px solid var(--border-input); background:var(--bg-input); color:var(--text); font-size:12px; font-family:inherit; }
.cart-keyword-input { width:160px; padding:4px 8px; border-radius:6px; border:1px solid var(--border-input); background:var(--bg-input); color:var(--text); font-size:12px; font-family:inherit; }
.remove-btn { background:none; border:none; color:var(--text3); cursor:pointer; font-size:16px; padding:2px 6px; border-radius:4px; }
.remove-btn:hover { color:#ef4444; background:rgba(239,68,68,0.1); }

/* 엑셀 모달 */
.paste-area { width:100%; min-height:140px; padding:12px; border-radius:8px; border:1px dashed rgba(0,212,255,0.3);
  background:var(--bg-input); color:var(--text); font-size:12px; font-family:monospace; resize:vertical; }
.paste-area:focus { outline:none; border-color:var(--cyan); }
.drop-zone { border:2px dashed rgba(0,212,255,0.3); border-radius:12px; padding:32px; text-align:center; cursor:pointer;
  transition:all 0.2s; }
.drop-zone:hover, .drop-zone.dragover { border-color:var(--cyan); background:rgba(0,212,255,0.05); }

/* 키워드 분할 토글 */
.kw-split-group { display:flex; gap:6px; }
.kw-split-btn { padding:4px 10px; border-radius:6px; border:1px solid var(--border); background:transparent;
  color:var(--text2); font-size:11px; cursor:pointer; transition:all 0.15s; }
.kw-split-btn.active { background:var(--cyan); border-color:var(--cyan); color:#000; font-weight:700; }

/* 작업 키워드 필터 버튼 */
.kw-filter-btn { padding:3px 9px; border-radius:20px; border:1px solid var(--border); background:transparent;
  color:var(--text3); font-size:11px; cursor:pointer; transition:all 0.15s; white-space:nowrap; }
.kw-filter-btn:hover { border-color:var(--cyan); color:var(--cyan); }
.kw-filter-btn.active { background:rgba(0,212,255,0.12); border-color:var(--cyan); color:var(--cyan); font-weight:600; }

/* 단계 표시기 */
.wizard-steps { display:flex; align-items:center; gap:0; margin-bottom:24px; }
.w-step { display:flex; flex-direction:column; align-items:center; gap:4px; flex:1; position:relative; }
.w-step-num { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-size:13px; font-weight:700; border:2px solid var(--border); color:var(--text3); background:var(--bg2); z-index:1; }
.w-step.active .w-step-num { border-color:var(--cyan); color:var(--cyan); background:rgba(0,212,255,0.1); }
.w-step.done .w-step-num { border-color:var(--green); background:rgba(34,197,94,0.15); color:var(--green); }
.w-step-label { font-size:10px; color:var(--text3); white-space:nowrap; }
.w-step.active .w-step-label { color:var(--text-title); }
.w-step-line { flex:1; height:2px; background:var(--border); margin-bottom:18px; }
.w-step.done ~ .w-step-line { background:var(--green); }

/* 플레이스 체크박스 그리드 */
.place-check-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:8px; }
.place-check-item { display:flex; align-items:center; gap:8px; padding:10px 12px; border-radius:8px;
  border:1px solid var(--border); cursor:pointer; transition:all 0.15s; }
.place-check-item:hover { border-color:rgba(0,212,255,0.3); }
.place-check-item.selected { border-color:var(--cyan); background:rgba(0,212,255,0.06); }
.place-check-item input[type=checkbox] { accent-color:var(--cyan); width:14px; height:14px; }
.place-name { font-size:12px; color:var(--text); font-weight:500; }

/* 요약 배지 */
.total-badge { background:rgba(0,212,255,0.1); border:1px solid rgba(0,212,255,0.25); border-radius:20px; padding:4px 12px; font-size:12px; color:var(--cyan); }
</style>

// ═══════════════════════════════════════════════
// 메인 페이지 렌더
// ═══════════════════════════════════════════════
function renderPage() {
  let filtered = currentStatus === 'all' ? orders : orders.filter(o => o.status === currentStatus);
  // 상품 필터
  if (filterBrand !== 'all') filtered = filtered.filter(o => o.brand === filterBrand);
  // 플레이스 필터
  if (filterPlace !== 'all') filtered = filtered.filter(o => o.items.some(i => i.placeName === filterPlace));
  // 정렬
  filtered = [...filtered].sort((a,b) => {
    let va, vb;
    if (orderSortCol==='id')        { va=a.id; vb=b.id; }
    else if (orderSortCol==='place')  { va=a.items[0]?.placeName||''; vb=b.items[0]?.placeName||''; }
    else if (orderSortCol==='brand')  { va=a.brand; vb=b.brand; }
    else if (orderSortCol==='date')   { va=a.date; vb=b.date; }
    else if (orderSortCol==='startDate') { va=a.startDate; vb=b.startDate; }
    else if (orderSortCol==='endDate')   { va=a.endDate; vb=b.endDate; }
    else if (orderSortCol==='amount') { va=a.totalAmount; vb=b.totalAmount; }
    else return 0;
    if (typeof va==='string') return orderSortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    return orderSortAsc ? va-vb : vb-va;
  });

  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  const paged = filtered.slice((currentPage - 1) * PAGE_SIZE, currentPage * PAGE_SIZE);

  const thisMonth = orders.filter(o => o.date.startsWith('2026-03'));
  const inProgress = orders.filter(o => o.status === 'in_progress').length;
  const done = orders.filter(o => o.status === 'completed').length;
  const totalSpent = thisMonth.reduce((a, o) => a + o.totalAmount, 0);

  document.getElementById('page-content').innerHTML = `
  <div class="page-header">
    <div>
      <div class="page-title">주문 관리</div>
      <div class="page-subtitle">마케팅 서비스를 주문하고 진행 현황을 확인합니다</div>
    </div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-secondary" onclick="openModal('modal-bulk')">
        ${iconUpload()} 엑셀 대량등록
      </button>
      <button class="btn btn-primary" onclick="startWizard()">
        ${iconPlus()} 새 주문
      </button>
    </div>
  </div>

  <!-- 요약 카드 -->
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px">
    ${[
      {label:'이번 달 주문', val: thisMonth.length + '건', color:'var(--cyan)'},
      {label:'총 지출', val: formatKRW(totalSpent), color:'var(--yellow)'},
      {label:'진행 중', val: inProgress + '건', color:'var(--purple)'},
      {label:'완료', val: done + '건', color:'var(--green)'},
    ].map(s => `
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px">
        <div style="font-size:11px;color:var(--text3);margin-bottom:4px">${s.label}</div>
        <div style="font-size:20px;font-weight:800;color:${s.color}">${s.val}</div>
      </div>
    `).join('')}
  </div>

  <!-- 상품/플레이스 필터 행 -->
  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px">
    <span style="font-size:12px;color:var(--text3)">묶음:</span>
    <button class="tab-btn${filterGroupBy==='default'?' active':''}" onclick="setGroupBy('default')">기본</button>
    <button class="tab-btn${filterGroupBy==='product'?' active':''}" onclick="setGroupBy('product')">상품별</button>
    <button class="tab-btn${filterGroupBy==='place'?' active':''}" onclick="setGroupBy('place')">플레이스별</button>
    <span style="margin-left:8px;font-size:12px;color:var(--text3)">상품:</span>
    <select class="form-select" style="padding:5px 10px;font-size:12px;width:auto" onchange="setFilterBrand(this.value)">
      <option value="all">전체 상품</option>
      ${[...new Set(orders.map(o=>o.brand))].map(b=>`<option value="${b}" ${filterBrand===b?'selected':''}>${b}</option>`).join('')}
    </select>
    <span style="font-size:12px;color:var(--text3)">플레이스:</span>
    <select class="form-select" style="padding:5px 10px;font-size:12px;width:auto" onchange="setFilterPlace(this.value)">
      <option value="all">전체 플레이스</option>
      ${[...new Set(orders.flatMap(o=>o.items.map(i=>i.placeName)))].map(p=>`<option value="${p}" ${filterPlace===p?'selected':''}>${p}</option>`).join('')}
    </select>
  </div>

  <!-- 상태 탭 -->
  <div class="tabs" style="margin-bottom:16px;overflow-x:auto">
    ${[
      {val:'all', label:`전체 (${orders.length})`},
      {val:'pending', label:'결제 대기'},
      {val:'confirmed', label:'확인 완료'},
      {val:'in_progress', label:'진행 중'},
      {val:'completed', label:'완료'},
      {val:'cancelled', label:'취소'},
      {val:'refund_requested', label:'환불 요청'},
    ].map(t => `
      <button class="tab-btn${currentStatus === t.val ? ' active' : ''}" onclick="filterStatus('${t.val}')">${t.label}</button>
    `).join('')}
  </div>

  <!-- 주문 목록 테이블 -->
  <div class="card" style="padding:0;overflow:hidden">
    <div class="table-wrap" style="border:none">
      <table>
        <thead><tr>
          <th onclick="sortOrders('id')" style="cursor:pointer">주문번호</th>
          <th onclick="sortOrders('place')" style="cursor:pointer">플레이스</th>
          <th onclick="sortOrders('brand')" style="cursor:pointer">상품 <span style="opacity:0.5">↕</span></th>
          <th>수량</th><th>일수량</th>
          <th onclick="sortOrders('date')" style="cursor:pointer">접수일 <span style="opacity:0.5">↕</span></th>
          <th onclick="sortOrders('startDate')" style="cursor:pointer">시작일 <span style="opacity:0.5">↕</span></th>
          <th onclick="sortOrders('endDate')" style="cursor:pointer">종료일 <span style="opacity:0.5">↕</span></th>
          <th>진행일수</th><th>남은일수</th>
          <th onclick="sortOrders('amount')" style="cursor:pointer">금액 <span style="opacity:0.5">↕</span></th>
          <th>상태</th><th></th>
        </tr></thead>
        <tbody>
          ${paged.length === 0
            ? `<tr><td colspan="13"><div class="empty-state">
                <div class="empty-icon">📦</div>
                <div class="empty-title">주문 내역이 없습니다</div>
                <button class="btn btn-primary" onclick="startWizard()">첫 주문 시작하기</button>
              </div></td></tr>`
            : paged.map(o => {
                const today = new Date('2026-03-19');
                const start = new Date(o.startDate);
                const end   = new Date(o.endDate);
                const totalDays = Math.round((end-start)/(1000*60*60*24)) + 1;
                const elapsed   = Math.max(0, Math.min(totalDays, Math.round((today-start)/(1000*60*60*24))+1));
                const remaining = Math.max(0, Math.round((end-today)/(1000*60*60*24)));
                const isPast    = today > end;
                return `
              <tr style="cursor:pointer" onclick="showDetail('${o.id}')">
                <td style="color:var(--cyan);font-weight:700;font-size:12px">${o.id}</td>
                <td style="font-size:12px">
                  ${o.items.length === 1
                    ? `<span style="font-weight:500">${o.items[0].placeName}</span>`
                    : `<span style="font-weight:500">${o.items[0].placeName}</span> <span class="total-badge" title="${o.items.map(i=>i.placeName).join(', ')}">+${o.items.length-1}</span>`}
                </td>
                <td>
                  <div style="font-size:12px;font-weight:600">${o.brand}</div>
                  <div style="font-size:10px;color:var(--text3)">${CATEGORIES.find(c=>c.id===o.category)?.label}</div>
                  ${(o.category==='traffic'||o.category==='save') && o.items[0]?.keywords?.length
                    ? `<div style="font-size:10px;color:var(--cyan)">🔑 ${o.items.flatMap(i=>i.keywords).filter((v,i,a)=>a.indexOf(v)===i).slice(0,2).join(', ')}${o.items.flatMap(i=>i.keywords).filter((v,i,a)=>a.indexOf(v)===i).length>2?'…':''}</div>` : ''}
                </td>
                <td style="font-size:12px">${(o.totalQty||o.qty||0).toLocaleString()}</td>
                <td style="font-size:12px;color:var(--text3)">${o.items?.[0]?.dailyQty ? o.items[0].dailyQty.toLocaleString() : (o.dailyQty ? o.dailyQty.toLocaleString() : '-')}</td>
                <td style="font-size:11px;color:var(--text3)">${o.date.split(' ')[0]}</td>
                <td style="font-size:12px;color:var(--text)">${o.startDate}</td>
                <td style="font-size:12px;color:var(--text)">${o.endDate}</td>
                <td style="font-size:12px">
                  <span style="color:${elapsed>=totalDays?'var(--green)':'var(--cyan)'};font-weight:600">${elapsed}</span>
                  <span style="color:var(--text3)">/${totalDays}일</span>
                  <div style="height:3px;background:var(--border);border-radius:2px;margin-top:3px;width:60px">
                    <div style="height:100%;border-radius:2px;background:${elapsed>=totalDays?'var(--green)':'var(--cyan)'};width:${Math.round(elapsed/totalDays*100)}%"></div>
                  </div>
                </td>
                <td style="font-size:12px">
                  ${isPast
                    ? `<span style="color:var(--text3)">종료</span>`
                    : `<span style="color:${remaining<=1?'var(--red)':remaining<=3?'var(--yellow)':'var(--text)'}; font-weight:${remaining<=3?700:400}">${remaining}일</span>`}
                </td>
                <td style="font-weight:700;font-size:13px">${formatKRW(o.totalAmount||o.amount||0)}</td>
                <td>${orderBadge(o.status)}</td>
                <td><button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();showDetail('${o.id}')">${iconEye()}</button></td>
              </tr>`;
              }).join('')}
        </tbody>
      </table>
    </div>
  </div>
  ${renderPagination(currentPage, totalPages, 'goPage')}
  `;
}

function filterStatus(s) { currentStatus = s; currentPage = 1; renderPage(); }
function goPage(p) { currentPage = p; renderPage(); }
function setGroupBy(g) { filterGroupBy = g; currentPage = 1; renderPage(); }
function setFilterBrand(b) { filterBrand = b; currentPage = 1; renderPage(); }
function setFilterPlace(p) { filterPlace = p; currentPage = 1; renderPage(); }
function sortOrders(col) {
  if (orderSortCol===col) orderSortAsc=!orderSortAsc;
  else { orderSortCol=col; orderSortAsc=col==='date'?false:true; }
  renderPage();
}

            ${item.keywords?.length > 0 ? `
            <div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:4px">
              ${item.keywords.map(kw => `<span style="padding:2px 7px;background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.2);border-radius:10px;font-size:10px;color:var(--cyan)">${kw}</span>`).join('')}
            </div>` : ''}
            <div style="font-size:10px;color:var(--text3);margin-top:4px">
              매체사: ${item.mediaCompany || '<span style="color:var(--text3)">미배정</span>'}
            </div>
          </div>
        `).join('')}
      </div>
      <div>
        <h4 style="font-size:13px;font-weight:600;color:var(--text2);margin-bottom:12px">진행 상태</h4>
        <div class="timeline">
          ${steps.map(s => `
            <div class="timeline-item">
              <div class="timeline-dot" style="background:${s.done ? 'var(--green)' : 'rgba(255,255,255,0.15)'}"></div>
              <div class="timeline-title" style="color:${s.done ? '#fff' : 'var(--text3)'}">${s.label}</div>
              ${s.date ? `<div class="timeline-time">${s.date}</div>` : ''}
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `;

  const footer = document.getElementById('detail-modal-footer');
  footer.innerHTML = o.status === 'pending'
    ? `<button class="btn btn-danger" onclick="cancelOrder('${o.id}')">주문 취소</button>
       <button class="btn btn-primary" onclick="confirmPayment('${o.id}')">결제 완료</button>`
    : o.status === 'in_progress'
    ? `<button class="btn btn-secondary" onclick="closeModal('modal-order-detail')">닫기</button>
       <button class="btn btn-danger" onclick="refundReq('${o.id}')">환불 요청</button>`
    : `<button class="btn btn-secondary" onclick="closeModal('modal-order-detail')">닫기</button>`;

  openModal('modal-order-detail');
}

function cancelOrder(id) { updateStatus(id, 'cancelled'); closeModal('modal-order-detail'); toast('주문이 취소되었습니다', 'info'); }
function refundReq(id) { updateStatus(id, 'refund_requested'); closeModal('modal-order-detail'); toast('환불 요청이 접수되었습니다', 'warning'); }
function confirmPayment(id) { updateStatus(id, 'confirmed'); closeModal('modal-order-detail'); toast('결제 완료 처리되었습니다', 'success'); }
function updateStatus(id, s) { const o = orders.find(x => x.id === id); if (o) o.status = s; renderPage(); }

// ═══════════════════════════════════════════════
// 새 주문 위저드 (3단계)
// Step 1: 카테고리 → 브랜드 선택 (카트에 추가)
// Step 1: 상품 선택 + 주문 설정 (통합)
// Step 2: 결제 확인
// ═══════════════════════════════════════════════
function startWizard() {
  wizard = { step:1, category:'blog', brand:null, cartItems:[] };
  wizardSettings = {}; kwTableFilter = {};
  renderWizard();
  openModal('modal-new-order');
}

function renderWizard() {

      const cls = wizard.step === n ? 'active' : wizard.step > n ? 'done' : '';
      return `
        ${i > 0 ? `<div class="w-step-line"></div>` : ''}

  let body = stepsHtml;
  let footer = '';

                      ${filtered.length === 0 ? `
                      <tr><td colspan="6" style="padding:14px;text-align:center;color:var(--text3)">조건에 맞는 키워드가 없습니다</td></tr>
                      ` : filtered.map(kw => {
                        const isChecked = selectedKwIds.includes(kw.id);

            <div style="display:flex;align-items:center;gap:10px">
              <span style="font-size:14px;font-weight:700;color:#fff">${item.brand}</span>
              <span style="font-size:11px;color:var(--text3);background:rgba(255,255,255,0.06);padding:2px 8px;border-radius:20px">
                ${CATEGORIES.find(c=>c.id===item.category)?.label}

// ── 위저드 헬퍼 함수 ─────────────────────────
function selectCategory(catId) { wizard.category = catId; wizard.brand = null; renderWizard(); }
function selectBrand(brandId) {
  wizard.brand = Object.values(BRANDS).flat().find(b => b.id === brandId);
  renderWizard();
}
function addToCart() {
  if (!wizard.brand) return;
  const today = new Date().toISOString().split('T')[0];
  wizard.cartItems.push({
    brandId: wizard.brand.id,
    brand: wizard.brand.name,
    category: wizard.category,
    splitUnit: null,
    startDate: today,
    endDate: today,
    placeItems: [],  // C안: 플레이스별 작업 단위 [{placeId, placeName, qty, dailyQty, selectedKwIds}]
  });
  wizard.brand = null;
  renderWizard();
}
function removeFromCart(idx) { wizard.cartItems.splice(idx, 1); renderWizard(); }
// Step1 → Step2 (결제 확인): 검증 후 이동
// Step1 → Step2 (결제 확인): 검증 후 이동
function goStep2() {
  if (wizard.cartItems.length === 0) return;
  for (const item of wizard.cartItems) {
    if (!item.placeItems || item.placeItems.length === 0) { toast('플레이스를 최소 1개 선택해 주세요', 'error'); return; }
    if (!item.startDate || !item.endDate) { toast('기간을 입력해 주세요', 'error'); return; }
    // 플레이스별 수량 검증
    for (const pi of item.placeItems) {
      if (!pi.qty || pi.qty < 1) { toast(`[${pi.placeName}] 수량을 입력해 주세요`, 'error'); return; }
    }
    // 리워드 키워드 선택 검증
    const isReward = item.category === 'traffic' || item.category === 'save';
    if (isReward) {
      for (const pi of item.placeItems) {
        if (!pi.selectedKwIds || pi.selectedKwIds.length === 0) {
          toast(`[${pi.placeName}] 작업 키워드를 최소 1개 선택해 주세요`, 'error');
          return;
        }
      }
    }
    // 최소 수량 검증
    const minQty = BRAND_SETTINGS.rewardMinQty?.[item.category]?.[item.brandId];
    if (minQty) {
      const totalQty = item.placeItems.reduce((s, pi) => s + (pi.qty||0), 0);
      const unit = item.category==='blog'||item.category==='receipt' ? '개' : item.category==='sns' ? '패키지' : '회';
      if (totalQty < minQty) { toast(`[${item.brand}] 전체 최소 주문 수량은 ${minQty.toLocaleString()}${unit}입니다.`, 'error'); return; }
    }
  }
  wizard.step = 2; renderWizard();
}
function togglePlace(idx, placeId, placeName, el) {
  const item = wizard.cartItems[idx];
  if (!item.placeItems) item.placeItems = [];
  const existing = item.placeItems.findIndex(pi => pi.placeId === placeId);
  if (existing === -1) {
    // 플레이스 추가: 새 placeItem 생성
    const brand = Object.values(BRANDS).flat().find(b => b.id === item.brandId);
    item.placeItems.push({
      placeId,
      placeName,
      qty: brand?.min || 100,
      dailyQty: null,
      selectedKwIds: []
    });
    if (el) { el.classList.add('selected'); el.querySelector('input').checked = true; }
  } else {
    // 플레이스 제거
    item.placeItems.splice(existing, 1);
    if (el) { el.classList.remove('selected'); el.querySelector('input').checked = false; }
  }
  // 위저드 재렌더 (플레이스별 패널 표시/숨김)
  renderWizard();
}
function setItemField(idx, field, val) { wizard.cartItems[idx][field] = val; }
function setPlaceItemField(idx, placeId, field, val) {
  const item = wizard.cartItems[idx];
  const pi = item.placeItems.find(p => p.placeId === placeId);
  if (pi) pi[field] = val;
}

// ── 작업 키워드 선택 헬퍼 (C안: placeId 기반) ────────────────────────
function toggleKwFilter(idx, filterKey) {
  if (!kwTableFilter[idx]) kwTableFilter[idx] = {};
  kwTableFilter[idx][filterKey] = !kwTableFilter[idx][filterKey];
  renderWizard();
}
function toggleKwSelection(idx, placeId, kwId, checked) {
  const item = wizard.cartItems[idx];
  const pi = item.placeItems?.find(p => p.placeId === placeId);
  if (!pi) return;
  if (!pi.selectedKwIds) pi.selectedKwIds = [];
  if (checked) {
    if (!pi.selectedKwIds.includes(kwId)) pi.selectedKwIds.push(kwId);
  } else {
    pi.selectedKwIds = pi.selectedKwIds.filter(id => id !== kwId);
  }
  // 행 스타일 직접 갱신 (재렌더 회피)
  const row = document.querySelector(`[data-kw-row="${idx}-${placeId}-${kwId}"]`);
  if (row) {
    row.style.background = checked ? 'rgba(0,212,255,0.04)' : '';
    const kwText = row.querySelector('.kw-cell-text');
    if (kwText) kwText.style.color = checked ? 'var(--cyan)' : 'var(--text)';
  }
  // 카운터 업데이트
  const counter = document.querySelector(`[data-kw-counter="${idx}-${placeId}"]`);
  if (counter) counter.textContent = `${pi.selectedKwIds.length}개 선택됨`;
}
function toggleAllKws(idx, placeId, checked, kwIds) {
  const item = wizard.cartItems[idx];
  const pi = item.placeItems?.find(p => p.placeId === placeId);
  if (!pi) return;
  pi.selectedKwIds = checked ? [...kwIds] : [];
  renderWizard();
}
function selectAllKws(idx, placeId, kwIds) {
  const item = wizard.cartItems[idx];
  const pi = item.placeItems?.find(p => p.placeId === placeId);
  if (!pi) return;
  if (!pi.selectedKwIds) pi.selectedKwIds = [];
  kwIds.forEach(id => { if (!pi.selectedKwIds.includes(id)) pi.selectedKwIds.push(id); });
  renderWizard();
}
function clearAllKws(idx, placeId) {
  const item = wizard.cartItems[idx];
  const pi = item.placeItems?.find(p => p.placeId === placeId);
  if (pi) pi.selectedKwIds = [];
  renderWizard();
}
function setSplitUnit(idx, val) { wizard.cartItems[idx].splitUnit = val; renderWizard(); }
function calcDays(idx) {
  const item = wizard.cartItems[idx];
  const info = calcDaysInfo(item.startDate, item.endDate);
  // 모든 플레이스 패널의 days-info 업데이트 (id: days-info-{idx}-{placeId})
  (item.placeItems||[]).forEach(pi => {
    const el = document.getElementById(`days-info-${idx}-${pi.placeId}`);
    if (el) el.textContent = info;
  });
}
function calcDaysInfo(start, end) {
  if (!start || !end) return '';
  const d = Math.round((new Date(end) - new Date(start)) / 86400000) + 1;
  return d > 0 ? `총 ${d}일 기간` : '종료일이 시작일보다 이릅니다';
}

// ── 브랜드 설정 패널 토글 ────────────────────────
function toggleBrandPanel(key, panelId) {
  brandSettingExpanded[key] = !brandSettingExpanded[key];
  const panel = document.getElementById(panelId);
  if (!panel) return;
  panel.style.display = brandSettingExpanded[key] ? 'block' : 'none';

  // panelId 패턴별 화살표 아이디 계산
  let arrowId = null;
  const blogMatch    = panelId.match(/^blog-panel-(\d+)$/);
  const receiptMatch = panelId.match(/^receipt-panel-(\d+)$/);
  const refMatch     = panelId.match(/^ref-body-order-(\d+)-(\d+)$/);
  if (blogMatch)    arrowId = `blog-arrow-${blogMatch[1]}`;
  if (receiptMatch) arrowId = `receipt-arrow-${receiptMatch[1]}`;
  if (refMatch)     arrowId = `ref-arr-${refMatch[1]}-${refMatch[2]}`;

  if (arrowId) {
    const arrow = document.getElementById(arrowId);
    if (arrow) arrow.style.transform = `rotate(${brandSettingExpanded[key] ? '180deg' : '0deg'})`;
  }
}
function recalcTotal(idx) {
  // C안: 플레이스별 dailyQty × 기간일수 = qty 자동 계산
  // (전체 아이템 단위의 recalc는 사용 안 함, 각 placeItem에서 직접 설정)
  calcDays(idx);
}
function updateItemTotal(idx) {
  // C안: 더 이상 item-total-idx 엘리먼트가 없음 (플레이스별 합산 표시)
  // 필요 시 재렌더
}
function calcCartTotal() {
  return wizard.cartItems.reduce((sum, item) => {
    const brand = Object.values(BRANDS).flat().find(b => b.id === item.brandId);
    const totalQty = (item.placeItems||[]).reduce((s, pi) => s + (pi.qty||0), 0);
    return sum + (brand?.price || 0) * totalQty;
  }, 0);
}

function placeOrder() {
  const now = new Date();
  const dateStr = now.toLocaleDateString('ko-KR') + ' ' + now.toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'});
  const newOrders = [];

  wizard.cartItems.forEach((item, i) => {
    const brand = Object.values(BRANDS).flat().find(b => b.id === item.brandId);
    const isReward = item.category === 'traffic' || item.category === 'save';
    const placeItems = item.placeItems || [];
    const totalQty = placeItems.reduce((s, pi) => s + (pi.qty||0), 0);
    const newId = 'ORD-' + String(orders.length + newOrders.length + 42).padStart(4, '0');

    // C안: 주문 헤더 + order_items 배열
    newOrders.push({
      id: newId,
      brand: item.brand,
      brandId: item.brandId,
      category: item.category,
      splitUnit: item.splitUnit || null,
      startDate: item.startDate,
      endDate: item.endDate,
      totalQty: totalQty,
      totalAmount: (brand?.price || 0) * totalQty,
      unitPrice: brand?.price || 0,
      status: 'pending',
      date: dateStr,
      items: placeItems.map((pi, pIdx) => {
        const pl = MY_PLACES.find(p => p.id === pi.placeId);
        const kwNames = isReward
          ? (pi.selectedKwIds||[]).map(kwId => pl?.rankKeywords?.find(k=>k.id===kwId)?.kw).filter(Boolean)
          : (pi.keyword ? [pi.keyword] : []);
        return {
          id: `${newId}-i${pIdx+1}`,
          placeId: pi.placeId,
          placeName: pi.placeName,
          qty: pi.qty || 0,
          dailyQty: pi.dailyQty || null,
          keywords: kwNames,
          selectedKwIds: pi.selectedKwIds || [],
          status: 'pending',
          mediaCompany: null,
        };
      }),
    });
  });

  orders.unshift(...newOrders);
  // 위저드 상태 초기화
  wizard.step = 1; wizard.cartItems = []; wizard.brand = null;
  wizardSettings = {}; kwTableFilter = {};
  closeModal('modal-new-order');
  toast(`${newOrders.length}건의 주문이 접수되었습니다!`, 'success');
  currentStatus = 'all'; currentPage = 1;
  renderPage();
}

// ═══════════════════════════════════════════════
// 엑셀 대량 등록
// ═══════════════════════════════════════════════
function renderBulkModal() {
  const TEMPLATE_HEADERS = ['브랜드', '분류', '플레이스명', '키워드', '시작일(YYYY-MM-DD)', '종료일(YYYY-MM-DD)', '일수량', '총수량', '분할단위'];

  document.getElementById('bulk-body').innerHTML = `
  <div style="margin-bottom:16px">
    <div style="font-size:12px;color:var(--text2);margin-bottom:10px">
      ① 엑셀/구글시트에서 데이터를 복사해 아래에 붙여넣거나, ② 엑셀 파일(.xlsx/.csv)을 업로드하세요.
    </div>
    <div style="font-size:11px;color:var(--text3);background:rgba(255,255,255,0.03);border-radius:8px;padding:10px;margin-bottom:12px">
      <strong style="color:var(--cyan)">헤더 형식:</strong> ${TEMPLATE_HEADERS.join(' | ')}
    </div>

    <!-- 탭 -->
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <button class="btn btn-secondary btn-sm" id="tab-paste-btn" onclick="switchBulkTab('paste')" style="background:var(--cyan);color:#000;border-color:var(--cyan)">📋 복붙 입력</button>
      <button class="btn btn-secondary btn-sm" id="tab-file-btn" onclick="switchBulkTab('file')">📁 파일 업로드</button>
      <button class="btn btn-ghost btn-sm" onclick="downloadTemplate()" style="margin-left:auto">⬇ 템플릿 다운로드</button>
    </div>

    <!-- 복붙 탭 -->
    <div id="bulk-tab-paste">
      <textarea id="paste-input" class="paste-area"
        placeholder="엑셀에서 셀을 선택 후 Ctrl+C → 여기에 Ctrl+V 하세요.
(탭/쉼표 구분자 자동 인식)

예시:
블로그A	블로그 리뷰	맛있는 식당 본점	강남 맛집	2026-04-01	2026-04-05	2	10
유입A	리워드 유입	행복한 카페	홍대 카페	2026-04-01	2026-04-07	100	700	10"
        oninput="previewBulkPaste()"></textarea>
    </div>

    <!-- 파일 업로드 탭 -->
    <div id="bulk-tab-file" style="display:none">
      <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()"
        ondragover="event.preventDefault();this.classList.add('dragover')"
        ondragleave="this.classList.remove('dragover')"
        ondrop="handleFileDrop(event)">
        <div style="font-size:32px;margin-bottom:8px">📂</div>
        <div style="font-size:14px;font-weight:600;color:#fff;margin-bottom:4px">클릭하거나 파일을 드래그해 주세요</div>
        <div style="font-size:12px;color:var(--text3)">.xlsx, .xls, .csv 파일 지원</div>
      </div>
      <input type="file" id="file-input" accept=".xlsx,.xls,.csv" style="display:none" onchange="handleFileUpload(this)">
    </div>

    <!-- 미리보기 -->
    <div id="bulk-preview" style="margin-top:14px"></div>
  </div>
  `;

  document.getElementById('bulk-footer').innerHTML = `
    <button class="btn btn-secondary" onclick="closeModal('modal-bulk')">취소</button>
    <button class="btn btn-primary" id="bulk-submit-btn" onclick="submitBulkOrders()" disabled>등록하기</button>`;
}

let bulkParsedRows = [];

function switchBulkTab(tab) {
  document.getElementById('bulk-tab-paste').style.display = tab === 'paste' ? '' : 'none';
  document.getElementById('bulk-tab-file').style.display = tab === 'file' ? '' : 'none';
  document.getElementById('tab-paste-btn').style.cssText = tab === 'paste' ? 'background:var(--cyan);color:#000;border-color:var(--cyan)' : '';
  document.getElementById('tab-file-btn').style.cssText = tab === 'file' ? 'background:var(--cyan);color:#000;border-color:var(--cyan)' : '';
}

function previewBulkPaste() {
  const raw = document.getElementById('paste-input')?.value || '';
  const rows = parsePasteData(raw);
  bulkParsedRows = rows;
  renderBulkPreview(rows);
}

function parsePasteData(raw) {
  const lines = raw.trim().split('\n').filter(l => l.trim());
  const rows = [];
  for (const line of lines) {
    // 탭 구분자 우선, 없으면 쉼표
    const sep = line.includes('\t') ? '\t' : ',';
    const cols = line.split(sep).map(c => c.trim().replace(/^"|"$/g, ''));
    if (cols.length < 4) continue; // 최소 4열
    rows.push({
      brand:     cols[0] || '',
      category:  mapCategory(cols[1] || ''),
      place:     cols[2] || '',
      keyword:   cols[3] || '',
      startDate: cols[4] || new Date().toISOString().split('T')[0],
      endDate:   cols[5] || new Date().toISOString().split('T')[0],
      dailyQty:  parseInt(cols[6]) || null,
      qty:       parseInt(cols[7]) || 1,
      splitUnit: parseInt(cols[8]) || null,
      _valid:    !!(cols[0] && cols[2]),
    });
  }
  return rows;
}

function mapCategory(str) {
  const m = {
    '블로그':'blog','블로그리뷰':'blog','blog':'blog',
    '영수증':'receipt','영수증리뷰':'receipt','receipt':'receipt',
    '트래픽':'traffic','리워드유입':'traffic','유입':'traffic','traffic':'traffic',
    '저장':'save','리워드저장':'save','save':'save',
    'sns':'sns','SNS':'sns','인스타':'sns','소셜':'sns',
  };
  return m[str.replace(/\s/g,'')] || 'blog';
}

function renderBulkPreview(rows) {
  const preview = document.getElementById('bulk-preview');
  const submitBtn = document.getElementById('bulk-submit-btn');
  if (!rows.length) { preview.innerHTML = ''; if (submitBtn) submitBtn.disabled = true; return; }

  const validCount = rows.filter(r => r._valid).length;
  if (submitBtn) submitBtn.disabled = validCount === 0;
  submitBtn.textContent = `등록하기 (${validCount}건)`;

  preview.innerHTML = `
  <div style="font-size:12px;color:var(--text2);margin-bottom:8px">
    미리보기 — 총 ${rows.length}행, <span style="color:var(--green)">${validCount}건 유효</span>
    ${rows.length - validCount > 0 ? `<span style="color:#ef4444;margin-left:6px">${rows.length - validCount}건 오류</span>` : ''}
  </div>
  <div style="overflow-x:auto;max-height:200px;overflow-y:auto;border-radius:8px;border:1px solid var(--border)">
    <table class="cart-table">
      <thead><tr>
        <th>#</th><th>브랜드</th><th>분류</th><th>플레이스</th><th>키워드</th>
        <th>시작일</th><th>종료일</th><th>일수량</th><th>총수량</th><th>분할</th>
      </tr></thead>
      <tbody>
        ${rows.map((r, i) => `
          <tr style="${r._valid ? '' : 'background:rgba(239,68,68,0.08)'}">
            <td style="color:var(--text3)">${i+1}</td>
            <td>${r.brand || '<span style="color:#ef4444">-</span>'}</td>
            <td style="color:var(--text3)">${CATEGORIES.find(c=>c.id===r.category)?.label || r.category}</td>
            <td>${r.place || '<span style="color:#ef4444">-</span>'}</td>
            <td style="color:var(--text3)">${r.keyword || '-'}</td>
            <td>${r.startDate}</td><td>${r.endDate}</td>
            <td>${r.dailyQty || '-'}</td><td>${r.qty}</td><td>${r.splitUnit || '-'}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  </div>`;
}

function handleFileUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const wb = XLSX.read(e.target.result, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const json = XLSX.utils.sheet_to_json(ws, { header:1 });
      // 첫 행이 헤더면 제외
      const dataRows = json.filter((r,i) => i > 0 || !isNaN(parseInt(r[7])));
      const raw = dataRows.map(r => r.join('\t')).join('\n');
      bulkParsedRows = parsePasteData(raw);
      renderBulkPreview(bulkParsedRows);
      toast('파일을 불러왔습니다', 'success');
    } catch(err) {
      toast('파일 파싱 오류: ' + err.message, 'error');
    }
  };
  reader.readAsArrayBuffer(file);
}

function handleFileDrop(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) {
    const fakeInput = { files: [file] };
    handleFileUpload(fakeInput);
  }
}

function downloadTemplate() {
  const headers = ['브랜드', '분류', '플레이스명', '키워드', '시작일(YYYY-MM-DD)', '종료일(YYYY-MM-DD)', '일수량', '총수량', '분할단위'];
  const sample = [
    ['블로그A', '블로그 리뷰', '맛있는 식당 본점', '강남 맛집', '2026-04-01', '2026-04-05', '2', '10', ''],
    ['유입A', '리워드 유입', '행복한 카페', '홍대 카페', '2026-04-01', '2026-04-07', '100', '700', '10'],
  ];
  const ws = XLSX.utils.aoa_to_sheet([headers, ...sample]);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '주문템플릿');
  XLSX.writeFile(wb, 'nplace_주문템플릿.xlsx');
  toast('템플릿이 다운로드됩니다', 'success');
}

function submitBulkOrders() {
  const valid = bulkParsedRows.filter(r => r._valid);
  if (!valid.length) return;
  const now = new Date();
  const dateStr = now.toLocaleDateString('ko-KR') + ' ' + now.toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'});

  valid.forEach(r => {
    const newId = 'ORD-' + String(orders.length + 42).padStart(4, '0');
    orders.unshift({
      id: newId,
      places: [r.place],
      brand: r.brand,
      category: r.category,
      qty: r.qty,
      dailyQty: r.dailyQty,
      startDate: r.startDate,
      endDate: r.endDate,
      keyword: r.keyword || null,
      splitUnit: r.splitUnit || null,
      unitPrice: 0,
      amount: 0,
      status: 'pending',
      date: dateStr,
      mediaCompany: null,
    });
  });

  closeModal('modal-bulk');
  bulkParsedRows = [];
  renderBulkModal();
  toast(`${valid.length}건의 주문이 대량 등록되었습니다!`, 'success');
  currentStatus = 'all'; currentPage = 1;
  renderPage();
}

// ── 렌더 ─────────────────────────────────────
renderPage();
</script>
