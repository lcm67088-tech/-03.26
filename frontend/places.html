<style>
/* ── Place Card ── */
.place-card { background:var(--bg2); border:2px solid var(--border); border-radius:var(--radius-lg); padding:14px 16px; cursor:pointer; transition:all 0.2s; }
.place-card:hover { border-color:rgba(var(--cyan-rgb),0.35); transform:translateY(-1px); }
.place-card.selected { border-color:var(--cyan); background:rgba(var(--cyan-rgb),0.04); }
.kw-row { display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg-hover2);border:1px solid var(--border);border-radius:8px; }
.kw-row:hover { border-color:rgba(var(--cyan-rgb),0.3); }
.kw-row.primary-kw { border-color:rgba(var(--cyan-rgb),0.25); background:rgba(var(--cyan-rgb),0.04); }
.kw-row.kw-failed { border-color:rgba(239,68,68,0.2); background:rgba(239,68,68,0.02); opacity:0.85; }

/* ── 탭 ── */
.detail-tabs { display:flex; gap:0; border-bottom:1px solid var(--border); margin-bottom:16px; overflow-x:auto; scrollbar-width:none; }
.detail-tabs::-webkit-scrollbar { display:none; }
.detail-tab { padding:9px 16px; font-size:13px; font-weight:500; color:var(--text3); border:none; background:none; cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; transition:all 0.15s; }
.detail-tab:hover { color:var(--text); }
.detail-tab.active { color:var(--cyan); border-bottom-color:var(--cyan); }

/* ── 정보 그리드 ── */
.info-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
.info-item { display:flex; flex-direction:column; gap:3px; padding:10px 12px; background:var(--bg-hover2); border:1px solid var(--border); border-radius:8px; }
.info-item.full { grid-column:span 2; }
.info-label { font-size:11px; color:var(--text3); font-weight:500; text-transform:uppercase; letter-spacing:0.04em; }
.info-value { font-size:13px; color:var(--text); font-weight:600; line-height:1.4; }
.info-value a { color:var(--cyan); text-decoration:none; }
.info-value a:hover { text-decoration:underline; }

/* ── 통계 카드 ── */
.stat-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:14px; }
.stat-card { background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:12px; text-align:center; }
.stat-card .stat-num { font-size:22px; font-weight:800; color:var(--text-title); line-height:1; margin-bottom:4px; }
.stat-card .stat-label { font-size:11px; color:var(--text3); }
.stat-card.cyan .stat-num { color:var(--cyan); }
.stat-card.green .stat-num { color:var(--green); }
.stat-card.yellow .stat-num { color:var(--yellow); }
.stat-card.purple .stat-num { color:var(--purple); }
.stat-card.red .stat-num { color:var(--red); }

/* ── 메뉴 테이블 ── */
.menu-table { width:100%; border-collapse:collapse; }
.menu-table th { font-size:11px; color:var(--text3); font-weight:600; text-align:left; padding:6px 8px; border-bottom:1px solid var(--border); }
.menu-table td { font-size:13px; color:var(--text); padding:8px; border-bottom:1px solid rgba(var(--border-rgb,0,0,0),0.5); }
.menu-table tr:hover td { background:var(--bg-hover); }
.menu-table tr:last-child td { border-bottom:none; }

/* ── 사진 갤러리 ── */
.photo-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; }
.photo-thumb { aspect-ratio:1; border-radius:8px; background:var(--bg-hover2); border:1px solid var(--border); overflow:hidden; position:relative; cursor:pointer; }
.photo-thumb img { width:100%; height:100%; object-fit:cover; }
.photo-thumb .photo-label { position:absolute; bottom:0; left:0; right:0; background:rgba(0,0,0,0.6); font-size:10px; color:#fff; padding:3px 5px; }

/* ── 리뷰 아이템 ── */
.review-item { padding:10px 12px; background:var(--bg-hover2); border:1px solid var(--border); border-radius:8px; margin-bottom:6px; }
.review-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:5px; }
.review-stars { color:#fbbf24; font-size:12px; letter-spacing:1px; }
.review-text { font-size:12px; color:var(--text2); line-height:1.6; }
.review-date { font-size:10px; color:var(--text3); }

/* ── 업시간 그리드 ── */
.hours-table { width:100%; }
.hours-table td { padding:5px 8px; font-size:13px; color:var(--text2); }
.hours-table td:first-child { font-weight:600; color:var(--text); width:60px; }
.hours-today td { color:var(--cyan); }

/* ── 광고 배지 ── */
.ad-badge { display:inline-flex; align-items:center; gap:4px; padding:3px 8px; border-radius:5px; font-size:11px; font-weight:600; }
.ad-badge.on { background:rgba(var(--green-rgb,34,197,94),0.15); color:var(--green); border:1px solid rgba(var(--green-rgb,34,197,94),0.3); }
.ad-badge.off { background:rgba(var(--text3-rgb,0,0,0),0.1); color:var(--text3); border:1px solid var(--border); }

/* ── 크롤링 상태바 ── */
.crawl-status-bar { display:flex; align-items:center; gap:10px; padding:10px 14px; background:var(--bg-hover2); border:1px solid var(--border); border-radius:8px; margin-bottom:14px; flex-wrap:wrap; }
.crawl-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.crawl-dot.ok { background:var(--green); box-shadow:0 0 6px rgba(var(--green-rgb,34,197,94),0.6); }
.crawl-dot.warn { background:var(--yellow); }
.crawl-dot.error { background:var(--red); }

/* ── 변화 추이 태그 ── */
.change-tag { display:inline-flex; align-items:center; gap:3px; font-size:11px; font-weight:700; }
.change-tag.up { color:var(--green); }
.change-tag.down { color:var(--red); }
.change-tag.same { color:var(--text3); }

/* ── 섹션 제목 ── */
.section-title { font-size:13px; font-weight:700; color:var(--text-title); margin-bottom:10px; display:flex; align-items:center; gap:6px; }

/* ── 리뷰 서브탭 ── */
.review-subtab-bar { display:flex; gap:4px; margin-bottom:12px; border-bottom:1px solid var(--border); padding-bottom:0; }
.review-subtab { padding:7px 16px; font-size:13px; font-weight:600; color:var(--text3); border:none; background:none; cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; transition:all 0.15s; white-space:nowrap; }
.review-subtab:hover { color:var(--text); }
.review-subtab.active { color:var(--cyan); border-bottom-color:var(--cyan); }

/* ── 리뷰 정렬 탭 ── */
.review-sort-bar { display:flex; align-items:center; gap:4px; margin-bottom:8px; }
.review-sort-btn { padding:4px 10px; font-size:11px; font-weight:600; border:1px solid var(--border); background:var(--bg2); color:var(--text3); border-radius:20px; cursor:pointer; transition:all 0.15s; }
.review-sort-btn.active { background:var(--cyan); color:#000; border-color:var(--cyan); }
.review-sort-btn:hover:not(.active) { border-color:rgba(var(--cyan-rgb),0.4); color:var(--text); }

/* ── 블로그 타입 뱃지 ── */
.type-badge-blog { display:inline-block; padding:1px 6px; border-radius:8px; font-size:10px; font-weight:600; background:rgba(var(--cyan-rgb),0.1); color:var(--cyan); border:1px solid rgba(var(--cyan-rgb),0.25); }
.type-badge-cafe { display:inline-block; padding:1px 6px; border-radius:8px; font-size:10px; font-weight:600; background:rgba(234,179,8,0.1); color:var(--yellow); border:1px solid rgba(234,179,8,0.25); }

/* ── 반응형 ── */
@media (max-width:900px) {
  .info-grid { grid-template-columns:1fr; }
  .info-item.full { grid-column:span 1; }
  .stat-grid { grid-template-columns:repeat(2,1fr); }
  .photo-grid { grid-template-columns:repeat(2,1fr); }
}
/* ── 드래그 정렬 ── */
.work-kw-item { user-select:none; }
.work-kw-item:active { cursor:grabbing !important; }
.work-kw-item[draggable=true]:hover { border-color:rgba(34,197,94,0.3) !important; }

/* ─── 파서 API 설정 (동적 URL — 현재 호스트 기반 자동 감지) ─── */
function resolveParserApi() {
  const h = location.hostname;
  // e2b 샌드박스: 3000-xxxx.e2b.dev → 8000-xxxx.e2b.dev
  if (h.match(/^\d+-/)) return location.protocol + '//' + h.replace(/^(\d+)-/, '8000-');
  // localhost 개발
  if (h === 'localhost' || h === '127.0.0.1') return 'http://localhost:8000';
  // 기타 환경 fallback
  return 'http://localhost:8000';
}

/* ═══════════════════════════════════════
   메인 페이지 렌더
═══════════════════════════════════════ */

    <div style="font-size:13px;color:var(--text2)"><strong style="color:var(--cyan)">Pro 플랜</strong> — 플레이스 ${places.length}/20, 키워드 ${totalKw}/100</div>
    <div class="flex gap-6 flex-wrap">
      <span class="badge badge-cyan">플레이스 ${places.length}/20</span>

  </div>

    <!-- 왼쪽: 플레이스 목록 -->

      <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:12px">
        ${places.map(pl => renderPlaceCard(pl)).join('')}

function renderEmpty() {
  return `<div class="card empty-state"><div class="empty-icon">📍</div><div class="empty-title">플레이스를 선택하세요</div></div>`;
}

/* ── 플레이스 카드 (목록) ── */
function renderPlaceCard(pl) {
  const validKws = pl.keywords.filter(k => k.rank !== null && k.rank !== undefined);
  const avg = validKws.length ? (validKws.reduce((s,k)=>s+k.rank,0)/validKws.length).toFixed(1) : '-';
  const best = validKws.length ? Math.min(...validKws.map(k=>k.rank)) : '-';
  const sel = pl.id === selectedId;
  const crawlDot = pl.crawlStatus === 'ok' ? '🟢' : pl.crawlStatus === 'warn' ? '🟡' : '🔴';
  const midBadge = pl.naverPlaceId ? `<span style="font-size:10px;color:var(--text3);margin-top:1px">MID: ${pl.naverPlaceId}</span>` : '';
  return `<div class="place-card${sel?' selected':''}" onclick="selectPlace(${pl.id})">
    <div class="flex-between" style="margin-bottom:8px">
      <div style="min-width:0;flex:1">
        <div style="font-size:14px;font-weight:700;color:var(--text-title);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${pl.name}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:2px">${pl.category}</div>
        ${midBadge}
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0">
        <span class="badge badge-green" style="font-size:10px">활성</span>
        <span style="font-size:10px;color:var(--text3)">${crawlDot} ${pl.crawledAt?.split(' ')[1]??''}</span>
      </div>
    </div>
    <div class="flex gap-10" style="flex-wrap:wrap">
      <span style="font-size:11px;color:var(--text3)">키워드 <strong style="color:var(--text)">${pl.keywords.length}</strong></span>
      <span style="font-size:11px;color:var(--text3)">평균 <strong style="color:var(--cyan)">${avg !== '-' ? avg + '위' : '-'}</strong></span>
      <span style="font-size:11px;color:var(--text3)">최고 <strong style="color:var(--yellow)">${best !== '-' ? best + '위' : '-'}</strong></span>
      <span style="font-size:11px;color:var(--text3)">리뷰 <strong style="color:var(--text)">${(pl.reviewCount??0).toLocaleString()}</strong></span>
    </div>
  </div>`;
}

/* ═══════════════════════════════════════
   상세 패널
═══════════════════════════════════════ */
function renderDetail(p) {
  return `

        <div>
          <div style="font-size:16px;font-weight:700;color:var(--text-title)">${p.name}</div>

            ${p.keywords.filter(k=>k.inTop5).length > 0 ? `<span class="ad-badge on" style="margin-left:6px">TOP5 ${p.keywords.filter(k=>k.inTop5).length}개</span>` : ''}
            ${p.keywords.filter(k=>k.cpcCount>0).length > 0 ? `<span style="display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:5px;font-size:11px;font-weight:600;background:rgba(239,68,68,0.1);color:var(--red);border:1px solid rgba(239,68,68,0.25);margin-left:4px">CPC 경쟁</span>` : ''}
          </div>
        </div>
        <div class="flex gap-6">
          <button class="btn btn-secondary btn-sm" onclick="startCrawl(${p.id})">🔄 크롤링</button>
          <a href="${p.naverUrl}" target="_blank" class="btn btn-secondary btn-sm">🗺️ 네이버</a>
          <button class="btn btn-danger btn-sm" onclick="deletePlace(${p.id})">${iconTrash()}</button>
        </div>
      </div>

      <!-- 크롤링 상태 -->
      <div class="crawl-status-bar">
        <div class="crawl-dot ${p.crawlStatus}"></div>
        <span style="font-size:12px;color:var(--text2)">
          ${p.crawlStatus==='ok' ? '정상 수집 완료' : p.crawlStatus==='warn' ? '일부 항목 수집 실패' : '크롤링 오류'}
        </span>
        <span style="font-size:11px;color:var(--text3)">마지막: <strong style="color:var(--text2)">${p.crawledAt}</strong></span>
        <span style="font-size:11px;color:var(--text3)">다음: <strong style="color:var(--text2)">오늘 12:00</strong></span>
      </div>

      <!-- 핵심 통계 (파싱으로 확인되는 지표만) -->
      <div class="stat-grid">
        <div class="stat-card green">
          <div class="stat-num">${(p.reviewCount??0).toLocaleString()}</div>
          <div class="stat-label">영수증 리뷰 ${renderStatChange(p.reviewCount, p.reviewCountPrev)}</div>
        </div>
        <div class="stat-card cyan">
          <div class="stat-num">${(p.blogReviewCount??0).toLocaleString()}</div>
          <div class="stat-label">블로그 리뷰 ${renderStatChange(p.blogReviewCount, p.blogReviewPrev)}</div>
        </div>
        <div class="stat-card yellow">
          <div class="stat-num">${p.avgRating??'-'}</div>
          <div class="stat-label">★ 평점</div>
        </div>
        <div class="stat-card">
          <div class="stat-num">${p.photoCount??0}</div>
          <div class="stat-label">등록 사진</div>
        </div>
      </div>
    </div>

    <!-- 탭 -->
    <div class="detail-tabs" style="padding:0 20px">
      ${['overview','keywords','kw-detail','insights','crawllog','reviews','menu','photos'].map(t => `
        <button class="detail-tab${activeTab===t?' active':''}" onclick="switchTab('${t}',${p.id})">${tabLabel(t)}</button>
      `).join('')}
    </div>

    <!-- 탭 콘텐츠 -->
    <div style="padding:16px 20px" id="tab-content">
      ${renderTabContent(p)}
    </div>
  </div>`;
}

function tabLabel(t) {
  return { overview:'개요', keywords:'키워드', 'kw-detail':'순위 상세', insights:'통계추이', crawllog:'수집이력', reviews:'리뷰', menu:'메뉴', photos:'사진' }[t] || t;
}

function renderStatChange(curr, prev) {
  if (!prev) return '';
  const d = curr - prev;
  if (d > 0) return `<span style="font-size:10px;color:var(--green)">▲${d.toLocaleString()}</span>`;
  if (d < 0) return `<span style="font-size:10px;color:var(--red)">▼${Math.abs(d).toLocaleString()}</span>`;
  return '';
}

function formatK(n) {
  if (n >= 1000) return (n/1000).toFixed(1) + 'k';
  return n.toString();
}

/* ── 탭 콘텐츠 라우터 ── */
function renderTabContent(p) {
  switch(activeTab) {
    case 'overview':  return renderTabOverview(p);
    case 'keywords':  return renderTabKeywords(p);
    case 'kw-detail':  return renderTabKwDetail(p);
    case 'insights':  return renderTabInsights(p);
    case 'crawllog':  return renderTabCrawlLog(p);
    case 'reviews':   return renderTabReviews(p);
    case 'menu':      return renderTabMenu(p);
    case 'photos':    return renderTabPhotos(p);
    default:          return renderTabOverview(p);
  }
}

/* ════ 탭: 개요 ════ */
function renderTabOverview(p) {
  return `
  <div class="section-title">📌 기본 정보</div>

      <div class="info-value" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <a href="${p.naverUrl}" target="_blank" style="word-break:break-all">${p.naverUrl}</a>
        ${p.naverPlaceId ? `<span style="flex-shrink:0;font-size:11px;padding:2px 7px;background:rgba(var(--cyan-rgb),0.1);border:1px solid rgba(var(--cyan-rgb),0.25);border-radius:5px;color:var(--cyan)">ID: ${p.naverPlaceId}</span>` : ''}
        <button onclick="editNaverUrl(${p.id})" style="flex-shrink:0;padding:2px 8px;font-size:11px;border:1px solid var(--border);border-radius:5px;background:var(--bg-hover2);color:var(--text2);cursor:pointer">✏️ URL 변경</button>
      </div>
    </div>
    ${p.introduction ? `
    <div class="info-item full">
      <div class="info-label">소개글</div>
      <div class="info-value" style="font-size:12px;color:var(--text2);line-height:1.7;white-space:pre-line">${p.introduction}</div>
    </div>` : ''}
  </div>

  <!-- 대표 키워드 (네이버 플레이스 등록 키워드) 섹션 -->
  <div class="section-title">🏷️ 대표 키워드 (네이버 플레이스 등록)</div>
  <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px">
    ${(p.repKeywords||[]).map((kw,i)=>`
      <span style="display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:rgba(var(--cyan-rgb),0.07);border:1px solid rgba(var(--cyan-rgb),0.2);border-radius:20px;font-size:12px;font-weight:600;color:var(--cyan)">
        <span style="font-size:10px;color:var(--text3);font-weight:400">${i+1}</span> ${kw}
      </span>

    ${!(p.repKeywords||[]).length ? '<span style="font-size:12px;color:var(--text3)">등록된 대표 키워드가 없습니다</span>' : ''}

  <div class="section-title">🔑 순위 키워드 추이 (15일)</div>
  <div style="margin-bottom:6px;font-size:12px;color:var(--text3)">
    대표 순위 키워드: <strong style="color:var(--cyan)">${p.keywords.find(k=>k.isRankKw)?.kw || '–'}</strong>
    &nbsp; 현재 순위: <strong style="color:var(--text)">${p.keywords.find(k=>k.isRankKw)?.rank ?? '–'}위</strong>
  </div>
  <div class="chart-wrap" style="height:90px"><canvas id="miniChart"></canvas></div>

    const eligible = workKws.filter(k =>
      k.rank !== null && (k.isTopSection || k.inTop5 || k.cpcCount === 0)
    );
    const topSection = workKws.filter(k => k.isTopSection);
    const top5       = workKws.filter(k => k.inTop5 && !k.isTopSection);
    const noCpc      = workKws.filter(k => k.cpcCount === 0 && k.rank !== null && !k.isTopSection && !k.inTop5);

    return `
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px">
      <div style="padding:10px 12px;background:rgba(34,197,94,0.06);border:1px solid rgba(34,197,94,0.2);border-radius:8px;text-align:center">
        <div style="font-size:22px;font-weight:800;color:var(--green)">${workKws.length}<span style="font-size:12px;color:var(--text3);font-weight:400"> 개</span></div>
        <div style="font-size:11px;color:var(--text3);margin-top:2px">⚡ 작업 키워드</div>
      </div>
      <div style="padding:10px 12px;background:rgba(var(--cyan-rgb),0.06);border:1px solid rgba(var(--cyan-rgb),0.2);border-radius:8px;text-align:center">
        <div style="font-size:22px;font-weight:800;color:var(--cyan)">${rankKws.length}<span style="font-size:12px;color:var(--text3);font-weight:400"> 개</span></div>
        <div style="font-size:11px;color:var(--text3);margin-top:2px">📌 순위 키워드</div>
      </div>
    </div>
    <div style="padding:10px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:10px">

/* ════ 탭: 키워드 ════ */
function renderTabKeywords(p) {
  // isRankKw:true = 순위키 (목표 키워드, 최대 3개), false = 작업키 (실제 SEO 작업용)
  const rankKws = p.keywords.filter(k => k.isRankKw);  // 순위키
  const workKws = p.keywords.filter(k => !k.isRankKw)  // 작업키 (sortOrder 순)
    .sort((a, b) => (a.sortOrder ?? 999) - (b.sortOrder ?? 999));

  function kwBadges(k) {
    const isFailed   = k.rank === null && k.failReason;
    const isNotFound = k.rank === null && !k.failReason;
    const rankCell = isFailed
      ? `<span style="padding:3px 7px;border-radius:5px;font-size:11px;font-weight:700;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);color:var(--red)">❌ 실패</span>`
      : isNotFound
        ? `<span style="padding:3px 7px;border-radius:5px;font-size:11px;background:var(--bg-hover2);border:1px solid var(--border);color:var(--text3)">미발견</span>`
        : rankBadge(k.rank);
    const sectionBadge = k.isTopSection
      ? `<span style="padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700;background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.3);color:var(--green)">🏆최상단</span>` : '';
    const top5Badge = k.inTop5
      ? `<span style="padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700;background:rgba(var(--cyan-rgb),0.12);border:1px solid rgba(var(--cyan-rgb),0.3);color:var(--cyan)">TOP5</span>` : '';
    const cpcBadge = (typeof k.cpcCount === 'number')
      ? (k.cpcCount > 0
        ? `<span style="padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);color:var(--red)">💰CPC ${k.cpcCount}개</span>`
        : `<span style="padding:2px 6px;border-radius:4px;font-size:10px;background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.2);color:var(--green)">CPC없음</span>`) : '';
    return { rankCell, sectionBadge, top5Badge, cpcBadge, isFailed };
  }

  // 순위키 행 (순서 변경 없음, 1~3개)
  function rankKwRow(k, i) {
    const { rankCell, sectionBadge, top5Badge, cpcBadge, isFailed } = kwBadges(k);
    return `
    <div class="kw-row" style="background:rgba(var(--cyan-rgb),0.03);border:1px solid rgba(var(--cyan-rgb),0.18);border-radius:10px">
      <div style="width:22px;text-align:center;font-size:12px;font-weight:700;color:var(--cyan);flex-shrink:0">${i+1}</div>
      ${rankCell}
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:700;color:var(--text-title);display:flex;align-items:center;gap:5px;flex-wrap:wrap">
          ${k.kw}
          <span style="padding:1px 6px;border-radius:10px;font-size:10px;background:rgba(var(--cyan-rgb),0.15);color:var(--cyan);font-weight:600">순위키</span>
          ${top5Badge}
        </div>
        <div style="display:flex;align-items:center;gap:5px;margin-top:4px;flex-wrap:wrap">
          ${k.rank !== null ? sectionBadge : ''}
          ${k.rank !== null ? cpcBadge : ''}
          ${isFailed ? `<span style="font-size:10px;color:var(--red)">⚠️ ${k.failReason}</span>` : ''}
          <span style="font-size:10px;color:var(--text3)">${k.lastChecked ?? ''}</span>
        </div>
      </div>
      <div style="width:80px;height:32px;flex-shrink:0">
        ${k.rank !== null ? `<canvas id="spark-${k.id}" width="80" height="32"></canvas>` : ''}
      </div>
      <div style="font-size:13px;font-weight:700;width:40px;text-align:right;flex-shrink:0">${k.rank !== null && k.prev !== null ? rankChange(k.rank, k.prev) : ''}</div>
      <button class="btn btn-ghost" style="padding:4px;color:var(--red);flex-shrink:0" title="삭제" onclick="deleteKw(${k.id})">${iconTrash()}</button>
    </div>`;
  }

  // 작업키 행 (드래그 정렬 가능)
  function workKwRow(k, i) {
    const { rankCell, sectionBadge, top5Badge, cpcBadge, isFailed } = kwBadges(k);
    const isEligible = k.rank !== null && (k.isTopSection || k.inTop5 || k.cpcCount === 0);
    const eligibleBadge = isEligible
      ? `<span style="padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700;background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.3);color:var(--green)">✅작업가능</span>` : '';
    return `
    <div class="kw-row work-kw-item" draggable="true" data-kwid="${k.id}" data-placeid="${p.id}"
         style="cursor:grab;transition:opacity .15s;border-radius:10px">
      <div style="width:18px;text-align:center;color:var(--text3);flex-shrink:0;cursor:grab;font-size:14px">⠿</div>
      ${rankCell}
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:600;color:var(--text-title);display:flex;align-items:center;gap:5px;flex-wrap:wrap">
          ${k.kw} ${top5Badge} ${eligibleBadge}
        </div>
        <div style="display:flex;align-items:center;gap:5px;margin-top:4px;flex-wrap:wrap">
          ${k.rank !== null ? sectionBadge : ''}
          ${k.rank !== null ? cpcBadge : ''}
          ${isFailed ? `<span style="font-size:10px;color:var(--red)">⚠️ ${k.failReason}</span>` : ''}
          <span style="font-size:10px;color:var(--text3)">${k.lastChecked ?? ''}</span>
        </div>
      </div>
      <div style="width:80px;height:32px;flex-shrink:0">
        ${k.rank !== null ? `<canvas id="spark-${k.id}" width="80" height="32"></canvas>` : ''}
      </div>
      <div style="font-size:13px;font-weight:700;width:40px;text-align:right;flex-shrink:0">${k.rank !== null && k.prev !== null ? rankChange(k.rank, k.prev) : ''}</div>
      <button class="btn btn-ghost" style="padding:4px;color:var(--red);flex-shrink:0" title="삭제" onclick="deleteKw(${k.id})">${iconTrash()}</button>
    </div>`;
  }

  return `
  <!-- 헤더 -->
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px">
    <div style="font-size:13px;font-weight:600;color:var(--text-title)">키워드 관리 (${p.keywords.length}/100)</div>
    <div style="display:flex;gap:6px;align-items:center">
      <button class="btn btn-secondary btn-sm" style="font-size:11px;background:rgba(34,197,94,0.08);border-color:rgba(34,197,94,0.3);color:var(--green)" onclick="openFindWorkKwModal(${p.id})">
        🔍 작업키 찾기
      </button>
      <button class="btn btn-primary btn-sm" onclick="openAddKwModal(${p.id})">${iconPlus()} 추가</button>
    </div>
  </div>

  <!-- ① 순위 키워드 섹션 (상단 고정, 최대 3개) -->
  <div style="margin-bottom:20px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:8px">
        <div style="font-size:12px;font-weight:700;color:var(--cyan);padding:4px 12px;background:rgba(var(--cyan-rgb),0.08);border:1px solid rgba(var(--cyan-rgb),0.25);border-radius:20px">
          📌 순위 키워드 ${rankKws.length}/3
        </div>
        <div style="font-size:11px;color:var(--text3)">목표 순위를 올리고 싶은 키워드</div>
      </div>
      ${rankKws.length < 3
        ? `<button class="btn btn-ghost btn-sm" style="font-size:11px;color:var(--cyan)" onclick="openAddKwModal(${p.id}, true)">${iconPlus()} 순위키 추가</button>`
        : `<span style="font-size:11px;color:var(--text3)">최대 3개</span>`}
    </div>
    ${rankKws.length
      ? `<div style="display:flex;flex-direction:column;gap:8px">${rankKws.map((k,i) => rankKwRow(k,i)).join('')}</div>`
      : `<div style="padding:20px;text-align:center;color:var(--text3);font-size:12px;background:rgba(var(--cyan-rgb),0.03);border:1px solid rgba(var(--cyan-rgb),0.15);border-radius:10px">
          <div style="font-size:16px;margin-bottom:6px">📌</div>
          <div style="font-weight:600;color:var(--text2);margin-bottom:4px">순위 키워드가 없습니다</div>
          <div style="font-size:11px">순위를 올리고 싶은 키워드를 추가하세요 (예: 강남 맛집, 홍대 카페)</div>
          <button class="btn btn-secondary btn-sm" style="margin-top:10px" onclick="openAddKwModal(${p.id}, true)">+ 순위 키워드 추가</button>
        </div>`}
  </div>

  <!-- ② 작업 키워드 섹션 (드래그 정렬) -->
  <div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:8px">
        <div style="font-size:12px;font-weight:700;color:var(--green);padding:4px 12px;background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.25);border-radius:20px">
          ⚡ 작업 키워드 ${workKws.length}개
        </div>
        <div style="font-size:11px;color:var(--text3)">순위키 상승을 위한 SEO 작업 키워드</div>
      </div>
      <button class="btn btn-ghost btn-sm" style="font-size:11px;color:var(--green)" onclick="openAddKwModal(${p.id}, false)">${iconPlus()} 작업키 추가</button>
    </div>
    ${workKws.length
      ? `<div id="work-kw-list" style="display:flex;flex-direction:column;gap:8px">${workKws.map((k,i) => workKwRow(k,i)).join('')}</div>`
      : `<div style="padding:20px;text-align:center;color:var(--text3);font-size:12px;background:rgba(34,197,94,0.03);border:1px solid rgba(34,197,94,0.15);border-radius:10px">
          <div style="font-size:16px;margin-bottom:6px">⚡</div>
          <div style="font-weight:600;color:var(--text2);margin-bottom:4px">작업 키워드가 없습니다</div>
          <div style="font-size:11px">순위키 파생 롱테일 키워드를 추가하거나 <strong>작업키 찾기</strong> 기능으로 자동 발굴하세요</div>
          <div style="display:flex;gap:8px;justify-content:center;margin-top:10px">
            <button class="btn btn-secondary btn-sm" onclick="openAddKwModal(${p.id}, false)">+ 직접 추가</button>
            <button class="btn btn-secondary btn-sm" style="background:rgba(34,197,94,0.08);border-color:rgba(34,197,94,0.3);color:var(--green)" onclick="openFindWorkKwModal(${p.id})">🔍 자동 찾기</button>
          </div>
        </div>`}
  </div>

  <div style="margin-top:12px;padding:10px 12px;background:var(--bg-hover2);border-radius:8px;font-size:12px;color:var(--text3)">
    마지막 크롤링: <strong style="color:var(--text2)">${p.crawledAt}</strong>
    &nbsp;·&nbsp; <span style="color:var(--text3)">⠿ 드래그로 작업 키워드 순서 변경 가능</span>
  </div>`;
}

/* ════ 탭: 리뷰 ════ */
function renderTabReviews(p) {
  const vr = p.recentReviews || [];
  const br = p.blogReviews || [];

  // 현재 서브탭 상태 (기본: 블로그가 더 많으면 블로그, 아니면 영수증)
  const subTab = p._reviewSubTab || (br.length >= vr.length ? 'blog' : 'receipt');
  const vrSort = p._vrSort || 'recommend';
  const brSort = p._brSort || 'recommend';
  const cafeCount = br.filter(b => b.type === 'cafe').length;

  // 영수증 리뷰 정렬
  function sortVr(list, mode) {
    if (mode === 'recent') {
      return [...list].sort((a, b) => {
        const ago = s => { if (!s) return 0; const m = s.match(/(\d+)/); return m ? parseInt(m[1]) : 9999; };
        const relScore = s => {
          if (!s) return 0;
          if (s.includes('일 전') || s.includes('시간 전') || s.includes('분 전')) return 99999 - ago(s);
          return new Date(s.replace(/\./g,'-')).getTime() || 0;
        };
        return relScore(b.date) - relScore(a.date);
      });
    }
    return list;
  }

  // 블로그 리뷰 정렬
  function sortBr(list, mode) {
    if (mode === 'recent') {
      return [...list].sort((a, b) => {
        const ago = s => { if (!s) return 0; const m = s.match(/(\d+)/); return m ? parseInt(m[1]) : 9999; };
        const relScore = s => {
          if (!s) return 0;
          if (s.includes('일 전') || s.includes('시간 전') || s.includes('분 전')) return 99999 - ago(s);
          return new Date(s.replace(/\./g,'-')).getTime() || 0;
        };
        return relScore(b.date) - relScore(a.date);
      });
    }
    return list;
  }

  const sortedVr = sortVr(vr, vrSort);
  const sortedBr = sortBr(br, brSort);

  function vrCard(r) {
    const starsNum = Math.min(5, Math.max(0, r.stars || 0));
    const starsHtml = '★'.repeat(starsNum) + '☆'.repeat(5 - starsNum);
    const imgs = (r.images||[]).slice(0,4).map(img =>
      `<img src="${img}" style="width:56px;height:56px;object-fit:cover;border-radius:6px;border:1px solid var(--border);cursor:pointer" onerror="this.style.display='none'" onclick="window.open('${img}','_blank')">`
    ).join('');
    const tagHtml = (r.tags||[]).slice(0,3).map(t =>
      `<span style="font-size:10px;padding:1px 6px;background:rgba(var(--cyan-rgb),0.08);border:1px solid rgba(var(--cyan-rgb),0.2);border-radius:10px;color:var(--cyan)">${t}</span>`
    ).join('');
    return `
    <div style="padding:10px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:7px">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px;flex-wrap:wrap">
        <span style="color:#fbbf24;font-size:12px;letter-spacing:1px">${starsHtml}</span>
        <span style="font-size:12px;color:var(--text2);font-weight:600">${r.author||'익명'}</span>
        <span style="font-size:11px;color:var(--text3)">${r.date||''}</span>
        ${r.item ? `<span style="font-size:10px;padding:1px 6px;background:rgba(var(--cyan-rgb),0.1);border:1px solid rgba(var(--cyan-rgb),0.2);border-radius:10px;color:var(--cyan)">${r.item}</span>` : ''}
      </div>
      ${r.text ? `<div style="font-size:12px;color:var(--text2);line-height:1.5;margin-bottom:5px">${r.text}</div>` : ''}
      ${tagHtml ? `<div style="display:flex;gap:3px;flex-wrap:wrap;margin-bottom:5px">${tagHtml}</div>` : ''}
      ${imgs ? `<div style="display:flex;gap:4px;flex-wrap:wrap">${imgs}</div>` : ''}
    </div>`;
  }

  function brCard(b) {
    const thumb = (b.thumbnails||[])[0] || (b.fullImages||[])[0];
    const extraThumbs = (b.thumbnails||[]).slice(1, 5);
    const fullImgs = (b.fullImages||[]).slice(0, 6);
    const hasFullContent = b.contents && b.contents.length > 100;
    const typeBadge = b.type === 'cafe'
      ? `<span class="type-badge-cafe">☕ 카페</span>`
      : `<span class="type-badge-blog">📝 블로그</span>`;
    return `
    <div style="padding:10px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:7px">
      <div style="display:flex;gap:10px">
        ${thumb
          ? `<img src="${thumb}" style="width:64px;height:64px;object-fit:cover;border-radius:7px;flex-shrink:0;border:1px solid var(--border);cursor:pointer" onerror="this.style.display='none'" onclick="window.open('${b.url}','_blank')">`
          : `<div style="width:64px;height:64px;background:var(--bg-hover2);border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px">${b.type==='cafe'?'☕':'📝'}</div>`}
        <div style="flex:1;min-width:0">
          <div style="font-size:12px;font-weight:600;color:var(--text-title);margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
            <a href="${b.url}" target="_blank" style="color:inherit;text-decoration:none">${b.title||'제목 없음'}</a>
          </div>
          <div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-bottom:4px">
            ${typeBadge}
            <span style="font-size:10px;color:var(--text3)">${b.author||'–'} · ${b.date||'–'}</span>
            ${b.rank ? `<span style="font-size:10px;color:var(--yellow);font-weight:600">#${b.rank}위</span>` : ''}
          </div>
          ${hasFullContent
            ? `<div style="font-size:11px;color:var(--text2);overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;line-height:1.5">${b.contents}</div>`
            : `<div style="font-size:11px;color:var(--text3);font-style:italic">원문 미수집 (2차 파싱 필요)</div>`}
        </div>
      </div>
      ${(extraThumbs.length || fullImgs.length) ? `
      <div style="margin-top:6px;display:flex;gap:4px;flex-wrap:wrap">
        ${extraThumbs.map(t=>`<img src="${t}" style="width:40px;height:40px;object-fit:cover;border-radius:5px;border:1px solid var(--border);cursor:pointer" onerror="this.style.display='none'" onclick="window.open('${t}','_blank')">`).join('')}
        ${(b.thumbnails||[]).length > 5 ? `<div style="width:40px;height:40px;background:var(--bg-hover2);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text3)">+${(b.thumbnails||[]).length-5}</div>` : ''}
        ${fullImgs.length ? fullImgs.map(t=>`<img src="${t}" style="width:40px;height:40px;object-fit:cover;border-radius:5px;border:2px solid rgba(var(--cyan-rgb),0.3);cursor:pointer" onerror="this.style.display='none'" onclick="window.open('${t}','_blank')" title="원문 이미지">`).join('') : ''}
        ${(b.fullImages||[]).length > 6 ? `<div style="width:40px;height:40px;background:rgba(var(--cyan-rgb),0.08);border:1px solid rgba(var(--cyan-rgb),0.2);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--cyan)">+${(b.fullImages||[]).length-6}</div>` : ''}
      </div>` : ''}
    </div>`;
  }

  // 영수증 패널
  const receiptPanel = `
    <div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <span style="font-size:12px;color:var(--text3)">전체 <strong style="color:var(--text)">${(p.reviewCount||0).toLocaleString()}</strong>개 · <strong style="color:var(--text)">${vr.length}</strong>건 수집됨</span>
        <div class="review-sort-bar" style="margin-bottom:0">
          <button class="review-sort-btn ${vrSort==='recommend'?'active':''}" onclick="setReviewSort(${p.id},'vr','recommend')">추천순</button>
          <button class="review-sort-btn ${vrSort==='recent'?'active':''}" onclick="setReviewSort(${p.id},'vr','recent')">최신순</button>
        </div>
      </div>
      ${sortedVr.length
        ? sortedVr.map(r => vrCard(r)).join('')
        : `<div style="padding:30px;text-align:center;color:var(--text3);font-size:12px;background:var(--bg2);border:1px solid var(--border);border-radius:10px">
            아직 수집된 영수증 리뷰가 없습니다.<br>
            <button class="btn btn-secondary btn-sm" style="margin-top:8px" onclick="startCrawl(${p.id})">🔄 수집하기</button>
          </div>`}
    </div>`;

  // 블로그 패널
  const blogPanel = `
    <div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <span style="font-size:12px;color:var(--text3)">전체 <strong style="color:var(--text)">${(p.blogReviewCount||0).toLocaleString()}</strong>개 · <strong style="color:var(--text)">${br.length}</strong>건 수집됨${cafeCount > 0 ? ` · <span style="color:var(--yellow)">카페 ${cafeCount}건 포함</span>` : ''}${br.filter(b=>b.contents&&b.contents.length>100).length>0?` · 원문 ${br.filter(b=>b.contents&&b.contents.length>100).length}건`:''}</span>
        <div class="review-sort-bar" style="margin-bottom:0">
          <button class="review-sort-btn ${brSort==='recommend'?'active':''}" onclick="setReviewSort(${p.id},'br','recommend')">추천순</button>
          <button class="review-sort-btn ${brSort==='recent'?'active':''}" onclick="setReviewSort(${p.id},'br','recent')">최신순</button>
        </div>
      </div>
      ${sortedBr.length
        ? sortedBr.map(b => brCard(b)).join('')
        : `<div style="padding:30px;text-align:center;color:var(--text3);font-size:12px;background:var(--bg2);border:1px solid var(--border);border-radius:10px">
            아직 수집된 블로그 리뷰가 없습니다.<br>
            <button class="btn btn-secondary btn-sm" style="margin-top:8px" onclick="startCrawl(${p.id})">🔄 수집하기</button>
          </div>`}
    </div>`;

  return `
  <!-- 서브탭 바 -->
  <div class="review-subtab-bar">
    <button class="review-subtab ${subTab==='receipt'?'active':''}" onclick="setReviewSubTab(${p.id},'receipt')">
      🧾 영수증 리뷰
      <span style="margin-left:4px;font-size:11px;padding:1px 6px;border-radius:10px;background:${subTab==='receipt'?'rgba(var(--cyan-rgb),0.15)':'var(--bg-hover2)'};color:${subTab==='receipt'?'var(--cyan)':'var(--text3)'}">${vr.length}</span>
    </button>
    <button class="review-subtab ${subTab==='blog'?'active':''}" onclick="setReviewSubTab(${p.id},'blog')">
      📝 블로그·카페 리뷰
      <span style="margin-left:4px;font-size:11px;padding:1px 6px;border-radius:10px;background:${subTab==='blog'?'rgba(var(--cyan-rgb),0.15)':'var(--bg-hover2)'};color:${subTab==='blog'?'var(--cyan)':'var(--text3)'}">${br.length}</span>
    </button>
    <div style="margin-left:auto;display:flex;align-items:center">
      <a href="${p.naverUrl}" target="_blank" style="font-size:11px;color:var(--text3);text-decoration:none;padding:4px 8px;border:1px solid var(--border);border-radius:6px;white-space:nowrap">네이버에서 보기 ↗</a>
    </div>
  </div>

  <!-- 리뷰 내용 -->
  ${subTab === 'receipt' ? receiptPanel : blogPanel}`;
}

/* ════ 탭: 메뉴 ════ */
function renderTabMenu(p) {
  if (!p.menus || !p.menus.length) return `
    <div class="empty-state" style="padding:40px">
      <div class="empty-icon">🍽️</div>
      <div class="empty-title">등록된 메뉴 정보가 없습니다</div>
      <div style="margin-top:12px">
        <button class="btn btn-secondary btn-sm" onclick="startCrawl(${p.id})">🔄 메뉴 수집하기</button>

    <span style="font-size:11px;padding:2px 8px;background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.3);border-radius:12px;color:#fbbf24">★ 추천 ${recommended.length}개</span>

  <div style="margin-bottom:14px">
    <div class="section-title" style="font-size:12px;margin-bottom:8px">⭐ 추천 메뉴</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px">
      ${recommended.map(m => {
        const img = (m.images||[])[0];
        return `
        <div style="background:var(--bg2);border:1px solid rgba(251,191,36,0.2);border-radius:10px;overflow:hidden">
          ${img ? `<img src="${img}" style="width:100%;height:100px;object-fit:cover" onerror="this.style.display='none'">` : `<div style="width:100%;height:60px;background:linear-gradient(135deg,rgba(251,191,36,0.1),rgba(251,191,36,0.05));display:flex;align-items:center;justify-content:center;font-size:24px">🍽️</div>`}

            ${m.desc ? `<div style="font-size:11px;color:var(--text3);margin-top:4px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">${m.desc}</div>` : ''}

    <thead><tr><th>메뉴명</th><th style="text-align:right">가격</th><th>설명</th></tr></thead>

/* ════ 탭: 사진 ════ */
function renderTabPhotos(p) {
  const photos = p.photos || [];
  if (!photos.length) return `
    <div class="empty-state" style="padding:40px">
      <div class="empty-icon">📷</div>
      <div class="empty-title">수집된 사진이 없습니다</div>
      <div style="font-size:12px;color:var(--text3);margin-top:6px">크롤링 후 사진이 표시됩니다</div>
      <div style="margin-top:12px">
        <button class="btn btn-secondary btn-sm" onclick="startCrawl(${p.id})">🔄 지금 수집하기</button>
      </div>
    </div>`;

  // 섹션별 그룹핑
  const sections = {};
  photos.forEach(ph => {
    const sec = ph.section || '기타';
    if (!sections[sec]) sections[sec] = [];
    sections[sec].push(ph);
  });

  const sectionHtml = Object.entries(sections).map(([sec, list]) => `
    <div style="margin-bottom:18px">
      <div style="font-size:12px;font-weight:700;color:var(--text2);margin-bottom:8px;display:flex;align-items:center;gap:6px">
        📂 ${sec}
        <span style="font-size:11px;font-weight:400;color:var(--text3)">${list.length}장</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:6px">
        ${list.map((ph, i) => {
          const imgSrc = ph.imgUrl || ph.originalUrl || '';
          const linkUrl = ph.link || ph.originalUrl || '';
          return `
          <div style="position:relative;border-radius:8px;overflow:hidden;border:1px solid var(--border);cursor:pointer;aspect-ratio:1" onclick="window.open('${linkUrl||imgSrc}','_blank')">
            ${imgSrc
              ? `<img src="${imgSrc}" style="width:100%;height:100%;object-fit:cover;display:block" onerror="this.parentElement.querySelector('.ph-fallback').style.display='flex';this.style.display='none'">`
              : ''}
            <div class="ph-fallback" style="width:100%;height:100%;background:var(--bg-hover2);display:${imgSrc?'none':'flex'};align-items:center;justify-content:center;font-size:28px">📷</div>
            ${ph.rank ? `<div style="position:absolute;top:4px;left:4px;padding:1px 6px;background:rgba(0,0,0,0.6);border-radius:10px;font-size:10px;color:#fff">#${ph.rank}</div>` : ''}
            ${ph.title ? `<div style="position:absolute;bottom:0;left:0;right:0;padding:4px 6px;background:linear-gradient(transparent,rgba(0,0,0,0.65));font-size:10px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${ph.title}</div>` : ''}
          </div>`;
        }).join('')}
      </div>
    </div>
  `).join('');

  return `
  <!-- 사진 요약 -->
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;padding:10px 14px;background:var(--bg-hover2);border:1px solid var(--border);border-radius:10px">
    <div style="font-size:13px;color:var(--text3)">
      총 <strong style="color:var(--text-title);font-size:18px">${photos.length}</strong>장 수집됨
      <span style="font-size:11px;margin-left:8px">${Object.keys(sections).length}개 섹션</span>
    </div>
    <div style="margin-left:auto">
      <a href="${p.naverUrl}" target="_blank" class="btn btn-secondary btn-sm" style="font-size:11px">네이버 전체 사진 ↗</a>
    </div>
  </div>

  <!-- 섹션별 사진 그리드 -->
  ${sectionHtml}`;
}

/* ════ 탭: 통계 추이 ════ */
function renderTabInsights(p) {
  const hasTrendReview = p.trendReview?.length > 1;
  const hasTrendBlog   = p.trendBlog?.length > 1;
  const hasAnyTrend    = hasTrendReview || hasTrendBlog;

  const diffReview = hasTrendReview ? (p.trendReview.at(-1)||0) - (p.trendReview[0]||0) : null;
  const diffBlog   = hasTrendBlog   ? (p.trendBlog.at(-1)||0)   - (p.trendBlog[0]||0)   : null;

  const signStr = v => (v > 0 ? '+' : '') + v.toLocaleString();

  // 날짜 기준 N일 계산
  let periodLabel = '';
  if (p.trendDates && p.trendDates.length >= 2) {
    const d0 = p.trendDates[0];
    const d1 = p.trendDates.at(-1);
    periodLabel = `${d0} ~ ${d1}`;
    // N일 계산 시도
    try {
      const toDate = s => { const parts = s.split('/'); return new Date(2026, parseInt(parts[0])-1, parseInt(parts[1])); };
      const ms = toDate(d1) - toDate(d0);
      const days = Math.round(ms / 86400000);
      if (days > 0) periodLabel = `최근 ${days}일 (${d0} ~ ${d1})`;
    } catch(e) {}
  }

  return `
  <div class="section-title">📈 리뷰 추이</div>
  ${periodLabel ? `<div style="margin-bottom:10px;font-size:11px;color:var(--text3);padding:5px 10px;background:var(--bg-hover2);border-radius:6px;display:inline-block">📅 기준: ${periodLabel}</div>` : ''}
  ${!hasAnyTrend ? `
    <div style="padding:24px;text-align:center;color:var(--text3);font-size:13px;background:var(--bg-hover2);border-radius:10px;border:1px solid var(--border)">
      크롤링 데이터가 쌓이면 추이 차트가 표시됩니다<br>
      <span style="font-size:11px">플레이스 크롤링을 실행하면 시점별 데이터가 누적됩니다</span>
    </div>
  ` : `
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
    ${hasTrendReview ? `
    <div class="card" style="padding:12px">
      <div style="font-size:12px;color:var(--text3);margin-bottom:6px">💬 영수증 리뷰 수</div>
      <div style="height:80px"><canvas id="chart-review"></canvas></div>
      <div style="display:flex;justify-content:space-between;margin-top:6px;font-size:11px">
        <span style="color:var(--text3)">시작: <strong style="color:var(--text)">${p.trendReview[0].toLocaleString()}</strong></span>
        <span style="color:var(--green)">${signStr(diffReview)}</span>
      </div>
    </div>` : ''}
    ${hasTrendBlog ? `
    <div class="card" style="padding:12px">
      <div style="font-size:12px;color:var(--text3);margin-bottom:6px">📰 블로그 리뷰 수</div>
      <div style="height:80px"><canvas id="chart-blog"></canvas></div>
      <div style="display:flex;justify-content:space-between;margin-top:6px;font-size:11px">
        <span style="color:var(--text3)">시작: <strong style="color:var(--text)">${p.trendBlog[0].toLocaleString()}</strong></span>
        <span style="color:var(--cyan)">${signStr(diffBlog)}</span>
      </div>
    </div>` : ''}
  </div>

  <div class="section-title">🌟 실적 요약</div>
  <div class="stat-grid">
    ${hasTrendReview ? `
    <div class="stat-card green">
      <div class="stat-num">${signStr(diffReview)}</div>
      <div class="stat-label">영수증 리뷰 증감${periodLabel?`<br><span style="font-size:9px;font-weight:400">(${periodLabel.split(' ')[0]+' '+periodLabel.split(' ')[1]})</span>`:''}</div>
    </div>` : ''}
    ${hasTrendBlog ? `
    <div class="stat-card cyan">
      <div class="stat-num">${signStr(diffBlog)}</div>
      <div class="stat-label">블로그 리뷰 증감${periodLabel?`<br><span style="font-size:9px;font-weight:400">(${periodLabel.split(' ')[0]+' '+periodLabel.split(' ')[1]})</span>`:''}</div>
    </div>` : ''}
    <div class="stat-card yellow">
      <div class="stat-num">${p.avgRating||'-'}</div>
      <div class="stat-label">★ 평점</div>
    </div>
    <div class="stat-card">
      <div class="stat-num">${p.photoCount||0}</div>
      <div class="stat-label">등록 사진</div>
    </div>
  </div>
  `}
  <div style="margin-top:8px;padding:8px 12px;background:var(--bg-hover2);border-radius:8px;font-size:11px;color:var(--text3)">마지막 수집: ${p.crawledAt}</div>
  `;
}

function drawInsightsCharts(p) {
  if (!p || !p.trendDates) return;
  const cc = chartColors();
  const makeChart = (id, data, color) => {
    const el = document.getElementById(id);
    if (!el) return;
    new Chart(el.getContext('2d'), {
      type:'line',
      data:{
        labels: p.trendDates,
        datasets:[{ data, borderColor:color, borderWidth:2,
          backgroundColor: color + '1a',
          tension:0.4, fill:true, pointRadius:2 }]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        scales:{
          y:{ ticks:{ color:cc.ticks, maxTicksLimit:3, font:{size:9} }, grid:{ color:cc.grid } },
          x:{ ticks:{ color:cc.ticks, maxTicksLimit:5, font:{size:9} }, grid:{ display:false } }
        },
        plugins:{ legend:{display:false}, tooltip:{ mode:'index', intersect:false } }
      }
    });
  };
  makeChart('chart-review',  p.trendReview,  '#22c55e');
  makeChart('chart-blog',    p.trendBlog,    '#00d4ff');
}

/* ════ 탭: 크롤 이력 ════ */

  return `

  <div style="margin-bottom:8px;font-size:12px;color:var(--text3)">🔄 월 1회 정기 자동 실행 · 수동 실행 가능 (개요 탭 → 지금 수집)</div>
  ${logs.map(log => `
    <div style="padding:12px 14px;background:var(--bg-hover2);border:1px solid ${log.status==='error'?'rgba(239,68,68,0.3)':log.status==='warn'?'rgba(234,179,8,0.25)':'var(--border)'};border-radius:10px;margin-bottom:8px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">

      </div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px">
        ${Object.entries(log.items||{}).map(([k,v])=>`
          <span style="display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:5px;font-size:11px;font-weight:600;background:${v?'rgba(34,197,94,0.1)':'rgba(239,68,68,0.1)'};border:1px solid ${v?'rgba(34,197,94,0.25)':'rgba(239,68,68,0.25)'};color:${v?'var(--green)':'var(--red)'}">
            ${v?'✓':'✗'} ${itemLabels[k]||k}

      </div>
      ${log.note ? `<div style="font-size:11px;color:var(--yellow);display:flex;align-items:center;gap:4px">⚠️ ${log.note}</div>` : ''}

  ${logs.length === 0 ? '<div class="empty-state" style="padding:40px"><div class="empty-icon">📋</div><div class="empty-title">크롤링 이력이 없습니다</div></div>' : ''}
  <div style="margin-top:4px;padding:8px 12px;background:var(--bg-hover2);border-radius:8px;font-size:11px;color:var(--text3)">📌 이력은 최근 30일분이 보존됩니다 &nbsp;|&nbsp; 순위 크롤링은 키워드 탭에서 확인</div>
  `;
}

/* ════ 탭: 순위 상세 ════ */
function renderTabKwDetail(p) {
  const kws = p.keywords || [];
  const rankKws = kws.filter(k => k.isRankKw);   // 순위 키워드
  const workKws = kws.filter(k => !k.isRankKw);  // 작업 키워드

  // 작업 가능 여부 판단
  function isEligible(k) {
    return k.rank !== null && (k.isTopSection || k.inTop5 || k.cpcCount === 0);
  }

  // 순위 뱃지 색상
  function rankBadge(k) {
    if (k.rank === null && k.failReason)
      return `<span style="padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700;background:rgba(239,68,68,0.1);color:var(--red)">❌ 실패</span>`;
    if (k.rank === null)
      return `<span style="padding:3px 8px;border-radius:6px;font-size:11px;background:var(--bg-hover2);color:var(--text3)">미발견</span>`;
    const color = k.rank <= 3 ? 'var(--green)' : k.rank <= 10 ? 'var(--cyan)' : k.rank <= 20 ? 'var(--yellow)' : 'var(--text3)';
    return `<span style="padding:3px 8px;border-radius:6px;font-size:13px;font-weight:800;color:${color}">${k.rank}위</span>`;
  }

  function kwDetailRow(k, i) {
    const eligible = isEligible(k);
    return `
    <tr style="border-bottom:1px solid var(--border)">
      <td style="padding:10px 8px;font-size:12px;color:var(--text3);text-align:center;width:30px">${i+1}</td>
      <td style="padding:10px 8px">
        <div style="font-size:13px;font-weight:600;color:var(--text)">${k.kw}</div>
        <div style="margin-top:4px;display:flex;gap:4px;flex-wrap:wrap">
          ${k.isTopSection ? `<span style="padding:1px 6px;border-radius:4px;font-size:10px;font-weight:700;background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.3);color:var(--green)">🏆최상단</span>` : ''}
          ${k.inTop5 && !k.isTopSection ? `<span style="padding:1px 6px;border-radius:4px;font-size:10px;font-weight:700;background:rgba(var(--cyan-rgb),0.12);border:1px solid rgba(var(--cyan-rgb),0.3);color:var(--cyan)">TOP5</span>` : ''}
          ${typeof k.cpcCount === 'number' && k.cpcCount > 0
            ? `<span style="padding:1px 6px;border-radius:4px;font-size:10px;font-weight:700;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);color:var(--red)">💰CPC ${k.cpcCount}개</span>`
            : k.rank !== null ? `<span style="padding:1px 6px;border-radius:4px;font-size:10px;background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.2);color:var(--green)">CPC없음</span>` : ''}
          ${eligible ? `<span style="padding:1px 6px;border-radius:4px;font-size:10px;font-weight:700;background:rgba(var(--cyan-rgb),0.08);border:1px solid rgba(var(--cyan-rgb),0.2);color:var(--cyan)">✅작업가능</span>` : ''}
        </div>
      </td>
      <td style="padding:10px 8px;text-align:center">${rankBadge(k)}</td>
      <td style="padding:10px 8px;text-align:center;font-size:11px;color:var(--text3)">
        ${k.prevRank ? `<span style="color:${k.rank < k.prevRank ? 'var(--green)' : 'var(--red)'}">${k.rank < k.prevRank ? '▲' : '▼'}${Math.abs(k.rank - k.prevRank)}</span>` : '–'}
      </td>
      <td style="padding:10px 8px;text-align:center;font-size:11px;color:var(--text3)">${k.checkedAt || '–'}</td>
    </tr>`;
  }

  return `
  <!-- 요약 카드 -->
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px">
    <div style="padding:10px 12px;background:rgba(var(--cyan-rgb),0.06);border:1px solid rgba(var(--cyan-rgb),0.2);border-radius:8px;text-align:center">
      <div style="font-size:22px;font-weight:800;color:var(--cyan)">${rankKws.length}</div>
      <div style="font-size:11px;color:var(--text3);margin-top:2px">순위 키워드</div>
    </div>
    <div style="padding:10px 12px;background:rgba(34,197,94,0.06);border:1px solid rgba(34,197,94,0.2);border-radius:8px;text-align:center">
      <div style="font-size:22px;font-weight:800;color:var(--green)">${rankKws.filter(isEligible).length}</div>
      <div style="font-size:11px;color:var(--text3);margin-top:2px">작업 가능</div>

function drawMiniChart() {
  if (activeTab !== 'overview') return;
  const el = document.getElementById('miniChart');
  if (!el) return;
  const p = selectedPlace();
  if (!p) return;
  const primKw = p.keywords.find(k=>k.isRankKw);
  if (!primKw) return;
  const cc = chartColors();
  new Chart(el.getContext('2d'), {
    type:'line',
    data:{
      labels: Array.from({length:15},(_,i)=>`${i+1}`),
      datasets:[{
        data: primKw.rankHistory,
        borderColor:'#00d4ff', borderWidth:2,

    options:{
      responsive:true, maintainAspectRatio:false,
      scales:{
        y:{ reverse:true, min:1, ticks:{ color:cc.ticks, maxTicksLimit:4 }, grid:{ color:cc.grid } },

function drawKwCharts() {
  const p = selectedPlace();
  if (!p) return;
  const cc = chartColors();
  p.keywords.forEach(k => {
    const el = document.getElementById(`spark-${k.id}`);
    if (!el) return;
    // null값 필터 - 유효한 데이터만 사용
    const validData = (k.rankHistory || []).map(v => (v === null || v === undefined) ? null : v);
    const hasData = validData.some(v => v !== null);
    if (!hasData) return;
    new Chart(el.getContext('2d'), {
      type:'line',
      data:{
        labels: Array.from({length:15},(_,i)=>`${i}`),
        datasets:[{
          data: validData,
          borderColor: k.isRankKw ? '#00d4ff' : '#22c55e',
          borderWidth:1.5, pointRadius:0, tension:0.4,
          fill:false, spanGaps: false
        }]
      },
      options:{
        responsive:false, animation:false,
        scales:{
          y:{ reverse:true, display:false },
          x:{ display:false }
        },
        plugins:{ legend:{display:false}, tooltip:{enabled:false} }
      }
    });
  });
}

function switchTab(tab, placeId) {
  activeTab = tab;
  const p = places.find(pl => pl.id === placeId);
  if (!p) return;
  document.getElementById('tab-content').innerHTML = renderTabContent(p);
  // 탭 버튼 active 상태 갱신
  document.querySelectorAll('.detail-tab').forEach(btn => {
    const t = btn.getAttribute('onclick').match(/'([^']+)'/)?.[1];
    btn.classList.toggle('active', t === tab);
  });
  setTimeout(() => {
    if (tab === 'overview')  drawMiniChart();
    if (tab === 'keywords')  { drawKwCharts(); initWorkKwDrag(); }
    if (tab === 'insights')  drawInsightsCharts(p);
  }, 100);
}

function selectPlace(id) {
  selectedId = id;
  activeTab = 'overview';
  renderPage();
}

async function startCrawl(id) {
  const p = places.find(pl => pl.id === id);
  if (!p) return;
  if (!p.naverPlaceId) return toast('플레이스 ID가 없습니다', 'error');

  p.crawlStatus = 'warn';
  p.crawledAt = '수집 중...';
  renderPage();
  toast(`[${p.name}] 파서로 정보를 수집합니다 🔄`, 'info');

  // 파서 API 전체 파싱 재실행
  await _runFullParse(id, p.naverUrl || `https://m.place.naver.com/restaurant/${p.naverPlaceId}`, p.naverPlaceId);
}

function deletePlace(id) {
  if (!confirm('플레이스를 삭제하시겠습니까?')) return;
  places = places.filter(p => p.id !== id);
  if (selectedId === id) selectedId = places[0]?.id || null;
  activeTab = 'overview';
  renderPage();
  toast('플레이스가 삭제되었습니다', 'success');
}

function deleteKw(id) {
  const p = selectedPlace();

  p.keywords = p.keywords.filter(k => k.id !== id);
  const tab = document.getElementById('tab-content');
  if (tab) tab.innerHTML = renderTabContent(p);

}

/* ═══════════════════════════════════════
   URL 파싱 유틸리티
   지원 패턴:
   1) https://map.naver.com/v5/entry/place/1234567
   2) https://map.naver.com/v5/entry/place/1234567?...
   3) https://map.naver.com/p/entry/place/1234567
   4) https://m.place.naver.com/restaurant/1138220842
   5) https://m.place.naver.com/restaurant/1138220842/home
   6) https://m.place.naver.com/cafe/1138220842
   7) https://place.naver.com/restaurant/1138220842  (기타 카테고리)
   8) 숫자만 입력해도 인식 (ID 직접 입력)
═══════════════════════════════════════ */
function parseNaverPlaceUrl(input) {
  if (!input) return null;
  const s = input.trim();

  // ① 숫자만 입력 → 그대로 ID로 취급
  if (/^\d+$/.test(s)) {
    return { id: s, canonicalUrl: `https://map.naver.com/v5/entry/place/${s}`, type: 'id' };
  }

  // ② map.naver.com/.../place/{id}
  const mapMatch = s.match(/map\.naver\.com\/(?:v5\/|p\/)?entry\/place\/(\d+)/);
  if (mapMatch) {
    return { id: mapMatch[1], canonicalUrl: `https://map.naver.com/v5/entry/place/${mapMatch[1]}`, type: 'map' };
  }

  // ③ m.place.naver.com/{category}/{id} 또는 place.naver.com/{category}/{id}
  const mPlaceMatch = s.match(/(?:m\.)?place\.naver\.com\/[^/]+\/(\d+)/);
  if (mPlaceMatch) {
    return { id: mPlaceMatch[1], canonicalUrl: `https://map.naver.com/v5/entry/place/${mPlaceMatch[1]}`, type: 'mplace' };
  }

  return null; // 인식 불가
}

/* ── 기본 정보 탭: 네이버 URL 인라인 수정 ── */
function editNaverUrl(placeId) {
  const p = places.find(pl => pl.id === placeId);
  if (!p) return;
  const newInput = prompt(
    '새 네이버 플레이스 URL 또는 ID를 입력하세요:\n(예: https://map.naver.com/v5/entry/place/1234567)',
    p.naverUrl || ''
  );
  if (newInput === null) return; // 취소
  const parsed = parseNaverPlaceUrl(newInput.trim());
  if (!parsed) {
    alert('인식할 수 없는 URL입니다.\n네이버 플레이스 URL 또는 플레이스 ID를 입력해 주세요.');
    return;
  }
  p.naverUrl      = `https://map.naver.com/v5/entry/place/${parsed.id}`;
  p.naverPlaceId  = parsed.id;
  renderPage();
  toast('네이버 플레이스 URL이 업데이트되었습니다', 'success');
}


/* URL 입력 시: 1) 형식 검증 → 2) 파서 API 미리보기 호출 */
let _previewDebounce = null;
function previewUrlParse(val) {
  const el = document.getElementById('url-parse-preview');
  const resultEl = document.getElementById('parser-preview-result');
  const fullEl = document.getElementById('parser-full-preview');
  const hintEl = document.getElementById('parser-fetch-hint');
  if (!el) return;

  _parserPreviewData = null;
  if (resultEl) resultEl.innerHTML = '';
  if (fullEl) { fullEl.style.display = 'none'; fullEl.innerHTML = ''; }

  if (!val.trim()) {
    el.innerHTML = '';
    if (hintEl) hintEl.style.display = '';
    return;
  }

  const result = parseNaverPlaceUrl(val);
  if (!result) {
    el.innerHTML = `
      <div style="display:flex;align-items:center;gap:6px;padding:7px 10px;background:rgba(var(--red-rgb,239,68,68),0.08);border:1px solid rgba(var(--red-rgb,239,68,68),0.25);border-radius:7px">
        <span style="color:var(--red);font-size:14px">✗</span>
        <div style="font-size:12px;color:var(--red)">인식할 수 없는 URL 형식입니다</div>
      </div>`;
    return;
  }

  // URL 형식 OK → 파서 API 미리보기 호출 (디바운스 800ms)
  el.innerHTML = `
    <div style="display:flex;align-items:center;gap:6px;padding:7px 10px;background:rgba(var(--green-rgb,34,197,94),0.08);border:1px solid rgba(var(--green-rgb,34,197,94),0.25);border-radius:7px">
      <span style="color:var(--green);font-size:14px">✓</span>
      <div>
        <div style="font-size:12px;color:var(--green);font-weight:600">플레이스 ID 인식됨: <strong>${result.id}</strong></div>
        <div style="font-size:11px;color:var(--text3);margin-top:1px">네이버에서 정보를 가져오는 중...</div>
      </div>
    </div>`;

  if (hintEl) hintEl.style.display = 'none';

  clearTimeout(_previewDebounce);
  _previewDebounce = setTimeout(() => _fetchParserPreview(val, result.id, el), 800);
}

async function _fetchParserPreview(url, placeId, statusEl) {
  const resultEl = document.getElementById('parser-preview-result');
  const fullEl   = document.getElementById('parser-full-preview');
  const catEl    = document.getElementById('place-category');
  const aliasEl  = document.getElementById('place-alias');

  try {
    const res = await fetch(`${PARSER_API}/api/parse/preview`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    const d = json.data;
    _parserPreviewData = d;

    // 상태 배지 업데이트
    if (statusEl) statusEl.innerHTML = `
      <div style="display:flex;align-items:center;gap:6px;padding:7px 10px;background:rgba(var(--green-rgb,34,197,94),0.08);border:1px solid rgba(var(--green-rgb,34,197,94),0.25);border-radius:7px">
        <span style="color:var(--green);font-size:14px">✓</span>
        <div>
          <div style="font-size:12px;color:var(--green);font-weight:600">플레이스 ID: <strong>${placeId}</strong> — 정보 수집 완료</div>
          <div style="font-size:11px;color:var(--text3);margin-top:1px">표준 URL: https://map.naver.com/v5/entry/place/${placeId}</div>
        </div>
      </div>`;

    // 카테고리·별칭 자동 채움
    if (catEl) catEl.value = d.category || '';
    if (aliasEl && !aliasEl.value) aliasEl.placeholder = d.name || '자동 입력됨';

    // 미리보기 카드 표시
    const kwBadges = (d.keyword_list||[]).map(k =>
      `<span style="padding:2px 8px;background:rgba(var(--cyan-rgb),0.1);border:1px solid rgba(var(--cyan-rgb),0.2);border-radius:12px;font-size:11px;color:var(--cyan)">${k}</span>`
    ).join('');

    if (fullEl) {
      fullEl.style.display = '';
      fullEl.innerHTML = `
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
          <span style="font-size:20px">🏪</span>
          <div>
            <div style="font-size:14px;font-weight:700;color:var(--text-title)">${d.name}</div>
            <div style="font-size:11px;color:var(--text3)">${d.category}</div>
          </div>
        </div>
        <div style="font-size:12px;color:var(--text2);line-height:2">
          📍 ${d.roadAddress || d.address || '–'}<br>
          📞 ${d.phone || '–'}<br>
          💬 영수증 리뷰 <strong style="color:var(--cyan)">${(d.visitor_review_count||0).toLocaleString()}건</strong>
           &nbsp; 블로그 리뷰 <strong style="color:var(--cyan)">${(d.blog_review_total||0).toLocaleString()}건</strong>
        </div>
        ${kwBadges ? `<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:8px">${kwBadges}</div>` : ''}
        <div style="margin-top:8px;font-size:11px;color:var(--text3)">
          ℹ️ 등록 버튼 클릭 시 메뉴·리뷰 전체 파싱이 추가로 실행됩니다 (약 10~20초)
        </div>`;
    }

  } catch(e) {
    console.warn('파서 API 미리보기 실패:', e);
    if (statusEl) statusEl.innerHTML = `
      <div style="display:flex;align-items:center;gap:6px;padding:7px 10px;background:rgba(var(--green-rgb,34,197,94),0.08);border:1px solid rgba(var(--green-rgb,34,197,94),0.25);border-radius:7px">
        <span style="color:var(--green);font-size:14px">✓</span>
        <div>
          <div style="font-size:12px;color:var(--green);font-weight:600">플레이스 ID 인식됨: <strong>${placeId}</strong></div>
          <div style="font-size:11px;color:#f87171;margin-top:1px">⚠️ 파서 API 연결 실패 — 등록 후 수동 크롤링 필요</div>
        </div>
      </div>`;
    if (document.getElementById('parser-fetch-hint')) {
      document.getElementById('parser-fetch-hint').style.display = '';
    }
  }
}

async function addPlace() {
  const rawUrl  = document.getElementById('place-url').value.trim();
  const alias   = document.getElementById('place-alias').value.trim();
  if (!rawUrl) return toast('URL을 입력해 주세요', 'error');

  const parsed = parseNaverPlaceUrl(rawUrl);
  if (!parsed) return toast('인식할 수 없는 URL입니다. 네이버 플레이스 URL을 확인해 주세요.', 'error');

  const preview = _parserPreviewData;
  const newId   = Math.max(...places.map(p => p.id), 0) + 1;
  const now     = new Date().toISOString().slice(0,16).replace('T',' ');

  const newPlace = _buildNewPlace(newId, rawUrl, parsed, preview, now);
  if (alias && !preview) newPlace.name = alias;

  // 단건 작업 키워드 등록
  const kwRaw    = (document.getElementById('single-kw-input')?.value || '').trim();
  const kwIsRank = document.getElementById('single-kw-rank')?.checked || false;
  if (kwRaw) {
    const kwList = parseKeywordInput(kwRaw);
    kwList.forEach(kw => {
      const kid = Math.max(...newPlace.keywords.map(k=>k.id), 0) + 1;
      newPlace.keywords.push(_buildKeyword(kid, kw, kwIsRank));
    });
  }

  places.push(newPlace);
  closeModal('modal-add-place');
  _parserPreviewData = null;

  selectedId = newId;
  activeTab = 'overview';
  renderPage();
  const kwMsg = newPlace.keywords.length > 0 ? ` (작업 키워드 ${newPlace.keywords.length}개)` : '';
  toast(`"${newPlace.name}" 등록 완료${kwMsg}! 전체 정보 수집 중... 🔄`, 'success');

  _runFullParse(newId, rawUrl, parsed.id);
}

   엑셀 업로드 기능

let _excelRows = []; // 파싱된 엑셀 행 데이터

/* 드래그 이벤트 */
function excelDragOver(e) {
  e.preventDefault();
  const z = document.getElementById('excel-drop-zone');
  if (z) { z.style.borderColor = 'var(--cyan)'; z.style.background = 'rgba(var(--cyan-rgb),0.06)'; }
}
function excelDragLeave(e) {
  const z = document.getElementById('excel-drop-zone');
  if (z) { z.style.borderColor = 'var(--border)'; z.style.background = ''; }
}
function excelDrop(e) {
  e.preventDefault();
  excelDragLeave(e);
  const file = e.dataTransfer?.files?.[0];
  if (file) handleExcelFile(file);
}

/* 파일 핸들러 */
function handleExcelFile(file) {
  if (!file) return;
  if (!window.XLSX) return toast('엑셀 라이브러리 로딩 중입니다. 잠시 후 다시 시도해 주세요.', 'error');

  const ext = file.name.split('.').pop().toLowerCase();
  if (!['xlsx','xls'].includes(ext)) return toast('.xlsx 또는 .xls 파일만 지원합니다', 'error');

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const wb   = XLSX.read(data, { type: 'array' });
      const ws   = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });

      // 첫 행이 헤더인지 판단: 첫 셀이 URL 형식이 아니면 헤더로 간주
      let dataRows = rows;
      if (rows.length > 0) {
        const firstCell = String(rows[0][0] || '').trim();
        if (!firstCell.startsWith('http')) dataRows = rows.slice(1);
      }

      _excelRows = dataRows
        .map(row => {
          const url     = String(row[0] || '').trim();
          const parsed  = url.startsWith('http') ? parseNaverPlaceUrl(url) : null;
          const keywords = [];
          for (let i = 1; i < row.length; i++) {
            const cell = String(row[i] || '').trim();
            if (cell) {
              // 셀 내부에 쉼표 포함 가능
              parseKeywordInput(cell).forEach(kw => { if (!keywords.includes(kw)) keywords.push(kw); });
            }
          }
          return { url, parsed, keywords };
        })
        .filter(r => r.url);

      renderExcelPreview();
    } catch (err) {
      console.error(err);
      toast('엑셀 파일 읽기 오류: ' + err.message, 'error');
    }
  };
  reader.readAsArrayBuffer(file);
}

/* 미리보기 렌더 */
function renderExcelPreview() {
  const preview = document.getElementById('excel-preview');
  const table   = document.getElementById('excel-preview-table');
  const title   = document.getElementById('excel-preview-title');
  if (!preview || !table) return;

  const valid   = _excelRows.filter(r => r.parsed);
  const invalid = _excelRows.length - valid.length;

  if (!_excelRows.length) { preview.style.display = 'none'; return; }

  if (title) title.textContent = `파싱 결과 — ${valid.length}개 플레이스${invalid ? ` (인식불가 ${invalid}개)` : ''}`;

  const rows = _excelRows.map((r, i) => {
    const ok    = !!r.parsed;
    const bg    = ok ? '' : 'background:rgba(248,113,113,0.08)';
    const idStr = ok ? `<span style="color:var(--cyan)">${r.parsed.id}</span>` : '<span style="color:#f87171">인식 불가</span>';
    const kwStr = r.keywords.length
      ? `<span style="color:#a78bfa;font-size:11px">${r.keywords.slice(0,4).join(', ')}${r.keywords.length>4?' …':''}</span>`
      : '<span style="color:var(--text3);font-size:11px">–</span>';
    return `<tr style="${bg}">
      <td style="padding:5px 8px;font-size:11px;color:var(--text3);border-bottom:1px solid var(--border)">${i+1}</td>
      <td style="padding:5px 8px;font-size:11px;word-break:break-all;border-bottom:1px solid var(--border)">${idStr}</td>
      <td style="padding:5px 8px;font-size:11px;border-bottom:1px solid var(--border)">${kwStr}</td>
    </tr>`;
  }).join('');

  table.innerHTML = `
    <table style="width:100%;border-collapse:collapse">
      <thead><tr style="position:sticky;top:0;background:var(--bg-hover2)">
        <th style="padding:5px 8px;font-size:11px;text-align:left;color:var(--text3)">#</th>
        <th style="padding:5px 8px;font-size:11px;text-align:left;color:var(--text3)">플레이스 ID</th>
        <th style="padding:5px 8px;font-size:11px;text-align:left;color:var(--text3)">키워드</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  preview.style.display = 'block';
}

/* ── 대량 입력 파싱: URL 뒤 줄들이 키워드 ── */
function parseBulkEntries(raw) {
  const lines = raw.split('\n').map(l => l.trim());
  const entries = [];
  let current = null;
  for (const line of lines) {
    if (!line) { current = null; continue; }
    if (line.startsWith('http')) {
      current = { url: line, parsed: parseNaverPlaceUrl(line), keywords: [] };
      entries.push(current);
    } else if (current) {
      // URL 다음 줄 = 키워드 (쉼표/줄바꿈 모두 인식)
      const kws = parseKeywordInput(line);
      current.keywords.push(...kws);
    }
  }
  return entries;
}

/* ── URL만 추출 (하위 호환) ── */
function parseBulkUrls(raw) {
  return parseBulkEntries(raw).filter(e=>e.parsed).map(e=>e.url);
}
