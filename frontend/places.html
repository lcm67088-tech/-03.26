/* ── 플레이스 객체 생성 공통 함수 ── */
/* ── 키워드 입력 파싱 (쉼표/줄바꿈 모두 인식) ── */
function parseKeywordInput(raw) {
  return raw.split(/[\n,，]/)
    .map(k => k.trim())
    .filter(k => k.length > 0)
    .filter((k, i, arr) => arr.indexOf(k) === i);
}

/* ── 키워드 객체 생성 공통 함수 ── */
function _buildKeyword(id, kw, isRankKw) {
  const mockRank = Math.floor(Math.random()*30)+1;
  return {
    id, kw, rank: mockRank, prev: null, isRankKw,
    sortOrder: 0,
    rankHistory: Array.from({length:15}, () => Math.floor(Math.random()*20)+1),
    isTopSection: Math.random() > 0.4,
    cpcCount: Math.floor(Math.random()*4),
    inTop5: mockRank <= 5,
    lastChecked: new Date().toISOString().slice(0,16).replace('T',' ')
  };
}

/* ── 단건 키워드 카운터 ── */
function updateSingleKwCount() {
  const raw = document.getElementById('single-kw-input')?.value?.trim() || '';
  const el  = document.getElementById('single-kw-count');
  if (!el) return;
  el.textContent = raw ? `${parseKeywordInput(raw).length}개` : '0개';
}

function _buildNewPlace(newId, rawUrl, parsed, preview, now) {
  return {
    id: newId,
    name: (preview && preview.name) || `새 플레이스 ${newId}`,
    category: (preview && preview.category) || '–',
    naverUrl: `https://map.naver.com/v5/entry/place/${parsed.id}`,
    naverPlaceId: parsed.id,
    status: 'active',
    crawledAt: now,
    crawlStatus: preview ? 'ok' : 'warn',
    address: (preview && preview.address) || '',
    roadAddress: (preview && preview.roadAddress) || '',
    phone: (preview && preview.phone) || '',
    homepage: '',
    introduction: (preview && preview.introduction) || '',
    repKeywords: (preview && preview.keyword_list) || [],
    x: (preview && preview.x) || '',
    y: (preview && preview.y) || '',
    staticMapUrl: (preview && preview.static_map_url) || '',
    reviewCount: (preview && preview.visitor_review_count) || 0,
    reviewCountPrev: 0, avgRating: 0,
    blogReviewCount: (preview && preview.blog_review_total) || 0,
    blogReviewPrev: 0,
    savedCount: 0, savedCountPrev: 0,
    visitorMonthly: 0, visitorPrev: 0, photoCount: 0,
    trendDates:[], trendReview:[], trendSaved:[], trendVisitor:[], trendBlog:[],
    adPowerLink:false, adPlaceAd:false, adPowerLinkKeywords:[],
    adBudgetMonthly:0, adClickEstimate:0, adLastChecked:'–',
    crawlLogs: [{
      ts: now, status: preview ? 'ok' : 'warn',
      items: { basic: !!preview, hours: false, menu: false, review: false, photos: false, keywords: !!preview },
      note: preview ? '등록 시 기본정보 파서로 수집' : '파서 미리보기 없이 등록'
    }],
    menus: [], keywords: [], recentReviews: [], blogReviews: [], photos: [],
    parserData: preview || null,
  };
}

async function _runFullParse(placeId, url, naverId) {
  const p = places.find(pl => pl.id === placeId);
  if (!p) return;

  try {
    const res = await fetch(`${PARSER_API}/api/parse`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        url,
        delay: 0.4,
        fetch_blog_content: true,   // 블로그 원문 2차 파싱 활성화
        max_visitor_reviews: 100,
        max_blog_reviews: 100,
        max_photos: 200,
      }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    const d = json.data;

    // place 객체 업데이트
    const now = new Date().toISOString().slice(0,16).replace('T',' ');

    // 파서 응답에서 place_id 확보 → naverUrl 항상 표준 map.naver.com 형식으로 고정
    const parsedId = d.mid || d.place_id || d.id || naverId || p.naverPlaceId;
    if (parsedId) {
      p.naverPlaceId = String(parsedId);
      p.naverUrl     = `https://map.naver.com/v5/entry/place/${parsedId}`;
    }

    p.name            = d.name || p.name;  // 항상 파싱된 업체명 우선
    p.category        = d.category || p.category;
    p.address         = d.address || p.address;
    p.roadAddress     = d.roadAddress || p.roadAddress || '';
    p.phone           = d.phone || p.phone;
    p.introduction    = d.introduction || p.introduction;
    p.repKeywords     = d.keyword_list || p.repKeywords;
    p.x               = d.x || p.x;
    p.y               = d.y || p.y;
    p.staticMapUrl    = d.static_map_url || p.staticMapUrl;
    p.reviewCount     = d.visitor_review_count || p.reviewCount;
    p.blogReviewCount = d.blog_review_total || p.blogReviewCount;
    p.crawledAt       = now;
    p.crawlStatus     = d.error ? 'warn' : 'ok';
    p.parserData      = d;

    // 메뉴 변환 (파서 → 화면 형식)
    p.menus = (d.menus || []).map(m => ({
      name:      m.name,
      price:     m.price || '가격 미정',
      highlight: m.recommend,
      images:    m.images || [],
      desc:      m.description || '',
    }));

    // 영수증 리뷰 변환 (v3.0: rating 포함)
    p.recentReviews = (d.visitor_reviews || []).map(r => ({
      stars:   r.rating || 5,
      author:  r.author || '익명',
      date:    r.visited || r.created || '',
      text:    r.body || '',
      images:  r.images || [],
      item:    r.item || '',
      tags:    r.tags || [],
    }));

    // 블로그 리뷰 변환 (2차 파싱: full_text + full_images 포함)
    p.blogReviews = (d.blog_reviews || []).map(b => ({
      type:       b.type,
      url:        b.url,
      title:      b.title,
      author:     b.authorName,
      date:       b.date,
      thumbnails: b.thumbnails || [],
      // contents: 2차 파싱 시 full_text 우선, 없으면 기존 contents
      contents:   (b.full_text && b.full_text.length > 10) ? b.full_text : (b.contents || ''),
      // fullImages: 2차 파싱으로 수집된 전체 이미지
      fullImages: b.full_images || [],
      rank:       b.rank,
    }));

    // 영업시간 변환 (v3.0 신규)
    const bh = d.business_hours || {};
    p.businessHours = {
      status:      bh.status || '',
      description: bh.description || '',
      days:        (bh.days || []).map(dy => ({
        day:        dy.day,
        open:       dy.open,
        close:      dy.close,
        breakStart: dy.break_start,
        breakEnd:   dy.break_end,
        lastOrder:  dy.last_order,
        closed:     dy.closed,
      })),
      regularClosed: bh.regular_closed || '',
      freeText:      bh.free_text || '',
    };

    // 편의시설 (v3.0 신규)
    p.conveniences = d.conveniences || [];

    // 사진 (v3.0 신규)
    p.photos = (d.photos || []).map(ph => ({
      rank:        ph.rank,
      originalUrl: ph.originalUrl,
      imgUrl:      ph.imgUrl,
      title:       ph.title,
      section:     ph.section,
      date:        ph.date,
      link:        ph.link,
      authorName:  ph.authorName,
    }));

    p.crawlLogs.unshift({
      ts: now, status: d.error ? 'warn' : 'ok',
      items: {
        basic: true, menu: p.menus.length > 0,
        review: p.recentReviews.length > 0,
        blog: p.blogReviews.length > 0,
        keywords: p.repKeywords.length > 0,
        hours: !!(p.businessHours && p.businessHours.days && p.businessHours.days.length),
        photos: p.photos.length > 0,
      },
      note: `파서 수집 완료 — 메뉴 ${p.menus.length}개, 영수증리뷰 ${p.recentReviews.length}건, 블로그 ${p.blogReviews.length}건, 사진 ${p.photos.length}장`,
    });

    renderPage();
    toast(`"${p.name}" 전체 정보 수집 완료 ✅ (메뉴 ${p.menus.length}개, 리뷰 ${p.recentReviews.length}건, 사진 ${p.photos.length}장)`, 'success');

  } catch(e) {
    console.warn('전체 파싱 실패:', e);
    const p2 = places.find(pl => pl.id === placeId);
    if (p2) {
      p2.crawlStatus = 'warn';
      p2.crawlLogs.unshift({
        ts: new Date().toISOString().slice(0,16).replace('T',' '),
        status: 'error',
        items: { basic: true },
        note: `파서 연결 실패: ${e.message}`,
      });
      renderPage();
    }
    toast('전체 정보 수집 실패 — 파서 API 상태를 확인해 주세요', 'warn');
  }
}

function addKeyword() {
  const raw = document.getElementById('kw-input').value.trim();
  // kw-primary는 이제 hidden input으로 value가 'true'/'false' 문자열
  const isRankKw = document.getElementById('kw-primary').value === 'true';
  if (!raw) return toast('키워드를 입력해 주세요', 'error');

  const p = selectedPlace();
  if (!p) return;

  const kwList = parseKeywordInput(raw);
  if (!kwList.length) return toast('유효한 키워드가 없습니다', 'error');

  // 순위키 3개 제한
  if (isRankKw) {
    const currentRankKws = p.keywords.filter(k => k.isRankKw);
    const slotsLeft = 3 - currentRankKws.length;
    if (slotsLeft <= 0) return toast('순위 키워드는 최대 3개까지 등록 가능합니다', 'error');
    if (kwList.length > slotsLeft) {
      toast(`순위 키워드는 ${slotsLeft}개만 더 추가 가능합니다. 앞에서부터 ${slotsLeft}개만 추가합니다.`, 'warn');
    }
  }

  const remaining = 100 - p.keywords.length;
  if (remaining <= 0) return toast('키워드는 최대 100개까지 등록 가능합니다', 'error');

  const maxAdd = isRankKw ? Math.min(kwList.length, 3 - p.keywords.filter(k=>k.isRankKw).length, remaining) : remaining;
  const toAdd   = kwList.slice(0, maxAdd);
  const skipped = kwList.length - toAdd.length;

  const existingKws = new Set(p.keywords.map(k => k.kw));
  const dupes  = toAdd.filter(k => existingKws.has(k));
  const newKws = toAdd.filter(k => !existingKws.has(k));

  const currentWorkCount = p.keywords.filter(k => !k.isRankKw).length;
  for (const kw of newKws) {
    const newId = Math.max(...p.keywords.map(k=>k.id), 0) + 1;
    const kwObj = _buildKeyword(newId, kw, isRankKw);
    if (!isRankKw) kwObj.sortOrder = currentWorkCount + newKws.indexOf(kw);
    p.keywords.push(kwObj);
  }

  closeModal('modal-add-keyword');
  activeTab = 'keywords';
  const tab = document.getElementById('tab-content');
  if (tab) {
    tab.innerHTML = renderTabContent(p);
    document.querySelectorAll('.detail-tab').forEach(btn => {
      const t = btn.getAttribute('onclick').match(/'([^']+)'/)?.[1];
      btn.classList.toggle('active', t === 'keywords');
    });
    setTimeout(() => { drawKwCharts(); initWorkKwDrag(); }, 80);
  } else { renderPage(); }

  // 결과 토스트
  let msg = `${isRankKw ? '순위' : '작업'} 키워드 ${newKws.length}개 추가 완료`;
  if (dupes.length > 0) msg += ` (중복 ${dupes.length}개 생략)`;
  if (skipped > 0) msg += ` (한도 초과 ${skipped}개 생략)`;
  toast(msg, 'success');
}

function initWorkKwDrag() {
  const list = document.getElementById('work-kw-list');
  if (!list) return;
  let dragSrc = null;

  list.querySelectorAll('.work-kw-item').forEach(item => {
    item.addEventListener('dragstart', e => {
      dragSrc = item;
      e.dataTransfer.effectAllowed = 'move';
      item.style.opacity = '0.5';
    });
    item.addEventListener('dragend', () => {
      item.style.opacity = '1';
      list.querySelectorAll('.work-kw-item').forEach(i => i.style.background = '');
    });
    item.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      item.style.background = 'rgba(34,197,94,0.08)';
    });
    item.addEventListener('dragleave', () => { item.style.background = ''; });
    item.addEventListener('drop', e => {
      e.preventDefault();
      item.style.background = '';
      if (dragSrc === item) return;
      const items = [...list.querySelectorAll('.work-kw-item')];
      const srcIdx = items.indexOf(dragSrc);
      const tgtIdx = items.indexOf(item);
      if (srcIdx < tgtIdx) list.insertBefore(dragSrc, item.nextSibling);
      else list.insertBefore(dragSrc, item);
      // sortOrder 업데이트
      const p = selectedPlace();
      if (!p) return;
      list.querySelectorAll('.work-kw-item').forEach((el, idx) => {
        const kwId = parseInt(el.dataset.kwid);
        const kw = p.keywords.find(k => k.id === kwId);
        if (kw) kw.sortOrder = idx;
      });
    });
  });
}

/* 지역키 추출 (주소에서 행정구역 파싱) */
function extractRegionKeys(addr) {
  if (!addr) return [];
  const parts = [];
  // 시/도 레벨
  const city = addr.match(/([가-힣]+시|[가-힣]+도)/)?.[1];
  // 구/군 레벨
  const gu = addr.match(/([가-힣]+구|[가-힣]+군)/)?.[1];
  // 동/읍/면 레벨
  const dong = addr.match(/([가-힣]+동|[가-힣]+읍|[가-힣]+면)/)?.[1];

  if (gu) parts.push(gu.replace(/시$|도$/,''));  // 강남구 → 강남
  if (dong) parts.push(dong);
  if (city && !parts.some(p => city.includes(p))) {
    const cityShort = city.replace(/특별시|광역시|특별자치시|특별자치도|도$/,'');
    if (cityShort.length >= 2) parts.push(cityShort);
  }
  return [...new Set(parts)].filter(p => p.length >= 2);
}

/* 메뉴키 추출 (메뉴명 토큰화 + 중복 제거) */
function extractMenuKeys(menus) {
  const tokens = new Set();
  menus.forEach(m => {
    const name = m.name || '';
    // 전체 메뉴명
    if (name.length >= 2 && name.length <= 10) tokens.add(name);
    // 공백으로 분리
    name.split(/\s+/).forEach(t => {
      if (t.length >= 2 && t.length <= 8 && /[가-힣]/.test(t)) tokens.add(t);
    });
  });
  // 다른 메뉴에 포함된 토큰은 유지 (교차 검증)
  return [...tokens].slice(0, 10);
}

/* 업종키 추출 (카테고리 기반 — 단순 업종어만, 공백 포함 복합어 제외) */
function extractIndustryKeys(repKws, category) {
  // 카테고리 → 업종키 매핑 (검색어 맨 끝에 붙는 단어 기준)
  const CATEGORY_MAP = [
    // 음식
    { keys: ['한식', '백반', '한정식', '분식'],  vals: ['맛집', '한식당', '밥집'] },
    { keys: ['일식', '초밥', '라멘', '돈카츠'],  vals: ['맛집', '일식당', '식당'] },
    { keys: ['중식', '짜장', '짬뽕'],            vals: ['맛집', '중식당', '중국집'] },
    { keys: ['양식', '파스타', '피자', '버거'],  vals: ['맛집', '양식당', '레스토랑'] },
    { keys: ['치킨', '닭갈비', '닭볶음'],        vals: ['맛집', '치킨집'] },
    { keys: ['고기', '삼겹살', '소고기', '갈비'],vals: ['맛집', '고깃집', '고기집'] },
    { keys: ['카페', '커피', '디저트'],          vals: ['카페', '커피숍'] },
    { keys: ['술', '포차', '호프', '이자카야'],  vals: ['술집', '맛집', '포차'] },
    { keys: ['해산물', '회', '횟집', '조개'],    vals: ['맛집', '횟집', '해산물식당'] },
    // 뷰티
    { keys: ['미용', '헤어', '살롱'],            vals: ['미용실', '헤어샵'] },
    { keys: ['피부', '에스테틱', '왁싱'],        vals: ['피부관리', '피부샵'] },
    { keys: ['네일'],                            vals: ['네일샵', '네일아트'] },
    { keys: ['속눈썹', '아이래쉬'],              vals: ['속눈썹샵'] },
    // 의료
    { keys: ['피부과'],                          vals: ['피부과'] },
    { keys: ['한의원', '한방'],                  vals: ['한의원'] },
    { keys: ['치과'],                            vals: ['치과'] },
    { keys: ['정형외과', '재활'],                vals: ['정형외과', '재활의학과'] },
    // 운동·레저
    { keys: ['헬스', '피트니스', 'PT', '트레이닝'], vals: ['헬스장', 'PT'] },
    { keys: ['요가', '필라테스'],                vals: ['요가학원', '필라테스'] },
    { keys: ['수영', '수영장'],                  vals: ['수영장'] },
    // 교육
    { keys: ['학원', '과외', '교습'],            vals: ['학원'] },
    { keys: ['영어', '수학', '국어'],            vals: ['학원', '과외'] },
    // 기타 서비스
    { keys: ['세탁', '드라이'],                  vals: ['세탁소'] },
    { keys: ['반려', '강아지', '고양이', '펫'],   vals: ['애견샵', '동물병원'] },
    { keys: ['숙박', '호텔', '게스트하우스'],     vals: ['호텔', '숙소'] },
  ];

  const result = new Set();

  // 카테고리 문자열로 매핑
  for (const entry of CATEGORY_MAP) {
    if (entry.keys.some(k => category.includes(k))) {
      entry.vals.forEach(v => result.add(v));
    }
  }

  // 대표키에서 단일 토큰(공백 없는 순수 업종어)만 추출
  // — 공백 포함 문자열(지역+업종 복합어) 제외
  repKws.forEach(k => {
    const trimmed = k.trim();
    // 공백이 없고, 순수 한글 2~5자인 업종어만 허용
    if (!trimmed.includes(' ') && /^[가-힣]{2,5}$/.test(trimmed)) {
      result.add(trimmed);
    }
  });

  // 결과가 없으면 카테고리 첫 번째 슬래시 앞 단어로 대체
  if (result.size === 0) {
    const fallback = category.split(/[·\/·\s]/)[0].trim();
    if (fallback.length >= 2) result.add(fallback);
    result.add('업체');
  }

  return [...result].slice(0, 6);
}

/* 조합 생성 */
function generateFwkCombos(countOnly = false) {
  const getInput = id => {
    const el = document.getElementById(id);
    return el ? parseKeywordInput(el.value) : [];
  };
  const getCheck = id => {
    const el = document.getElementById(id);
    return el ? el.checked : false;
  };

  // 선택된 순위키에서 지역/업종 파싱
  const selectedRankKws = [...document.querySelectorAll('.fwk-rank-select:checked')].map(el => el.value);
  const regions    = getInput('fwk-region-keys');
  const menuKeys   = getInput('fwk-menu-keys');
  const industries = getInput('fwk-industry-keys');
  const landmarks  = getInput('fwk-landmark-keys');
  const optRegMenu = getCheck('fwk-opt-region-menu');
  const optLandmark = getCheck('fwk-opt-landmark');
  const optOrderVar = getCheck('fwk-opt-order-var');

  const suffixes = ['근처', '인근', '주변', '부근'];
  const combos = new Set();

  // 순위키 기반 조합
  selectedRankKws.forEach(rankKw => {
    // 기본: 순위키 그대로
    combos.add({ kw: rankKw, group: '순위키', reason: `순위키: ${rankKw}` });

    // 지역 뎁스 확장 + 업종
    regions.forEach(region => {
      industries.forEach(ind => {
        combos.add({ kw: `${region} ${ind}`, group: '지역+업종', reason: `${rankKw} 기반 지역확장` });
        if (optRegMenu) {
          menuKeys.forEach(menu => {
            combos.add({ kw: `${region} ${menu} ${ind}`, group: '지역+메뉴+업종', reason: `${rankKw} 기반 메뉴삽입` });
          });
        }
        if (optOrderVar) {
          combos.add({ kw: `${region} ${ind} ${menuKeys[0]||''}`.trim(), group: '순서변형', reason: '업종+메뉴 순서' });
          combos.add({ kw: `${ind} ${region}`, group: '순서변형', reason: '업종+지역 순서' });
        }
      });
    });

    // 랜드마크 조합
    if (optLandmark) {
      landmarks.forEach(lm => {
        suffixes.forEach(suf => {
          industries.forEach(ind => {
            combos.add({ kw: `${regions[0]||''} ${lm} ${suf} ${ind}`.trim(), group: '랜드마크+업종', reason: `${rankKw} 랜드마크 확장` });
            if (optRegMenu) {
              menuKeys.slice(0, 3).forEach(menu => {
                combos.add({ kw: `${regions[0]||''} ${lm} ${suf} ${menu} ${ind}`.trim(), group: '랜드마크+메뉴+업종', reason: '랜드마크+메뉴' });
              });
            }
          });
        });
      });
    }
  });

  // 중복 제거 및 빈 조합 제거
  const result = [...combos].filter(c => c.kw && c.kw.trim().length >= 2);
  return result;
}

/* 조합 미리보기 */
function previewFwkCombos() {
  _fwkCombos = generateFwkCombos();
  if (_fwkCombos.length === 0) return toast('조합 가능한 키워드가 없습니다. 지역키, 업종키를 입력해주세요.', 'error');

  const step1 = document.getElementById('fwk-step-input');
  const step2 = document.getElementById('fwk-step-preview');
  if (!step2) return;

  step1.style.display = 'none';
  step2.style.display = 'block';

  document.getElementById('fwk-preview-count').textContent = `총 ${_fwkCombos.length}개`;

  const groupColors = {
    '순위키': 'var(--cyan)', '지역+업종': 'var(--text2)', '지역+메뉴+업종': 'var(--green)',
    '랜드마크+업종': 'var(--yellow)', '랜드마크+메뉴+업종': '#f97316', '순서변형': 'var(--text3)'
  };
  const list = document.getElementById('fwk-preview-list');
  list.innerHTML = _fwkCombos.map(c => `
    <div style="display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--bg-hover2);border-radius:7px">
      <span style="padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600;background:rgba(0,0,0,0.2);color:${groupColors[c.group]||'var(--text3)'};white-space:nowrap">${c.group}</span>
      <span style="font-size:12px;color:var(--text-title);flex:1">${c.kw}</span>
      <span style="font-size:10px;color:var(--text3)">${c.reason}</span>
    </div>`).join('');
}

/* 순위 조회 시작 */
let _fwkSearchInterval = null;
async function startFwkSearch() {
  _fwkCombos = generateFwkCombos();
  if (_fwkCombos.length === 0) return toast('조합 가능한 키워드가 없습니다.', 'error');

  const MAX_CALLS = 500;
  const toSearch = _fwkCombos.slice(0, MAX_CALLS);

  // UI 전환
  ['fwk-step-input','fwk-step-preview'].forEach(id => {
    const el = document.getElementById(id); if (el) el.style.display = 'none';
  });
  document.getElementById('fwk-step-searching').style.display = 'block';

  const p = places.find(pl => pl.id === _fwkPlaceId);
  if (!p) return;
  const placeId = p.naverPlaceId;

  _fwkStop = false;
  _fwkSearching = true;

  const results = [];
  let done = 0;

  const updateProgress = () => {
    const pct = Math.round(done / toSearch.length * 100);
    const bar = document.getElementById('fwk-progress-bar');
    const txt = document.getElementById('fwk-progress-text');
    const status = document.getElementById('fwk-search-status');
    if (bar) bar.style.width = pct + '%';
    if (txt) txt.textContent = `${done} / ${toSearch.length}`;
    if (status) status.textContent = done > 0 ? `조회 중... (발견: ${results.filter(r=>r.rank).length}개)` : '파서 연결 중...';
  };

  for (const combo of toSearch) {
    if (_fwkStop) break;
    try {
      // 실제 파서 API 연동 (데모에서는 모의 응답)
      const rank = await mockParserRankCheck(placeId, combo.kw);
      results.push({ ...combo, rank, checked: true });

      // 발견된 키워드 실시간 표시
      if (rank && rank <= 300) {
        const partialEl = document.getElementById('fwk-partial-results');
        if (partialEl) {
          const color = rank <= 5 ? 'var(--green)' : rank <= 10 ? 'var(--cyan)' : 'var(--yellow)';
          partialEl.insertAdjacentHTML('afterbegin', `
            <div style="display:flex;align-items:center;gap:8px;padding:6px 8px;background:var(--bg-hover2);border-radius:6px;margin-bottom:4px">
              <span style="font-size:13px;font-weight:800;color:${color};width:36px;text-align:center">${rank}위</span>
              <span style="font-size:12px;color:var(--text-title)">${combo.kw}</span>
              ${rank <= 5 ? '<span style="font-size:10px;padding:1px 6px;background:rgba(34,197,94,0.15);color:var(--green);border-radius:8px">✅작업가능</span>' : ''}
            </div>`);
        }
      }
    } catch(e) { results.push({ ...combo, rank: null, checked: false }); }
    done++;
    updateProgress();
    await new Promise(r => setTimeout(r, 50));
  }

  _fwkSearching = false;
  showFwkResults(results, toSearch.length < _fwkCombos.length);
}

/* 모의 파서 순위 조회 (실제 파서 API 연동 시 교체) */
async function mockParserRankCheck(placeId, keyword) {
  await new Promise(r => setTimeout(r, 30 + Math.random() * 50));
  // 데모: 키가 짧을수록 경쟁 심함 → 높은 순위 어려움
  const wordCount = keyword.split(' ').length;
  const rand = Math.random();
  if (wordCount >= 4 && rand < 0.3) return Math.floor(Math.random() * 5) + 1;
  if (wordCount >= 3 && rand < 0.2) return Math.floor(Math.random() * 15) + 1;
  if (wordCount >= 2 && rand < 0.1) return Math.floor(Math.random() * 50) + 1;
  if (rand < 0.05) return Math.floor(Math.random() * 300) + 1;
  return null;
}

/* 조회 중지 */
function stopFwkSearch() {
  _fwkStop = true;
  toast('조회를 중지했습니다', 'warn');
}

/* 결과 표시 */
function showFwkResults(results, wasCapped) {
  document.getElementById('fwk-step-searching').style.display = 'none';
  document.getElementById('fwk-step-result').style.display = 'block';

  const eligible = results.filter(r => r.rank !== null && r.rank <= 5);
  const watch    = results.filter(r => r.rank !== null && r.rank > 5 && r.rank <= 50);
  const found    = results.filter(r => r.rank !== null);

  const summary = document.getElementById('fwk-result-summary');
  if (summary) summary.innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:6px">
      <div style="text-align:center;padding:10px;background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.2);border-radius:8px">
        <div style="font-size:22px;font-weight:800;color:var(--green)">${eligible.length}</div>
        <div style="font-size:11px;color:var(--text3)">✅ 작업가능 (1~5위)</div>
      </div>
      <div style="text-align:center;padding:10px;background:rgba(var(--cyan-rgb),0.06);border:1px solid rgba(var(--cyan-rgb),0.15);border-radius:8px">
        <div style="font-size:22px;font-weight:800;color:var(--cyan)">${watch.length}</div>
        <div style="font-size:11px;color:var(--text3)">⚠️ 모니터링 (6~50위)</div>
      </div>
      <div style="text-align:center;padding:10px;background:var(--bg-hover2);border-radius:8px">
        <div style="font-size:22px;font-weight:800;color:var(--text3)">${results.length - found.length}</div>
        <div style="font-size:11px;color:var(--text3)">❌ 미발견/300위↑</div>
      </div>
    </div>
    ${wasCapped ? `<div style="font-size:11px;color:var(--yellow);text-align:center">⚠️ 500회 제한으로 ${_fwkCombos.length - results.length}개 조합은 조회되지 않았습니다</div>` : ''}
    ${eligible.length === 0 ? `<div style="font-size:12px;color:var(--text3);text-align:center;padding:8px;background:var(--bg-hover2);border-radius:8px">작업 가능 키워드를 찾지 못했습니다. 랜드마크 키워드를 추가하거나 업종키를 변경해보세요.</div>` : ''}`;

  const list = document.getElementById('fwk-result-list');
  if (!list) return;

  const sortedResults = [...results].filter(r => r.rank).sort((a,b) => (a.rank||999)-(b.rank||999));
  list.innerHTML = sortedResults.length === 0 ? '<div style="text-align:center;padding:20px;color:var(--text3);font-size:12px">발견된 키워드가 없습니다</div>'
    : sortedResults.map(r => {
    const color = r.rank <= 5 ? 'var(--green)' : r.rank <= 10 ? 'var(--cyan)' : r.rank <= 50 ? 'var(--yellow)' : 'var(--text3)';
    const canWork = r.rank <= 5;
    return `
    <label style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg-hover2);border-radius:8px;cursor:pointer;margin-bottom:4px">
      <input type="checkbox" class="fwk-result-check" value="${r.kw}" ${canWork ? 'checked' : ''} style="accent-color:var(--green)">
      <span style="font-size:14px;font-weight:800;color:${color};width:40px;text-align:center;flex-shrink:0">${r.rank}위</span>
      <div style="flex:1">
        <div style="font-size:12px;font-weight:600;color:var(--text-title)">${r.kw}</div>
        <div style="font-size:10px;color:var(--text3)">${r.group} · ${r.reason}</div>
      </div>
      ${canWork ? '<span style="font-size:10px;padding:2px 7px;background:rgba(34,197,94,0.15);color:var(--green);border-radius:8px;font-weight:600">✅ 추천</span>' : ''}
    </label>`;
  }).join('');
}

/* 선택 키워드 작업키로 추가 */
function addSelectedWorkKws() {
  const p = places.find(pl => pl.id === _fwkPlaceId);
  if (!p) return;

  const checked = [...document.querySelectorAll('.fwk-result-check:checked')].map(el => el.value);
  if (checked.length === 0) return toast('추가할 키워드를 선택해주세요', 'error');

  const existingKws = new Set(p.keywords.map(k => k.kw));
  const newKws = checked.filter(k => !existingKws.has(k));
  const dupes  = checked.length - newKws.length;

  const currentWorkCount = p.keywords.filter(k => !k.isRankKw).length;
  newKws.forEach((kw, i) => {
    const newId = Math.max(...p.keywords.map(k=>k.id), 0) + 1;
    const kwObj = _buildKeyword(newId, kw, false);
    kwObj.sortOrder = currentWorkCount + i;
    p.keywords.push(kwObj);
  });

  closeModal('modal-find-work-kw');
  activeTab = 'keywords';
  const tab = document.getElementById('tab-content');
  if (tab) {
    tab.innerHTML = renderTabContent(p);
    document.querySelectorAll('.detail-tab').forEach(btn => {
      const t = btn.getAttribute('onclick').match(/'([^']+)'/)?.[1];
      btn.classList.toggle('active', t === 'keywords');
    });
    setTimeout(() => { drawKwCharts(); initWorkKwDrag(); }, 80);
  } else renderPage();

  let msg = `작업 키워드 ${newKws.length}개 추가 완료`;
  if (dupes > 0) msg += ` (중복 ${dupes}개 생략)`;
  toast(msg, 'success');
}

/* 모달 초기화 */
function resetFwkModal() {
  ['fwk-step-input','fwk-step-preview','fwk-step-searching','fwk-step-result'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = id === 'fwk-step-input' ? 'block' : 'none';
  });
  const partial = document.getElementById('fwk-partial-results');
  if (partial) partial.innerHTML = '';
  _fwkStop = false;
  _fwkCombos = [];
}

/* ── 키워드 입력 수 미리보기 ── */
document.addEventListener('input', e => {
  if (e.target.id === 'kw-input') {
    const raw = e.target.value.trim();
    const count = raw ? parseKeywordInput(raw).length : 0;
    document.getElementById('kw-count-preview').textContent = `입력된 키워드: ${count}개`;
  }
  if (e.target.id === 'single-kw-input') {
    updateSingleKwCount();
  }
});

/* ── 리뷰 정렬 / 서브탭 ── */
function setReviewSort(placeId, col, mode) {
  const p = places.find(x => x.id === placeId);
  if (!p) return;
  if (col === 'vr') p._vrSort = mode;
  else p._brSort = mode;
  // 탭 콘텐츠만 갱신
  const tab = document.getElementById('tab-content');
  if (tab) tab.innerHTML = renderTabContent(selectedPlace());
}

function setReviewSubTab(placeId, subTab) {
  const p = places.find(x => x.id === placeId);
  if (!p) return;
  p._reviewSubTab = subTab;
  const tab = document.getElementById('tab-content');
  if (tab) tab.innerHTML = renderTabContent(selectedPlace());
}

/* ── 초기화 ── */
buildModals();
renderPage();
</script>
