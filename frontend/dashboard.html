<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nplace.io — 대시보드</title>
<link rel="icon" href="favicon.ico">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
.dash-loading {
  display:flex; align-items:center; justify-content:center;
  min-height:300px; flex-direction:column; gap:12px;
  color:var(--text3); font-size:14px;
}
.dash-loading .spinner {
  width:32px; height:32px;
  border:3px solid var(--border);
  border-top-color:var(--cyan);
  border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

.kpi-null {
  font-size:28px; font-weight:800; color:var(--text3);
}
.rank-badge {
  display:inline-block; font-size:13px; font-weight:800;
  padding:2px 8px; border-radius:6px;
}
.rank-badge.r1  { background:rgba(252,211,77,.15); color:#fcd34d; }
.rank-badge.r5  { background:rgba(0,212,255,.1);   color:var(--cyan); }
.rank-badge.r10 { background:rgba(34,197,94,.1);   color:var(--green); }
.rank-badge.r30 { background:rgba(96,165,250,.1);  color:#60a5fa; }
.rank-badge.rout{ background:var(--bg-hover2);     color:var(--text3); }
.rank-none      { font-size:12px; color:var(--text3); font-weight:500; }

.change-up   { color:var(--green); font-size:11px; font-weight:700; }
.change-down { color:var(--red);   font-size:11px; font-weight:700; }
.change-flat { color:var(--text3); font-size:11px; }

.place-row {
  display:flex; align-items:flex-start; gap:16px;
  padding:14px 0; border-bottom:1px solid var(--border);
  flex-wrap:wrap;
}
.place-row:last-child { border-bottom:none; }
.place-name-col { min-width:130px; flex-shrink:0; }
.place-name-col .pname {
  font-size:13px; font-weight:700; color:var(--text-title);
}
.place-name-col .pcnt {
  font-size:11px; color:var(--text3); margin-top:2px;
}
.kw-chips { display:flex; flex-wrap:wrap; gap:5px; flex:1; min-width:160px; }
.kw-chip {
  display:inline-flex; align-items:center; gap:5px;
  padding:4px 9px; border-radius:6px; font-size:11px; font-weight:600;
  background:rgba(var(--cyan-rgb),.07); border:1px solid rgba(var(--cyan-rgb),.18);
  color:var(--text);
}
.kw-chip.no-rank {
  background:var(--bg-hover2); border-color:var(--border); color:var(--text3);
}
.empty-state {
  padding:40px 0; text-align:center; color:var(--text3); font-size:14px;
}
.empty-state a { color:var(--cyan); }

/* 최근 주문 상태 뱃지 */
.status-badge {
  display:inline-block; padding:2px 8px; border-radius:20px;
  font-size:11px; font-weight:600;
}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast-container"></div>
<script src="js/app.js?v=20260326"></script>
<script src="js/shared-data.js?v=20260323"></script>
<script>
renderLayout({ title: '대시보드', activePage: 'dashboard.html' });

/* ════════════════════════════════════════
   전역 상태
════════════════════════════════════════ */
let _data      = null;   // API 응답 원본
let _loading   = true;
let _error     = null;
let chartInst  = null;

/* ════════════════════════════════════════
   진입점
════════════════════════════════════════ */
(async () => {
  renderLoading();
  const wsId = getWorkspaceId();
  if (!wsId) {
    _loading = false;
    _error = 'workspace_id 없음 — 먼저 로그인하세요';
    renderPage();
    return;
  }
  try {
    _data    = await apiCall(`/api/v1/places/dashboard-summary?workspace_id=${wsId}`);
    _loading = false;
  } catch(e) {
    _loading = false;
    _error   = e.message;
  }
  renderPage();
})();

/* ════════════════════════════════════════
   렌더링
════════════════════════════════════════ */
function renderLoading() {
  const el = document.getElementById('page-content');
  if (!el) return;
  el.innerHTML = `<div class="dash-loading"><div class="spinner"></div>데이터를 불러오는 중...</div>`;
}

function renderPage() {
  const el = document.getElementById('page-content');
  if (!el) return;

  if (_error) {
    el.innerHTML = `<div class="dash-loading">⚠️ ${_error}</div>`;
    return;
  }
  if (!_data) {
    el.innerHTML = `<div class="dash-loading"><div class="spinner"></div></div>`;
    return;
  }

  el.innerHTML = buildHTML();
  bindEvents();
  drawChart();
}

/* ════════════════════════════════════════
   HTML 빌드 — API 데이터만 사용
════════════════════════════════════════ */
function buildHTML() {
  const d = _data;

  // 실측 순위 있는 키워드만 필터
  const rankedKws = d.rank_summary.flatMap(p =>
    p.keywords.filter(k => k.rank !== null && k.rank !== undefined)
  );
  const top5   = rankedKws.filter(k => k.rank <= 5).length;
  const top1   = rankedKws.filter(k => k.rank === 1).length;

  return `
<!-- KPI 카드 4개 -->
<div class="kpi-grid" style="margin-bottom:20px">

  <div class="kpi-card">
    <div class="kpi-label">📍 관리 플레이스</div>
    <div class="kpi-value">${d.total_places}</div>
    <div class="kpi-change flat">키워드 ${d.total_keywords}개 등록</div>
  </div>

  <div class="kpi-card">
    <div class="kpi-label">📊 순위키 평균 순위</div>
    ${d.avg_rank !== null
      ? `<div class="kpi-value text-cyan">${d.avg_rank}위</div>
         <div class="kpi-change flat">실측 ${rankedKws.length}개 키워드 기준</div>`
      : `<div class="kpi-null">–</div>
         <div class="kpi-change flat">순위 데이터 없음</div>`
    }
  </div>

  <div class="kpi-card">
    <div class="kpi-label">🏆 TOP 5 달성</div>
    ${rankedKws.length > 0
      ? `<div class="kpi-value text-yellow">${top5}개</div>
         <div class="kpi-change flat">1위 ${top1}개 포함</div>`
      : `<div class="kpi-null">–</div>
         <div class="kpi-change flat">순위 수집 후 표시</div>`
    }
  </div>

  <div class="kpi-card">
    <div class="kpi-label">🛒 이번 달 주문</div>
    <div class="kpi-value">${d.this_month_orders}건</div>
    <div class="kpi-change flat">완료 매출 ${formatKRW(d.this_month_revenue)}</div>
  </div>

</div>

<!-- 2컬럼: 순위 현황 + 최근 주문 -->
<div class="grid-2" style="margin-bottom:20px;align-items:start">

  <!-- 플레이스별 순위 현황 -->
  <div class="card">
    <div class="card-header" style="margin-bottom:12px">
      <div class="card-title">🏪 플레이스별 키워드 순위</div>
      <a href="places.html" class="btn-link">플레이스 관리 →</a>
    </div>
    ${buildRankSummary(d.rank_summary)}
  </div>

  <!-- 최근 주문 -->
  <div class="card">
    <div class="card-header" style="margin-bottom:12px">
      <div class="card-title">🛒 최근 주문</div>
      <a href="orders.html" class="btn-link">전체 보기 →</a>
    </div>
    ${buildRecentOrders(d.recent_orders)}
  </div>

</div>

<!-- 순위 트렌드 차트 (실측 데이터 있을 때만) -->
${buildChartSection(d.rank_summary)}
`;
}

/* ── 플레이스별 순위 현황 ── */
function buildRankSummary(rankSummary) {
  if (!rankSummary || rankSummary.length === 0) {
    return `<div class="empty-state">
      플레이스가 없습니다.<br>
      <a href="places.html">플레이스를 먼저 등록하세요 →</a>
    </div>`;
  }

  return rankSummary.map(p => {
    const kws = p.keywords;
    const hasAny = kws.some(k => k.rank !== null);

    return `
    <div class="place-row">
      <div class="place-name-col">
        <div class="pname">${p.alias || p.place_name}</div>
        <div class="pcnt">${kws.length}개 키워드</div>
      </div>
      <div class="kw-chips">
        ${kws.length === 0
          ? `<span style="font-size:11px;color:var(--text3)">키워드 미등록</span>`
          : kws.map(k => `
            <span class="kw-chip${k.rank === null ? ' no-rank' : ''}">
              <span>${k.keyword}</span>
              ${k.rank !== null
                ? `${rankBadge(k.rank)}${rankChange(k.rank_change)}`
                : `<span class="rank-none">미수집</span>`
              }
            </span>`).join('')
        }
      </div>
    </div>`;
  }).join('');
}

/* ── 최근 주문 ── */
function buildRecentOrders(orders) {
  if (!orders || orders.length === 0) {
    return `<div class="empty-state">주문 내역이 없습니다.</div>`;
  }

  return `<div class="table-wrap" style="border:none;margin:0">
    <table>
      <thead><tr><th>상품</th><th>금액</th><th>상태</th></tr></thead>
      <tbody>
        ${orders.map(o => `
          <tr style="cursor:pointer" onclick="location.href='orders.html'">
            <td style="font-size:12px;font-weight:600;color:var(--text-title)">${o.product_name}</td>
            <td style="font-size:12px;font-weight:600">${formatKRW(o.total_amount)}</td>
            <td>${orderBadge(o.status)}</td>
          </tr>`).join('')}
      </tbody>
    </table>
  </div>`;
}

/* ── 순위 트렌드 차트 섹션 ── */
function buildChartSection(rankSummary) {
  // 실측 순위 있는 플레이스만
  const withRank = (rankSummary || []).filter(p =>
    p.keywords.some(k => k.rank !== null)
  );

  if (withRank.length === 0) {
    return `<div class="card" style="margin-bottom:20px">
      <div class="card-header">
        <div class="card-title">📈 순위 트렌드</div>
      </div>
      <div class="empty-state" style="padding:30px 0">
        순위 수집 데이터가 없습니다.<br>
        <span style="font-size:12px;color:var(--text3)">키워드 등록 후 크롤링이 실행되면 표시됩니다.</span>
      </div>
    </div>`;
  }

  return `<div class="card" style="margin-bottom:20px">
    <div class="card-header" style="margin-bottom:12px">
      <div class="card-title">📈 키워드 현재 순위</div>
      <span style="font-size:11px;color:var(--text3)">최신 수집 기준</span>
    </div>
    <div style="height:260px;position:relative"><canvas id="rankChart"></canvas></div>
  </div>`;
}

/* ════════════════════════════════════════
   차트 — 실측 순위만 막대 그래프
════════════════════════════════════════ */
function drawChart() {
  const ctx = document.getElementById('rankChart');
  if (!ctx || !_data) return;

  const cc = getChartColors();
  if (chartInst) chartInst.destroy();

  // 실측 순위 있는 키워드만 수집
  const items = [];
  (_data.rank_summary || []).forEach(p => {
    p.keywords.forEach(k => {
      if (k.rank !== null) {
        items.push({
          label: k.keyword,
          rank: k.rank,
          placeName: p.alias || p.place_name,
        });
      }
    });
  });

  if (!items.length) return;

  // 순위 오름차순 정렬 (낮을수록 좋음)
  items.sort((a, b) => a.rank - b.rank);

  const PALETTE = ['#00d4ff','#a78bfa','#22c55e','#fcd34d','#f87171',
                   '#60a5fa','#fb923c','#34d399','#e879f9'];

  chartInst = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: items.map(i => i.keyword),
      datasets: [{
        label: '현재 순위',
        data: items.map(i => i.rank),
        backgroundColor: items.map((_, idx) => PALETTE[idx % PALETTE.length] + '99'),
        borderColor:     items.map((_, idx) => PALETTE[idx % PALETTE.length]),
        borderWidth: 1.5,
        borderRadius: 4,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        y: {
          reverse: true,
          min: 1,
          ticks: { color: cc.ticks, stepSize: 5 },
          grid: { color: cc.grid },
          title: { display: true, text: '순위', color: cc.ticks, font: { size: 11 } },
        },
        x: {
          ticks: { color: cc.ticks, font: { size: 11 } },
          grid: { display: false },
        },
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: cc.tooltip.bg,
          borderColor: cc.tooltip.border,
          borderWidth: 1,
          titleColor: cc.tooltip.title,
          bodyColor: cc.tooltip.body,
          callbacks: {
            title: (items) => {
              const idx = items[0].dataIndex;
              return `${_data.rank_summary.find(p => p.keywords.find(k=>k.keyword===items[0].label))?.alias || ''} · ${items[0].label}`;
            },
            label: (c) => `현재 ${c.raw}위`,
          },
        },
      },
    },
  });
}

/* ════════════════════════════════════════
   헬퍼
════════════════════════════════════════ */
function rankBadge(rank) {
  if (rank === null || rank === undefined) return '';
  let cls = 'rout';
  if (rank === 1)       cls = 'r1';
  else if (rank <= 5)   cls = 'r5';
  else if (rank <= 10)  cls = 'r10';
  else if (rank <= 30)  cls = 'r30';
  return `<span class="rank-badge ${cls}">${rank}위</span>`;
}

function rankChange(change) {
  if (change === null || change === undefined || change === 0) return '';
  if (change > 0) return `<span class="change-up">▲${change}</span>`;
  return `<span class="change-down">▼${Math.abs(change)}</span>`;
}

function getChartColors() {
  const light = document.body.classList.contains('light');
  return {
    ticks:   light ? '#64748b' : 'rgba(226,232,240,0.6)',
    grid:    light ? 'rgba(0,0,0,0.06)' : 'rgba(255,255,255,0.05)',
    tooltip: {
      bg:     light ? '#ffffff' : '#1a1a24',
      border: light ? 'rgba(0,0,0,0.12)' : 'rgba(255,255,255,0.1)',
      title:  light ? '#0f172a' : '#ffffff',
      body:   light ? '#64748b' : 'rgba(226,232,240,0.7)',
    },
  };
}

function bindEvents() {}

/* ── chartColors 전역 fallback ── */
if (typeof chartColors === 'undefined') {
  window.chartColors = getChartColors;
}
</script>
</body>
</html>
